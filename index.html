<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSK E-COMM | AUTOMATION MARKETING HUB</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
    :root { --brand:#002d72; --bg0:#f6f8fb; --bg1:#eef3f9; }

    body{
      background: linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: 'Plus Jakarta Sans', sans-serif;
      color:#0f172a;
      min-height:100vh;
    }
    .glass-card{
      background: rgba(255,255,255,0.60);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0,45,114,0.06);
    }
    .sidebar{
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(255,255,255,0.85);
    }
    .nav-item{
      border-radius: 18px;
      padding: 14px 16px;
      display:flex;
      align-items:center;
      gap:12px;
      font-weight: 800;
      transition: all .15s ease;
      cursor:pointer;
      user-select:none;
    }
    .nav-item.active{
      background:#ffffff;
      color: var(--brand);
      box-shadow: 0 10px 20px rgba(0,45,114,0.06);
    }
    .nav-item:not(.active){
      color: #94a3b8;
    }
    .nav-item:not(.active):hover{
      background: rgba(255,255,255,0.55);
      color:#334155;
    }

    .nav-section{ margin-top: 18px; }
    .nav-section:first-child{ margin-top: 0; }
    .nav-section-title{
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #94a3b8;
      padding: 0 10px;
      margin-bottom: 10px;
    }
    .nav-divider{
      height: 1px;
      background: rgba(148,163,184,0.22);
      margin: 14px 10px;
    }
    .nav-item i{
      width: 18px;
      text-align: center;
      font-size: 14px;
      opacity: .95;
    }

    /* ===== Mobile Bottom Tab ===== */
    .mo-tabbar{
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.85);
    }
    .mo-tab{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding: 10px 8px;
      border-radius: 16px;
      font-weight: 900;
      transition: all .15s ease;
      color:#94a3b8;
      user-select:none;
      cursor:pointer;
      white-space: nowrap;
    }
    .mo-tab.active{
      color: var(--brand);
      background: rgba(0,45,114,0.06);
    }
    .safe-bottom{
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ===== Loading overlay (iframe) ===== */
    .loading-overlay{
      position: fixed;
      inset: 0;
      background: rgba(248,250,252,0.72);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .spinner{
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 4px solid rgba(0,0,0,0.10);
      border-top-color: rgba(0,45,114,0.85);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin{ to { transform: rotate(360deg); } }
    .muted { color:#64748b; }

    /* ✅ iframe 기본: 내부 스크롤을 만들지 않도록 */
    #frame{ overflow:hidden; background:#fff; }
  </style>
</head>

<body class="flex">

<!-- ✅ Loading overlay -->
<div class="loading-overlay" id="hub-loading" aria-live="polite" aria-busy="true">
  <div class="glass-card px-6 py-5 flex items-center gap-4">
    <div class="spinner"></div>
    <div>
      <div class="text-sm font-black">리포트 불러오는 중…</div>
      <div class="text-xs font-semibold muted mt-1">잠시만요</div>
    </div>
  </div>
</div>

<!-- ================= Sidebar (PC) ================= -->
<aside class="w-72 h-screen sticky top-0 sidebar hidden lg:flex flex-col p-8">

  <!-- BRAND -->
  <div class="flex items-center gap-4 mb-10 px-2">
    <img
      src="Columbia_logo.png"
      alt="Columbia"
      class="w-14 h-14 object-contain"
    />
    <div>
      <div class="text-xl font-black tracking-tight">
        CSK <span class="text-blue-600">E-COMM</span>
      </div>
      <div class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400">
        AUTOMATION MARKETING HUB
      </div>
    </div>
  </div>

  <!-- NAV (PC) -->
  <div>

    <!-- OVERVIEW -->
    <div class="nav-section">
      <div class="nav-section-title">Overview</div>
      <div class="space-y-3">
        <div class="nav-item active" data-key="summary" data-target="reports/index.html" data-label="Summary">
          <i class="fa-solid fa-chart-simple"></i><span>Summary</span>
        </div>

        <div class="nav-item" data-key="daily" data-target="reports/daily_digest/index.html" data-label="Daily Report">
          <i class="fa-solid fa-calendar-day"></i><span>Owned.com Report</span>
        </div>

        <!-- ✅ NEW: OWNED Portal (EDM/LMS/KAKAO) -->
        <div class="nav-item" data-key="owned" data-target="reports/owned_portal/index.html" data-label="OWNED Portal">
          <i class="fa-solid fa-envelope"></i><span>OWNED MESSAGE</span>
        </div>
      </div>
    </div>

    <div class="nav-divider"></div>

    <!-- PRICE / COMPETITOR -->
    <div class="nav-section">
      <div class="nav-section-title">Price & Competitor</div>
      <div class="space-y-3">
        <div class="nav-item" data-key="price" data-target="reports/naver_lowest_price.html" data-label="네이버 최저가">
          <i class="fa-solid fa-won-sign"></i><span>네이버 최저가</span>
        </div>
        <div class="nav-item" data-key="hero" data-target="reports/hero_main.html" data-label="경쟁사 기획전 배너">
          <i class="fa-solid fa-image"></i><span>경쟁사 기획전 배너</span>
        </div>
      </div>
    </div>

    <div class="nav-divider"></div>

    <!-- VOC -->
    <div class="nav-section">
      <div class="nav-section-title">VOC</div>
      <div class="space-y-3">
        <div class="nav-item" data-key="voc" data-target="reports/external_signal.html" data-label="디시인사이드 VOC">
          <i class="fa-solid fa-tower-broadcast"></i><span>디시인사이드</span>
        </div>

        <div class="nav-item" data-key="crema" data-target="reports/voc_crema/index.html" data-label="구매후기 VOC">
          <i class="fa-solid fa-comments"></i><span>구매후기</span>
        </div>

        <div class="nav-item" data-key="blogvoc" data-target="reports/voc_blog/index.html" data-label="네이버 블로그 VOC">
          <i class="fa-solid fa-pen-nib"></i><span>네이버 블로그</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Sidebar Footer Meta -->
  <div class="mt-auto pt-8 px-2">
    <div class="glass-card p-4">
      <div class="text-[10px] font-black tracking-widest text-slate-500 uppercase">Update</div>

      <div class="mt-3 space-y-2">
        <div class="flex items-center justify-between gap-3">
          <div class="text-[10px] font-extrabold text-slate-400">업데이트</div>
          <div id="sb-updated-at" class="text-[11px] font-black text-slate-700 text-right">-</div>
        </div>

        <div class="flex items-center justify-between gap-3">
          <div class="text-[10px] font-extrabold text-slate-400">기간</div>
          <div id="sb-period" class="text-[11px] font-black text-slate-700 text-right">-</div>
        </div>

        <div class="text-[9px] text-slate-400 font-bold mt-2">
          기준: 현재 탭 meta.json
        </div>
      </div>
    </div>

    <div class="pt-4 text-[10px] text-slate-400 font-bold">
      © CSK E-COMM
    </div>
  </div>
</aside>

<!-- ================= Main ================= -->
<!-- ✅ 헤더 제거: iframe만 크게 -->
<main class="flex-1 p-4 md:p-8 lg:p-10 pb-24 lg:pb-0">

  <section class="glass-card p-3 md:p-4 lg:p-5">
    <iframe
      id="frame"
      src="reports/index.html"
      class="w-full rounded-2xl border-0 bg-white"
      style="min-height: 760px;"
      loading="eager">
    </iframe>
  </section>

</main>

<!-- ================= Mobile Bottom Tabbar (MO) ================= -->
<nav class="lg:hidden fixed bottom-0 left-0 right-0 mo-tabbar safe-bottom px-3 py-3">
  <!-- ✅ 7 -> 8 columns -->
  <div class="max-w-2xl mx-auto grid grid-cols-8 gap-2">
    <div class="mo-tab active" data-key="summary" data-target="reports/index.html" data-label="Summary">
      <i class="fa-solid fa-chart-simple text-base"></i>
      <div class="text-[10px]">요약</div>
    </div>

    <div class="mo-tab" data-key="daily" data-target="reports/daily_digest/index.html" data-label="Daily Report">
      <i class="fa-solid fa-calendar-day text-base"></i>
      <div class="text-[10px]">데일리</div>
    </div>

    <!-- ✅ NEW: OWNED Portal -->
    <div class="mo-tab" data-key="owned" data-target="reports/owned_portal/index.html" data-label="OWNED Portal">
      <i class="fa-solid fa-envelope text-base"></i>
      <div class="text-[10px]">OWNED</div>
    </div>

    <div class="mo-tab" data-key="price" data-target="reports/naver_lowest_price.html" data-label="네이버 최저가">
      <i class="fa-solid fa-won-sign text-base"></i>
      <div class="text-[10px]">최저가</div>
    </div>
    <div class="mo-tab" data-key="hero" data-target="reports/hero_main.html" data-label="경쟁사 기획전 배너">
      <i class="fa-solid fa-image text-base"></i>
      <div class="text-[10px]">배너</div>
    </div>
    <div class="mo-tab" data-key="voc" data-target="reports/external_signal.html" data-label="디시인사이드 VOC">
      <i class="fa-solid fa-tower-broadcast text-base"></i>
      <div class="text-[10px]">커뮤</div>
    </div>
    <div class="mo-tab" data-key="crema" data-target="reports/voc_crema/index.html" data-label="구매후기 VOC">
      <i class="fa-solid fa-comments text-base"></i>
      <div class="text-[10px]">후기</div>
    </div>
    <div class="mo-tab" data-key="blogvoc" data-target="reports/voc_blog/index.html" data-label="네이버 블로그 VOC">
      <i class="fa-solid fa-pen-nib text-base"></i>
      <div class="text-[10px]">블로그</div>
    </div>
  </div>
</nav>

<script>
  (function () {
    const frame = document.getElementById("frame");
    const pcItems = Array.from(document.querySelectorAll(".nav-item[data-target]"));
    const moTabs  = Array.from(document.querySelectorAll(".mo-tab[data-target]"));
    const loading = document.getElementById("hub-loading");

    const allNav = [...pcItems, ...moTabs];
    if (!frame || allNav.length === 0) return;

    const META_PATH_BY_KEY = {
      summary: "reports/meta.json",
      daily:   "reports/meta.json",
      owned:   "reports/owned_portal/data/meta.json",   // ✅ NEW
      price:   "reports/meta.json",
      hero:    "reports/meta.json",
      voc:     "reports/meta.json",
      crema:   "reports/voc_crema/data/meta.json",
      blogvoc: "reports/voc_blog/data/meta.json",
    };

    const showLoading = (on) => {
      if (!loading) return;
      loading.style.display = on ? "flex" : "none";
    };

    function toAbsHref(relativePath) {
      try { return new URL(relativePath, window.location.href).href; }
      catch (e) { return relativePath; }
    }

    function setActiveByTarget(target) {
      allNav.forEach(el => el.classList.remove("active"));
      const matches = allNav.filter(el => el.getAttribute("data-target") === target);
      matches.forEach(el => el.classList.add("active"));
    }

    function getKeyByTarget(target) {
      const el = allNav.find(x => x.getAttribute("data-target") === target);
      return el ? (el.getAttribute("data-key") || "") : "";
    }

    function pad2(n){ return String(n).padStart(2, "0"); }
    function fmtKST(d){
      const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
      const kst = new Date(utc + (9 * 60 * 60000));
      return `${kst.getFullYear()}.${pad2(kst.getMonth()+1)}.${pad2(kst.getDate())} ${pad2(kst.getHours())}:${pad2(kst.getMinutes())} KST`;
    }
    function fmtD(d){
      return `${d.getFullYear()}.${pad2(d.getMonth()+1)}.${pad2(d.getDate())}`;
    }

    async function setSidebarMetaByKey(key) {
      const elUpdated = document.getElementById("sb-updated-at");
      const elPeriod  = document.getElementById("sb-period");
      if (!elUpdated || !elPeriod) return;

      const metaPath = META_PATH_BY_KEY[key] || "reports/meta.json";
      try {
        const res = await fetch(metaPath + `?t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error("meta.json not found");
        const meta = await res.json();
        elUpdated.textContent = meta.updated_at_kst || "-";
        elPeriod.textContent  = meta.period_text || "-";
      } catch (e) {
        const now = new Date();
        elUpdated.textContent = fmtKST(now);

        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const kst = new Date(utc + (9 * 60 * 60000));
        const end = new Date(kst);
        const start = new Date(kst); start.setDate(start.getDate()-6);
        elPeriod.textContent = `최근 7일 (${fmtD(start)} ~ ${fmtD(end)})`;
      }
    }

    // ✅ 핵심: iframe 내부 스크롤 제거 + iframe 높이를 내부 문서 높이로 맞춤
    function resizeIframeToContent() {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc) return;

        doc.documentElement.style.overflow = "hidden";
        doc.body.style.overflow = "hidden";
        doc.body.style.margin = "0";

        const h = Math.max(
          doc.body.scrollHeight,
          doc.documentElement.scrollHeight,
          doc.body.offsetHeight,
          doc.documentElement.offsetHeight
        );

        frame.style.height = (h + 12) + "px";
      } catch (e) {
        console.warn("iframe resize blocked", e);
      }
    }

    function navigate(target) {
      if (!target) return;
      const key = getKeyByTarget(target);

      showLoading(true);

      const onLoadOnce = () => {
        showLoading(false);
        frame.removeEventListener("load", onLoadOnce);

        resizeIframeToContent();
        setTimeout(resizeIframeToContent, 250);
        setTimeout(resizeIframeToContent, 900);
      };
      frame.addEventListener("load", onLoadOnce);

      frame.src = toAbsHref(target);
      setActiveByTarget(target);

      if (key) window.location.hash = key;
      setSidebarMetaByKey(key);
    }

    allNav.forEach(el => {
      el.addEventListener("click", () => navigate(el.getAttribute("data-target")));
    });

    function initialNavigate() {
      const hashKey = (window.location.hash || "").replace("#", "").trim();
      if (hashKey) {
        const el = allNav.find(x => x.getAttribute("data-key") === hashKey);
        if (el) { navigate(el.getAttribute("data-target")); return; }
      }
      navigate(frame.getAttribute("src"));
    }
    initialNavigate();

    window.addEventListener("resize", () => {
      resizeIframeToContent();
      setTimeout(resizeIframeToContent, 120);
    });
  })();
</script>

</body>
</html>
