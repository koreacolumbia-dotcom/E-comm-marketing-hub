<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSK E-COMM | AUTOMAITON MARKETING HUB</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
    :root { --brand:#002d72; --bg0:#f6f8fb; --bg1:#eef3f9; }

    body{
      background: linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: 'Plus Jakarta Sans', sans-serif;
      color:#0f172a;
      min-height:100vh;
    }
    .glass-card{
      background: rgba(255,255,255,0.60);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0,45,114,0.06);
    }
    .sidebar{
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(255,255,255,0.85);
    }
    .nav-item{
      border-radius: 18px;
      padding: 14px 16px;
      display:flex;
      align-items:center;
      gap:12px;
      font-weight: 800;
      transition: all .15s ease;
      cursor:pointer;
      user-select:none;
    }
    .nav-item.active{
      background:#ffffff;
      color: var(--brand);
      box-shadow: 0 10px 20px rgba(0,45,114,0.06);
    }
    .nav-item:not(.active){
      color: #94a3b8;
    }
    .nav-item:not(.active):hover{
      background: rgba(255,255,255,0.55);
      color:#334155;
    }

    /* ===== Mobile Bottom Tab ===== */
    .mo-tabbar{
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.85);
    }
    .mo-tab{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding: 10px 8px;
      border-radius: 16px;
      font-weight: 900;
      transition: all .15s ease;
      color:#94a3b8;
      user-select:none;
      cursor:pointer;
      white-space: nowrap;
    }
    .mo-tab.active{
      color: var(--brand);
      background: rgba(0,45,114,0.06);
    }

    /* iOS safe area */
    .safe-bottom{
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>

<body class="flex">

<!-- ================= Sidebar (PC) ================= -->
<aside class="w-72 h-screen sticky top-0 sidebar hidden lg:flex flex-col p-8">

  <!-- BRAND -->
  <div class="flex items-center gap-4 mb-14 px-2">
    <img
      src="Columbia_logo.png"
      alt="Columbia"
      class="w-14 h-14 object-contain"
    />
    <div>
      <div class="text-xl font-black tracking-tight">
        CSK <span class="text-blue-600">E-COMM</span>
      </div>
      <div class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400">
        AUTOMAITON MARKETING HUB
      </div>
    </div>
  </div>

  <!-- NAV (PC) -->
  <div class="space-y-3">
    <div class="nav-item active" data-key="summary" data-target="reports/index.html" data-label="Summary">
      <i class="fa-solid fa-chart-simple"></i><span>Summary</span>
    </div>
    <div class="nav-item" data-key="price" data-target="reports/naver_lowest_price.html" data-label="네이버 최저가">
      <i class="fa-solid fa-won-sign"></i><span>네이버 최저가</span>
    </div>
    <div class="nav-item" data-key="hero" data-target="reports/hero_main.html" data-label="경쟁사 Hero 배너">
      <i class="fa-solid fa-image"></i><span>경쟁사 Hero 배너</span>
    </div>
    <div class="nav-item" data-key="voc" data-target="reports/external_signal.html" data-label="커뮤니티 VOC">
      <i class="fa-solid fa-tower-broadcast"></i><span>커뮤니티 VOC</span>
    </div>

    <!-- ✅ Crema VOC -->
    <div class="nav-item" data-key="crema" data-target="reports/voc_crema/index.html" data-label="Crema VOC">
      <i class="fa-solid fa-comments"></i><span>Crema VOC</span>
    </div>
  </div>

  <!-- ✅ Sidebar Footer Meta (Update / Period) -->
  <div class="mt-auto pt-8 px-2">
    <div class="glass-card p-4">
      <div class="text-[10px] font-black tracking-widest text-slate-500 uppercase">Update</div>

      <div class="mt-3 space-y-2">
        <div class="flex items-center justify-between gap-3">
          <div class="text-[10px] font-extrabold text-slate-400">업데이트</div>
          <div id="sb-updated-at" class="text-[11px] font-black text-slate-700 text-right">-</div>
        </div>

        <div class="flex items-center justify-between gap-3">
          <div class="text-[10px] font-extrabold text-slate-400">기간</div>
          <div id="sb-period" class="text-[11px] font-black text-slate-700 text-right">-</div>
        </div>

        <div class="text-[9px] text-slate-400 font-bold mt-2">
          기준: 최근 일주일(7D)
        </div>
      </div>
    </div>

    <div class="pt-4 text-[10px] text-slate-400 font-bold">
      © CSK E-COMM
    </div>
  </div>
</aside>

<!-- ================= Main ================= -->
<main class="flex-1 p-4 md:p-10 lg:p-16 pb-24 lg:pb-0">

  <!-- ===== Mobile Header (MO) ===== -->
  <header class="lg:hidden mb-4">
    <div class="glass-card px-4 py-3 flex items-center gap-3">
      <img src="Columbia_logo.png" alt="Columbia" class="w-10 h-10 object-contain" />
      <div class="flex-1">
        <div class="text-sm font-black tracking-tight">CSK <span class="text-blue-600">E-COMM</span></div>
        <div class="text-[10px] font-extrabold text-slate-400">AUTOMAITON MARKETING HUB</div>
      </div>
      <div class="text-[11px] font-black text-slate-700 px-3 py-1 rounded-full bg-white/70">
        <span id="mo-current-label">Summary</span>
      </div>
    </div>
  </header>

  <!-- ===== Desktop Header (PC) ===== -->
  <header class="hidden lg:block mb-8">
    <h1 class="text-4xl md:text-5xl font-black tracking-tight text-slate-900">
      CSK E-COMM Marketing Hub
    </h1>
    <p class="text-slate-500 text-base md:text-lg font-medium italic mt-2">
      자동 업데이트 리포트 포털 (GitHub Actions → reports/)
    </p>
  </header>

  <section class="glass-card p-4 md:p-6">
    <iframe
      id="frame"
      src="reports/index.html"
      class="w-full rounded-2xl border-0 bg-white"
      style="height: calc(100vh - 220px);"
      loading="eager">
    </iframe>
  </section>

</main>

<!-- ================= Mobile Bottom Tabbar (MO) ================= -->
<nav class="lg:hidden fixed bottom-0 left-0 right-0 mo-tabbar safe-bottom px-3 py-3">
  <div class="max-w-2xl mx-auto grid grid-cols-5 gap-2">
    <div class="mo-tab active" data-key="summary" data-target="reports/index.html" data-label="Summary">
      <i class="fa-solid fa-chart-simple text-base"></i>
      <div class="text-[10px]">Summary</div>
    </div>
    <div class="mo-tab" data-key="price" data-target="reports/naver_lowest_price.html" data-label="네이버 최저가">
      <i class="fa-solid fa-won-sign text-base"></i>
      <div class="text-[10px]">최저가</div>
    </div>
    <div class="mo-tab" data-key="hero" data-target="reports/hero_main.html" data-label="경쟁사 Hero 배너">
      <i class="fa-solid fa-image text-base"></i>
      <div class="text-[10px]">Hero</div>
    </div>
    <div class="mo-tab" data-key="voc" data-target="reports/external_signal.html" data-label="커뮤니티 VOC">
      <i class="fa-solid fa-tower-broadcast text-base"></i>
      <div class="text-[10px]">VOC</div>
    </div>
    <div class="mo-tab" data-key="crema" data-target="reports/voc_crema/index.html" data-label="Crema VOC">
      <i class="fa-solid fa-comments text-base"></i>
      <div class="text-[10px]">Crema</div>
    </div>
  </div>
</nav>

<script>
  (function () {
    const frame = document.getElementById("frame");
    const pcItems = Array.from(document.querySelectorAll(".nav-item[data-target]"));
    const moTabs  = Array.from(document.querySelectorAll(".mo-tab[data-target]"));
    const moLabel = document.getElementById("mo-current-label");

    const allNav = [...pcItems, ...moTabs];
    if (!frame || allNav.length === 0) return;

    // ✅ GitHub Pages 경로(/repo-name/)에서도 안전하게 iframe URL 계산
    function toAbsHref(relativePath) {
      try {
        return new URL(relativePath, window.location.href).href;
      } catch (e) {
        return relativePath;
      }
    }

    function setActiveByTarget(target) {
      allNav.forEach(el => el.classList.remove("active"));
      const matches = allNav.filter(el => el.getAttribute("data-target") === target);
      matches.forEach(el => el.classList.add("active"));

      const label = (matches[0] && matches[0].getAttribute("data-label")) || "";
      if (moLabel && label) moLabel.textContent = label;
    }

    function navigate(target) {
      if (!target) return;
      frame.src = toAbsHref(target);
      setActiveByTarget(target);

      // ✅ hash 유지(공유/새로고침 시 탭 고정)
      const key = (allNav.find(el => el.getAttribute("data-target") === target)?.getAttribute("data-key")) || "";
      if (key) window.location.hash = key;
    }

    // Click handlers (PC + MO)
    allNav.forEach(el => {
      el.addEventListener("click", () => {
        navigate(el.getAttribute("data-target"));
      });
    });

    // ✅ 초기 진입: hash가 있으면 해당 탭으로
    function initialNavigate() {
      const hashKey = (window.location.hash || "").replace("#", "").trim();
      if (hashKey) {
        const el = allNav.find(x => x.getAttribute("data-key") === hashKey);
        if (el) {
          const t = el.getAttribute("data-target");
          frame.src = toAbsHref(t);
          setActiveByTarget(t);
          return;
        }
      }
      const initial = frame.getAttribute("src");
      frame.src = toAbsHref(initial);
      setActiveByTarget(initial);
    }
    initialNavigate();

    // Responsive iframe height: mobile header + bottom tab 고려
    function resizeFrame() {
      const isMobile = window.matchMedia("(max-width: 1023px)").matches;
      const offset = isMobile ? 260 : 200;
      frame.style.height = `calc(100vh - ${offset}px)`;
    }
    window.addEventListener("resize", resizeFrame);
    resizeFrame();

    // ✅ Sidebar footer: meta.json(없으면 fallback)
    function pad2(n){ return String(n).padStart(2, "0"); }

    async function setSidebarMeta() {
      const elUpdated = document.getElementById("sb-updated-at");
      const elPeriod  = document.getElementById("sb-period");
      if (!elUpdated || !elPeriod) return;

      try {
        const res = await fetch("reports/meta.json", { cache: "no-store" });
        if (!res.ok) throw new Error("meta.json not found");
        const meta = await res.json();

        elUpdated.textContent = meta.updated_at_kst || "-";
        elPeriod.textContent  = meta.period_text || "-";
      } catch (e) {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const kst = new Date(utc + (9 * 60 * 60000));
        const fmt = (d)=> `${d.getFullYear()}.${pad2(d.getMonth()+1)}.${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())} KST`;
        elUpdated.textContent = fmt(kst);

        const end = new Date(kst);
        const start = new Date(kst); start.setDate(start.getDate()-6);
        const fmtD = (d)=> `${d.getFullYear()}.${pad2(d.getMonth()+1)}.${pad2(d.getDate())}`;
        elPeriod.textContent = `최근 7일 (${fmtD(start)} ~ ${fmtD(end)})`;
      }
    }

    setSidebarMeta();
  })();
</script>

</body>
</html>
