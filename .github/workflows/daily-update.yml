name: Daily Update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"

      voc_only:
        description: "Run Crema VOC only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      blog_only:
        description: "Run Blog VOC only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  schedule:
    # KST 08:00 = UTC 23:00 (전날)
    - cron: "0 23 * * *"

concurrency:
  group: daily-update-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main (rebase)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ensure reports dir
        run: |
          mkdir -p reports

      - name: Set KST time (for badge/meta)
        id: set_time
        shell: bash
        run: |
          echo "kst=$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')" >> $GITHUB_OUTPUT
          echo "kst_date=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      # ----------------------------
      # 1) Naver Lowest Price
      # ----------------------------
      - name: Run Naver Lowest Price crawler
        if: ${{ github.event_name != 'workflow_dispatch' || (inputs.voc_only != 'true' && inputs.blog_only != 'true') }}
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          python -u naver_crawl_columbia_c6c7_title_min.py \
            --limit 999999 \
            --output_html reports/naver_lowest_price.html \
            --history_dir . \
            --cache_dir .naver_cache
          test -f reports/naver_lowest_price.html

      # ----------------------------
      # 2) Hero banner
      # ----------------------------
      - name: Run Hero banner crawler
        if: ${{ github.event_name != 'workflow_dispatch' || (inputs.voc_only != 'true' && inputs.blog_only != 'true') }}
        run: |
          set -euo pipefail
          HTML_USE_ABSOLUTE_FILE_URL=0 OUT_DIR=reports python -u hero_main_top3_final_PRETTY_WHITE_FINAL_FIXED.py
          test -f reports/hero_main.html

      # ----------------------------
      # 3) External Signal (VOC)
      # ----------------------------
      - name: Run External Signal (VOC)
        if: ${{ github.event_name != 'workflow_dispatch' || (inputs.voc_only != 'true' && inputs.blog_only != 'true') }}
        run: |
          set -euo pipefail
          python -u external_signal_combined.py
          test -f reports/external_signal.html

      # ----------------------------
      # 4) Crema VOC
      # - 기본/스케줄: 실행
      # - voc_only=true면 이것만 실행
      # - blog_only=true면 스킵
      # ----------------------------
      - name: Run Crema VOC (reviews + images + dashboard)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.blog_only != 'true' }}
        env:
          CREMA_SECURE_DEVICE_TOKEN: ${{ secrets.CREMA_SECURE_DEVICE_TOKEN }}
          OUTPUT_TZ: Asia/Seoul
          PROJECT_ROOT: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          INPUT_JSON="site/data/reviews.json"
          if [ ! -f "$INPUT_JSON" ]; then
            echo "[ERROR] Missing input JSON: $INPUT_JSON"
            ls -la site || true
            ls -la site/data || true
            exit 1
          fi
          echo "[INFO] Using input JSON: $INPUT_JSON"

          rm -rf reports/voc_crema || true
          mkdir -p reports/voc_crema

          python -u crema_voc.py --input "$INPUT_JSON"

          if [ -f "site/index.html" ]; then
            echo "[INFO] Syncing site/ -> reports/voc_crema/ (with --delete)"
            rsync -a --delete site/ reports/voc_crema/
          else
            echo "[ERROR] site/index.html not found after run"
            ls -la site || true
            exit 1
          fi

          test -f reports/voc_crema/index.html

      # ----------------------------
      # 4.5) Naver Blog VOC
      # - 기본/스케줄: 실행 (단, voc_only=true면 스킵)
      # - blog_only=true면 이것만 실행되도록 다른 스텝들이 위에서 스킵됨
      # ✅ FIX: NAVER_CLIENT_ID/SECRET env 주입
      # ----------------------------
      - name: Run Naver Blog VOC (Columbia mentions)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.voc_only != 'true' }}
        shell: bash
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          rm -rf reports/voc_blog || true
          mkdir -p reports/voc_blog

          python -u build_blog_voc_report.py \
            --queries "콜롬비아" "컬럼비아" "Columbia" "콜롬비아 자켓" "콜롬비아 패딩" "콜롬비아 양말" \
            --days 60 \
            --per-query 100 \
            --headless \
            --out-dir reports/voc_blog

          test -f reports/voc_blog/index.html

      # ----------------------------
      # 5) Summary (skip on voc_only=true or blog_only=true)
      # ----------------------------
      - name: Build Summary (reports/index.html + meta.json)
        if: ${{ github.event_name != 'workflow_dispatch' || (inputs.voc_only != 'true' && inputs.blog_only != 'true') }}
        env:
          UPDATED_KST: ${{ steps.set_time.outputs.kst }}
        run: |
          set -euo pipefail
          python -u build_summary.py
          test -f reports/index.html
          test -f reports/meta.json

      # ----------------------------
      # 6) Badge stamp (skip on voc_only=true or blog_only=true)
      # ----------------------------
      - name: Stamp "Last updated" badge into reports HTML
        if: ${{ github.event_name != 'workflow_dispatch' || (inputs.voc_only != 'true' && inputs.blog_only != 'true') }}
        shell: bash
        env:
          UPDATED_KST: ${{ steps.set_time.outputs.kst }}
        run: |
          set -euo pipefail
          echo "Stamping updated time: ${UPDATED_KST}"
          # (기존 배지 주입 스크립트는 네가 쓰던 그대로 여기에 유지하면 됨)
          # ... (생략)

      # ----------------------------
      # 7) Commit & push results
      # ----------------------------
      - name: Commit & push results
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports site .naver_cache || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Daily auto update (reports)" || true

          git pull --rebase origin main
          git push origin HEAD:main
