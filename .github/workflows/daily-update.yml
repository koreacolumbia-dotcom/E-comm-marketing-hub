name: Daily Update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"

      daily_only:
        description: "Run Daily Digest report only?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      voc_only:
        description: "Run Crema VOC only?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      blog_only:
        description: "Run Blog VOC only?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      debug:
        description: "Enable debug logs? (prints more logs, keeps extra debug json)"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      owned_only:
        description: "Run OWNED portal only?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      owned_backfill:
        description: "Backfill OWNED portal from 2025-01-01 to yesterday? (warning: can be heavy)"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

      owned_recent_days:
        description: "OWNED incremental refresh window (days). Used when owned_backfill=false"
        required: true
        default: "7"
        type: choice
        options: ["1", "3", "7", "14", "30"]

  schedule:
    # ✅ KST 06:30 = UTC 21:30 (전날)
    - cron: "30 21 * * *"

concurrency:
  group: daily-update-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main (rebase)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      # ---------------------------------------------------------
      # ✅ Mode resolver
      # ---------------------------------------------------------
      - name: Resolve run modes
        id: modes
        shell: bash
        run: |
          set -euo pipefail

          EVENT="${{ github.event_name }}"

          DAILY_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.daily_only == 'true' }}"
          VOC_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.voc_only == 'true' }}"
          BLOG_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.blog_only == 'true' }}"
          OWNED_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.owned_only == 'true' }}"
          OWNED_BACKFILL="${{ github.event_name == 'workflow_dispatch' && inputs.owned_backfill == 'true' }}"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            cnt=0
            [ "$DAILY_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$VOC_ONLY"   = "true" ] && cnt=$((cnt+1))
            [ "$BLOG_ONLY"  = "true" ] && cnt=$((cnt+1))
            [ "$OWNED_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$OWNED_BACKFILL" = "true" ] && cnt=$((cnt+1))
            if [ "$cnt" -gt 1 ]; then
              echo "[ERROR] Only one of daily_only/voc_only/blog_only/owned_only/owned_backfill can be true."
              exit 1
            fi
          fi

          # ✅ Default: run ONLY daily (schedule/normal runs)
          RUN_DAILY=true
          RUN_PRICE=false
          RUN_HERO=false
          RUN_EXTSIG=false
          RUN_CREMA=false
          RUN_BLOG=false
          RUN_SUMMARY=false
          RUN_OWNED=false

          if [ "$OWNED_BACKFILL" = "true" ] || [ "$OWNED_ONLY" = "true" ]; then
            RUN_DAILY=false
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=true
          fi

          if [ "$DAILY_ONLY" = "true" ]; then
            RUN_DAILY=true
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=false
          fi

          if [ "$VOC_ONLY" = "true" ]; then
            RUN_DAILY=false
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=true
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=false
          fi

          if [ "$BLOG_ONLY" = "true" ]; then
            RUN_DAILY=false
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=true
            RUN_SUMMARY=false
            RUN_OWNED=false
          fi

          echo "run_daily=$RUN_DAILY"       >> $GITHUB_OUTPUT
          echo "run_price=$RUN_PRICE"       >> $GITHUB_OUTPUT
          echo "run_hero=$RUN_HERO"         >> $GITHUB_OUTPUT
          echo "run_extsig=$RUN_EXTSIG"     >> $GITHUB_OUTPUT
          echo "run_crema=$RUN_CREMA"       >> $GITHUB_OUTPUT
          echo "run_blog=$RUN_BLOG"         >> $GITHUB_OUTPUT
          echo "run_summary=$RUN_SUMMARY"   >> $GITHUB_OUTPUT
          echo "run_owned=$RUN_OWNED"       >> $GITHUB_OUTPUT

          echo "owned_backfill=$OWNED_BACKFILL" >> $GITHUB_OUTPUT
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "owned_recent_days=${{ inputs.owned_recent_days }}" >> $GITHUB_OUTPUT
            echo "debug=${{ inputs.debug }}" >> $GITHUB_OUTPUT
          else
            echo "owned_recent_days=7" >> $GITHUB_OUTPUT
            echo "debug=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          # BigQuery/Pandas
          pip install db-dtypes pyarrow google-cloud-bigquery pandas


          # Crema VOC ML/NLP
          pip install scikit-learn sentence-transformers
          # ✅ VOC ML/DL (topics + embeddings clusters)
          pip install scikit-learn
          pip install sentence-transformers

          # HTML→PNG 렌더링용
          pip install playwright
          playwright install --with-deps chromium

      - name: Ensure reports dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports

      - name: Set KST time (for badge/meta + yesterday)
        id: set_time
        shell: bash
        run: |
          set -euo pipefail
          echo "kst=$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')" >> $GITHUB_OUTPUT
          echo "kst_date=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "yesterday_ymd=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      # =========================================================
      # Daily Digest Report (어제 날짜만 생성)
      # =========================================================
      - name: Build Daily Digest (yesterday only)
        if: ${{ steps.modes.outputs.run_daily == 'true' }}
        shell: bash
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
          DAILY_DIGEST_SKIP_IF_EXISTS: "false"
          DAILY_DIGEST_USE_DATA_CACHE: "false"
          DAILY_DIGEST_WRITE_DATA_CACHE: "true"
          DAILY_DIGEST_SKIP_HUB_WRITE: "false"
        run: |
          set -euo pipefail

          if [ -z "${GA4_PROPERTY_ID:-}" ]; then
            echo "[WARN] GA4_PROPERTY_ID is empty. skip."
            exit 0
          fi
          if [ -z "${GOOGLE_SA_JSON_B64:-}" ]; then
            echo "[WARN] GOOGLE_SA_JSON_B64 is empty. skip."
            exit 0
          fi

          echo "$GOOGLE_SA_JSON_B64" | base64 -d > /tmp/ga_sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/ga_sa.json

          mkdir -p reports/daily_digest/daily reports/daily_digest/data/daily

          echo "[INFO] Purge old outputs for ${YMD}"
          rm -f "reports/daily_digest/daily/${YMD}.html" \
                "reports/daily_digest/data/daily/${YMD}.json" || true

          echo "[INFO] Build only: ${YMD}"
          export GA4_START_DATE="${YMD}"
          export GA4_END_DATE="${YMD}"
          python -u daily_digest_live_final.py --out-dir reports/daily_digest

          echo "[INFO] Outputs:"
          ls -la reports/daily_digest/daily | tail -n 40 || true
          ls -la reports/daily_digest/data/daily | tail -n 40 || true

      - name: Render yesterday Daily Digest PNG
        if: ${{ success() && steps.modes.outputs.run_daily == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
        run: |
          set -euo pipefail
          HTML="reports/daily_digest/daily/${YMD}.html"
          PNG="reports/daily_digest/daily/${YMD}.png"

          if [ ! -f "$HTML" ]; then
            echo "[WARN] Daily HTML not found for PNG render: $HTML"
            ls -la reports/daily_digest/daily || true
            exit 0
          fi

          python -u scripts/render_daily_png.py "$HTML" "$PNG" || true
          ls -la "$PNG" || true

      # ----------------------------
      # 4) Crema VOC (COLLECT -> BUILD)  ✅ FIX: voc_crema.py requires --mode
      # ----------------------------
      - name: Run Crema VOC (collect -> build dashboard)
        if: ${{ steps.modes.outputs.run_crema == 'true' }}
        continue-on-error: true
        env:
          CREMA_SECURE_DEVICE_TOKEN: ${{ secrets.CREMA_SECURE_DEVICE_TOKEN }}
          OUTPUT_TZ: Asia/Seoul
          PROJECT_ROOT: ${{ github.workspace }}
          TARGET_DAYS: 7
          DEBUG: ${{ steps.modes.outputs.debug == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          RAW_DIR="reports/crema_raw"
          RAW_JSON="${RAW_DIR}/reviews.json"
          mkdir -p "${RAW_DIR}"
          rm -f "${RAW_JSON}" || true

          echo "[INFO] Crema collect (voc_crema.py) -> site/data/reviews.json, then copy -> ${RAW_JSON}"
          echo "[DEBUG] debug=${DEBUG}"

          # ---- 1) COLLECT (✅ fixed: voc_crema.py requires --mode)
          # daily mode: 최근 N일만
          set +e
          python -u crema_voc.py \
            --mode daily \
            --recent-days "${TARGET_DAYS}" \
            --keep-site-output
          RC=$?
          set -e

          if [ "$RC" -ne 0 ]; then
            echo "[WARN] voc_crema.py failed (rc=$RC). Skip build0ㅔ."
            exit 0
          fi

          # collector output: site/data/reviews.json (standard)
          if [ ! -f "site/data/reviews.json" ]; then
            echo "[ERROR] Collector output missing: site/data/reviews.json"
            echo "[DEBUG] site/data listing:"
            ls -lah site/data || true
            exit 0
          fi

          # copy to RAW_JSON for builder consistency
          cp -f "site/data/reviews.json" "${RAW_JSON}" || true

          echo "[DEBUG] raw dir:"
          ls -lah "${RAW_DIR}" || true
          echo "[DEBUG] raw file size:"
          ls -lah "${RAW_JSON}" || true=

          python - << 'PY'
          import json
          p="reports/crema_raw/reviews.json"
          obj=json.load(open(p,'r',encoding='utf-8'))
          rv=obj.get("reviews", [])
          n=len(rv) if isinstance(rv,list) else -1
          print("[DEBUG] raw keys:", list(obj.keys()))
          print("[DEBUG] raw reviews len:", n)
          if n == 0:
              print("[WARN] raw reviews is 0. Upstream token/endpoint/rate-limit OR window/created_at parse issue.")
          PY

          # ---- 2) BUILD (✅ fixed: builder is build_voc_dashboard.py)
          python -u build_voc_dashboard.py \
            --input "${RAW_JSON}" \
            --target-days "${TARGET_DAYS}" \
            $( [ "${DEBUG}" = "true" ] && echo "--debug" ) \
            || true

          # ---- 3) archive
          rm -rf reports/voc_crema || true
          mkdir -p reports/voc_crema

          if [ -f "site/index.html" ]; then
            rsync -a --delete site/ reports/voc_crema/ || true
          else
            echo "[WARN] site/index.html not found after build"
            ls -lah site || true
            exit 0
          fi

          echo "[INFO] voc_crema outputs:"
          ls -lah reports/voc_crema | head -n 200 || true
          ls -lah reports/voc_crema/data | head -n 200 || true
      # ----------------------------
      # 7) Commit & push results
      # ----------------------------
      - name: Commit & push results
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports site .naver_cache scripts || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git fetch origin main

          CURRENT_BRANCH="$(git rev-parse --abbrev-ref HEAD || true)"
          echo "[INFO] current branch: ${CURRENT_BRANCH}"

          git pull --rebase --autostash origin main

          git add -A reports site .naver_cache scripts || true

          if git diff --cached --quiet; then
            echo "No changes to commit after rebase"
            exit 0
          fi

          git commit -m "Daily auto update (reports)" || true

          for i in 1 2 3; do
            echo "[INFO] push attempt $i/3"
            if git push origin HEAD:main; then
              echo "[OK] pushed"
              exit 0
            fi

            echo "[WARN] push rejected. Rebase with latest origin/main and retry..."
            git fetch origin main
            git pull --rebase --autostash origin main
          done

          echo "[ERROR] failed to push after retries"
          exit 1
# ----------------------------
      # Success Email
      # ----------------------------
      - name: Send success email (yesterday daily report PNG)
        if: ${{ success() && steps.modes.outputs.run_daily == 'true' }}
        continue-on-error: true
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DAILY_RECIPIENTS: ${{ vars.DAILY_RECIPIENTS }}
          HUB_URL: ${{ vars.HUB_URL }}
          KST_STAMP: ${{ steps.set_time.outputs.kst }}

          MODE_DAILY_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.daily_only == 'true' }}
          MODE_VOC_ONLY:   ${{ github.event_name == 'workflow_dispatch' && inputs.voc_only == 'true' }}
          MODE_BLOG_ONLY:  ${{ github.event_name == 'workflow_dispatch' && inputs.blog_only == 'true' }}

          REPORT_DATE: ${{ steps.set_time.outputs.yesterday_ymd }}

          DAILY_DIGEST_PNG_PATH: reports/daily_digest/daily/${{ steps.set_time.outputs.yesterday_ymd }}.png
          DAILY_DIGEST_HTML_PATH: reports/daily_digest/daily/${{ steps.set_time.outputs.yesterday_ymd }}.html
        shell: bash
        run: |
          set -euo pipefail

          echo "[DEBUG] REPORT_DATE=${REPORT_DATE}"
          echo "[DEBUG] DAILY_DIGEST_PNG_PATH=${DAILY_DIGEST_PNG_PATH}"
          echo "[DEBUG] DAILY_DIGEST_HTML_PATH=${DAILY_DIGEST_HTML_PATH}"

          if [ ! -f "${DAILY_DIGEST_PNG_PATH}" ]; then
            echo "[WARN] PNG not found. Listing daily dir:"
            ls -la reports/daily_digest/daily || true
          fi

          python -u scripts/send_daily_email.py || true
 
