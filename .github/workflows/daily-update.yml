name: Daily Update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"

      mode:
        description: "Run mode"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - daily
          - voc
          - blog

  schedule:
    # ✅ KST 06:30 = UTC 21:30 (전날)
    - cron: "30 21 * * *"

# ✅ 동시 실행 레이스 방지
concurrency:
  group: daily-update-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main (rebase)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          # ✅ BigQuery dtype support
          pip install db-dtypes

          # ✅ HTML→PNG 렌더링용
          pip install playwright
          playwright install --with-deps chromium

      - name: Ensure reports dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports

      - name: Set KST time (for badge/meta + yesterday)
        id: set_time
        shell: bash
        run: |
          set -euo pipefail
          echo "kst=$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')" >> $GITHUB_OUTPUT
          echo "kst_date=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "yesterday_ymd=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      # =========================================================
      # ✅ Daily Digest Report (누적 생성 유지)
      # =========================================================
      - name: Run Daily Digest report
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'all' || inputs.mode == 'daily' }}
        shell: bash
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          GA4_START_DATE: ${{ vars.GA4_START_DATE }}
          GA4_END_DATE: ${{ vars.GA4_END_DATE }}
          KST_STAMP: ${{ steps.set_time.outputs.kst }}
        run: |
          set -euo pipefail

          if [ -z "${GA4_PROPERTY_ID:-}" ]; then
            echo "[ERROR] GA4_PROPERTY_ID is empty."
            exit 1
          fi

          if [ -z "${GOOGLE_SA_JSON_B64:-}" ]; then
            echo "[ERROR] GOOGLE_SA_JSON_B64 is empty. Set secrets.GOOGLE_SA_JSON_B64."
            exit 1
          fi

          echo "$GOOGLE_SA_JSON_B64" | base64 -d > /tmp/ga_sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/ga_sa.json

          python -c "import json; json.load(open('/tmp/ga_sa.json')); print('JSON_OK')"

          # ✅ 누적 생성: 절대 rm -rf 하지 말 것
          mkdir -p reports/daily_digest/daily reports/daily_digest/weekly

          # 실행 (out-dir 지원/미지원 모두 대응)
          python -u daily_digest_live_final.py --out-dir reports/daily_digest \
            || python -u daily_digest_live_final.py

          # ✅ 진단용 스탬프
          if [ -f reports/daily_digest/index.html ]; then
            echo "<!-- BUILD_STAMP: ${KST_STAMP} -->" >> reports/daily_digest/index.html
          fi

          ls -la reports/daily_digest/daily | tail -n 60 || true
          ls -la reports/daily_digest/weekly | tail -n 60 || true

      # =========================================================
      # ✅ Render yesterday daily HTML -> PNG (for email)
      # =========================================================
      - name: Render yesterday Daily Digest PNG
        if: ${{ success() && (github.event_name != 'workflow_dispatch' || inputs.mode == 'all' || inputs.mode == 'daily') }}
        shell: bash
        env:
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
        run: |
          set -euo pipefail
          HTML="reports/daily_digest/daily/${YMD}.html"
          PNG="reports/daily_digest/daily/${YMD}.png"

          if [ ! -f "$HTML" ]; then
            echo "[WARN] Daily HTML not found for PNG render: $HTML"
            ls -la reports/daily_digest/daily || true
            exit 0
          fi

          python -u scripts/render_daily_png.py "$HTML" "$PNG"
          test -f "$PNG"
          ls -la "$PNG"

      # ----------------------------
      # 1) Naver Lowest Price
      # ----------------------------
      - name: Run Naver Lowest Price crawler
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'all' }}
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          python -u naver_crawl_columbia_c6c7_title_min.py \
            --limit 999999 \
            --output_html reports/naver_lowest_price.html \
            --history_dir . \
            --cache_dir .naver_cache
          test -f reports/naver_lowest_price.html

      # ----------------------------
      # 2) Hero banner
      # ----------------------------
      - name: Run Hero banner crawler
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'all' }}
        shell: bash
        run: |
          set -euo pipefail
          HTML_USE_ABSOLUTE_FILE_URL=0 OUT_DIR=reports python -u hero_main_top3_final_PRETTY_WHITE_FINAL_FIXED.py
          test -f reports/hero_main.html

      # ----------------------------
      # 3) External Signal (VOC)
      # ----------------------------
      - name: Run External Signal (VOC)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'all' }}
        shell: bash
        run: |
          set -euo pipefail
          python -u external_signal_combined.py
          test -f reports/external_signal.html

      # ----------------------------
      # 4) Crema VOC
      # ----------------------------
      - name: Run Crema VOC (reviews + images + dashboard)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'all' || inputs.mode == 'voc' }}
        env:
          CREMA_SECURE_DEVICE_TOKEN: ${{ secrets.CREMA_SECURE_DEVICE_TOKEN }}
          OUTPUT_TZ: Asia/Seoul
          PROJECT_ROOT: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          INPUT_JSON="site/data/reviews.json"
          if [ ! -f "$INPUT_JSON" ]; then
            echo "[ERROR] Missing input JSON: $INPUT_JSON"
            ls -la site || true
            ls -la site/data || true
            exit 1
          fi

          rm -rf reports/voc_crema || true
          mkdir -p reports/voc_crema

          python -u crema_voc.py --input "$INPUT_JSON"

          if [ -f "site/index.html" ]; then
            rsync -a --delete site/ reports/voc_crema/
          else
            echo "[ERROR] site/index.html not found after run"
            exit 1
          fi

          test -f reports/voc_crema/index.html

      # ----------------------------
      # 4.5) Naver Blog VOC
      # ----------------------------
      - name: Run Naver Blog VOC (Columbia mentions)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'all' || inputs.mode == 'blog' }}
        shell: bash
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          rm -rf reports/voc_blog || true
          mkdir -p reports/voc_blog

          python -u build_blog_voc_report.py \
            --queries "콜롬비아" "컬럼비아" "Columbia" "콜롬비아 자켓" "콜롬비아 패딩" "콜롬비아 양말" \
            --days 60 \
            --per-query 100 \
            --headless \
            --out-dir reports/voc_blog

          test -f reports/voc_blog/index.html

      # ----------------------------
      # 5) Summary
      # ----------------------------
      - name: Build Summary (reports/index.html + meta.json)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'all' }}
        env:
          UPDATED_KST: ${{ steps.set_time.outputs.kst }}
        shell: bash
        run: |
          set -euo pipefail
          python -u build_summary.py
          test -f reports/index.html
          test -f reports/meta.json

      # ----------------------------
      # 7) Commit & push results
      # ----------------------------
      - name: Commit & push results
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports site .naver_cache || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily auto update (reports)" || true
            git push origin HEAD:main
          fi

      # ----------------------------
      # ✅ Success Email (Daily only)
      # ----------------------------
      - name: Send success email (yesterday daily report PNG)
        if: ${{ success() && (github.event_name != 'workflow_dispatch' || inputs.mode == 'all' || inputs.mode == 'daily') }}
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DAILY_RECIPIENTS: ${{ vars.DAILY_RECIPIENTS }}
          HUB_URL: ${{ vars.HUB_URL }}
          KST_STAMP: ${{ steps.set_time.outputs.kst }}

          REPORT_DATE: ${{ steps.set_time.outputs.yesterday_ymd }}

          DAILY_DIGEST_PNG_PATH: reports/daily_digest/daily/${{ steps.set_time.outputs.yesterday_ymd }}.png
          DAILY_DIGEST_HTML_PATH: reports/daily_digest/daily/${{ steps.set_time.outputs.yesterday_ymd }}.html
        shell: bash
        run: |
          set -euo pipefail

          echo "[DEBUG] REPORT_DATE=${REPORT_DATE}"
          echo "[DEBUG] DAILY_DIGEST_PNG_PATH=${DAILY_DIGEST_PNG_PATH}"
          echo "[DEBUG] DAILY_DIGEST_HTML_PATH=${DAILY_DIGEST_HTML_PATH}"

          if [ ! -f "${DAILY_DIGEST_PNG_PATH}" ]; then
            echo "[WARN] PNG not found. Listing daily dir:"
            ls -la reports/daily_digest/daily || true
          fi

          python -u scripts/send_daily_email.py
