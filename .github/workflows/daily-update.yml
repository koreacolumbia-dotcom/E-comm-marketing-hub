name: Crema Only Test

on:
  workflow_dispatch:

jobs:
  crema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - name: Run Crema
        env:
          CREMA_SECURE_DEVICE_TOKEN: ${{ secrets.CREMA_SECURE_DEVICE_TOKEN }}
          CREMA_DOMAIN: columbiakorea.co.kr
          CREMA_WIDGET_ID: "2"
          CREMA_PER_PAGE: "30"
          OUTPUT_TZ: Asia/Seoul
        run: |
          python -u crema_voc.py
          ls -R
