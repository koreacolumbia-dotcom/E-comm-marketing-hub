name: Daily Update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"
  schedule:
    # KST 08:00 = UTC 23:00 (전날)
    - cron: "0 23 * * *"

concurrency:
  group: daily-update-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ensure reports dir
        run: |
          mkdir -p reports

      - name: Run Naver Lowest Price crawler
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python -u naver_crawl_columbia_c6c7_title_min.py \
            --limit 999999 \
            --output_html reports/naver_lowest_price.html \
            --history_dir . \
            --cache_dir .naver_cache

      - name: Run Hero banner crawler
        run: |
          HTML_USE_ABSOLUTE_FILE_URL=0 OUT_DIR=reports python -u hero_main_top3_final_PRETTY_WHITE_FINAL_FIXED.py
          test -f reports/hero_main.html

      - name: Run External Signal (VOC)
        run: |
          python -u external_signal_combined.py
          test -f reports/external_signal.html

      - name: Stamp "Last updated" badge into reports HTML
        shell: bash
        run: |
          set -euo pipefail

          UPDATED_KST="$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')"
          echo "Stamping updated time: ${UPDATED_KST}"

          # ✅ 배지 HTML 템플릿을 base64(1줄)로 보관 → YAML 멀티라인/EOF 파싱 깨짐 방지
          BADGE_B64=""

          for f in reports/*.html; do
            [ -f "$f" ] || continue

            # 1) 기존 배지 제거(중복 방지)
            perl -0777 -i -pe 's/<!-- AUTO_UPDATED_BADGE_START -->.*?<!-- AUTO_UPDATED_BADGE_END -->\s*//sg' "$f"

            # 2) 배지 생성 + 시간 치환
            echo "$BADGE_B64" | base64 -d > /tmp/_badge_block.html
            perl -i -pe "s|__UPDATED_KST__|$UPDATED_KST|g" /tmp/_badge_block.html

            # 3) <body ...> 바로 다음에 삽입
            perl -0777 -i -pe '
              my $ins = do { local $/; open my $fh, "<", "/tmp/_badge_block.html"; <$fh> };
              s{(<body\b[^>]*>)}{$1\n$ins}i;
            ' "$f"

            echo "Stamped: $f"
          done

      - name: Commit & push results
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1️⃣ 작업트리 임시 보관 (unstaged 포함)
          git stash push -u -m "actions-temp" || true

          # 2️⃣ 최신 main 반영
          git pull --rebase origin main

          # 3️⃣ 스태시 복원
          git stash pop || true

          # 4️⃣ 변경사항 커밋
          git add reports/ .naver_cache || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Daily auto update (reports)"
          git push origin main
