name: Daily Update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"
  schedule:
    # KST 08:00 = UTC 23:00 (전날)
    - cron: "0 23 * * *"

concurrency:
  group: daily-update-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ 충돌 방지: 먼저 최신 main을 당겨놓고 작업 시작
      - name: Pull latest main (rebase)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # hero 배너 크롤러에서 playwright 쓰는 경우 대비
          playwright install --with-deps chromium

      - name: Ensure reports dir
        run: |
          mkdir -p reports

      # ✅ 배지/메타에 찍을 KST 시간(다음 스텝에서 사용)
      - name: Set KST time (for badge/meta)
        id: set_time
        shell: bash
        run: |
          echo "kst=$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')" >> $GITHUB_OUTPUT
          echo "kst_date=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      # ----------------------------
      # 1) Naver Lowest Price
      # ----------------------------
      - name: Run Naver Lowest Price crawler
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          python -u naver_crawl_columbia_c6c7_title_min.py \
            --limit 999999 \
            --output_html reports/naver_lowest_price.html \
            --history_dir . \
            --cache_dir .naver_cache
          test -f reports/naver_lowest_price.html

      # ----------------------------
      # 2) Hero banner
      # ----------------------------
      - name: Run Hero banner crawler
        run: |
          set -euo pipefail
          HTML_USE_ABSOLUTE_FILE_URL=0 OUT_DIR=reports python -u hero_main_top3_final_PRETTY_WHITE_FINAL_FIXED.py
          test -f reports/hero_main.html

      # ----------------------------
      # 3) External Signal (VOC)
      # ----------------------------
      - name: Run External Signal (VOC)
        run: |
          set -euo pipefail
          python -u external_signal_combined.py
          test -f reports/external_signal.html

      # ----------------------------
      # 4) Crema VOC
      #   - crema_voc.py 가 --input 필수 → 반드시 제공
      #   - crema_voc.py는 --out_dir 미지원(현재 로그 기준) → 옵션 제거
      #   - 기존 산출물 폴더 삭제로 "덮어쓰기 업데이트" 강제
      #   - 결과가 site/로 생성되면 reports/voc_crema로 rsync(--delete) 동기화
      # ----------------------------
      - name: Run Crema VOC (reviews + images + dashboard)
        env:
          CREMA_SECURE_DEVICE_TOKEN: ${{ secrets.CREMA_SECURE_DEVICE_TOKEN }}
          CREMA_DOMAIN: columbiakorea.co.kr
          CREMA_WIDGET_ID: "2"
          CREMA_PER_PAGE: "30"
          OUTPUT_TZ: Asia/Seoul
          PROJECT_ROOT: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          # (0) 입력 JSON 자동 탐색 (레포 내 reviews.json)
          CANDIDATES=(
            "data/reviews.json"
            "config/reviews.json"
            "reviews.json"
            "site/data/reviews.json"
          )

          INPUT_JSON=""
          for p in "${CANDIDATES[@]}"; do
            if [ -f "$p" ]; then
              INPUT_JSON="$p"
              break
            fi
          done

          # 그래도 없으면 레포 전체에서 1개 찾기
          if [ -z "$INPUT_JSON" ]; then
            INPUT_JSON="$(ls -1 **/reviews.json 2>/dev/null | head -n 1 || true)"
          fi

          if [ -z "$INPUT_JSON" ] || [ ! -f "$INPUT_JSON" ]; then
            echo "[ERROR] reviews.json not found in repo. Put it in e.g. data/reviews.json"
            echo "Repo root:"
            pwd
            echo "Top-level files:"
            ls -la
            echo "Find candidates:"
            (find . -maxdepth 6 -type f -name "reviews.json" -print || true)
            exit 1
          fi

          echo "[INFO] Using input JSON: $INPUT_JSON"

          # ✅ (1) 덮어쓰기 강제: 이전 산출물 제거
          rm -rf reports/voc_crema || true
          mkdir -p reports/voc_crema

          # ✅ (2) 실행: --out_dir 같은 미지원 옵션 금지
          python -u crema_voc.py --input "$INPUT_JSON"

          # ✅ (3) 결과 동기화 (site/로 생성되는 경우가 많음)
          if [ -f "site/index.html" ]; then
            echo "[INFO] Found site/index.html. Syncing site/ -> reports/voc_crema/ (with --delete)"
            rsync -a --delete site/ reports/voc_crema/
          elif [ -f "reports/voc_crema/index.html" ]; then
            echo "[INFO] Output already in reports/voc_crema/"
          else
            echo "[ERROR] Neither site/index.html nor reports/voc_crema/index.html exists"
            echo "--- ls -la ---"
            ls -la
            echo "--- ls -la site ---"
            ls -la site || true
            echo "--- ls -la reports ---"
            ls -la reports || true
            exit 1
          fi

          # ✅ (4) 최종 검증
          test -f reports/voc_crema/index.html


      # ----------------------------
      # 5) Summary 생성 (reports/index.html + reports/meta.json)
      # ----------------------------
      - name: Build Summary (reports/index.html + meta.json)
        env:
          UPDATED_KST: ${{ steps.set_time.outputs.kst }}
        run: |
          set -euo pipefail
          python -u build_summary.py
          test -f reports/index.html
          test -f reports/meta.json

      # ----------------------------
      # 6) "Last updated" 배지: reports/*.html에 자동 주입
      # ----------------------------
      - name: Stamp "Last updated" badge into reports HTML
        shell: bash
        env:
          UPDATED_KST: ${{ steps.set_time.outputs.kst }}
        run: |
          set -euo pipefail
          echo "Stamping updated time: ${UPDATED_KST}"

          cat <<'EOF' > /tmp/_badge_block.html
          <!-- AUTO_UPDATED_BADGE_START -->
          <style>
            @keyframes _pulse {
              0%, 100% { transform: scale(1); opacity: 1; }
              50% { transform: scale(1.12); opacity: .55; }
            }
            .auto-updated-badge-wrap{
              position:static; z-index:99999;
              font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, Noto Sans KR, Arial;
              margin:10px 0 22px 0;
            }
            .auto-updated-badge{
              display:flex; gap:10px; align-items:center;
              padding:10px 12px; border-radius:16px;
              background:rgba(255,255,255,.75);
              backdrop-filter:blur(12px);
              border:1px solid rgba(15,23,42,.10);
              box-shadow:0 10px 30px rgba(15,23,42,.08);
            }
            .auto-updated-dot{
              width:10px; height:10px; border-radius:999px;
              background:#22c55e;
              box-shadow:0 0 0 5px rgba(34,197,94,.15);
              animation:_pulse 1.2s ease-in-out infinite;
            }
            .auto-updated-txt{ display:flex; flex-direction:column; line-height:1.15; }
            .auto-updated-txt .t1{
              font-size:11px; font-weight:800; color:#0f172a;
              letter-spacing:-.2px; text-transform:uppercase;
            }
            .auto-updated-txt .t2{
              font-size:11px; color:rgba(15,23,42,.72);
              margin-top:2px;
            }
          </style>

          <div class="auto-updated-badge-wrap" aria-label="Last updated badge">
            <div class="auto-updated-badge">
              <span class="auto-updated-dot"></span>
              <div class="auto-updated-txt">
                <div class="t1">Last updated</div>
                <div class="t2">__UPDATED_KST__</div>
              </div>
            </div>
          </div>

          <script>
            (function(){
              function mount(){
                const badge = document.querySelector('.auto-updated-badge-wrap');
                if(!badge) return;

                const sidebar = document.querySelector('aside.sidebar');
                if(sidebar){
                  const first = sidebar.firstElementChild;
                  if(first && first.nextSibling){
                    sidebar.insertBefore(badge, first.nextSibling);
                  }else{
                    sidebar.prepend(badge);
                  }
                  badge.style.position = 'static';
                  badge.style.top = '';
                  badge.style.right = '';
                  return;
                }

                badge.style.position = 'fixed';
                badge.style.top = '16px';
                badge.style.right = '16px';
              }

              if(document.readyState === 'loading'){
                document.addEventListener('DOMContentLoaded', mount);
              }else{
                mount();
              }
            })();
          </script>
          <!-- AUTO_UPDATED_BADGE_END -->
          EOF

          python - <<'PY'
          import os
          p = "/tmp/_badge_block.html"
          with open(p, "r", encoding="utf-8") as f:
            s = f.read()
          s = s.replace("__UPDATED_KST__", os.environ["UPDATED_KST"])
          with open(p, "w", encoding="utf-8") as f:
            f.write(s)
          PY

          for f in reports/*.html; do
            [ -f "$f" ] || continue
            perl -0777 -i -pe 's/<!-- AUTO_UPDATED_BADGE_START -->.*?<!-- AUTO_UPDATED_BADGE_END -->\s*//sg' "$f"
            perl -0777 -i -pe '
              my $ins = do { local $/; open my $fh, "<", "/tmp/_badge_block.html"; <$fh> };
              s{(<body\b[^>]*>)}{$1\n$ins}i;
            ' "$f"
            echo "Stamped: $f"
          done

      # ----------------------------
      # 7) Commit & push results
      #   - site/도 생성될 수 있어서 같이 add
      #   - push 직전에 한번 더 rebase해서 경합 완화
      # ----------------------------
      - name: Commit & push results
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports site .naver_cache || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Daily auto update (reports)" || true

          git pull --rebase origin main
          git push origin HEAD:main
