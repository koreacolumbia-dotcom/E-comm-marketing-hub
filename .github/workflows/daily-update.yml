name: Daily Update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"
  schedule:
    # KST 08:00 = UTC 23:00 (전날)
    - cron: "0 23 * * *"

concurrency:
  group: daily-update-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ensure reports dir
        run: |
          mkdir -p reports

      # ✅ 배지에 찍을 KST 시간(다음 스텝에서 사용)
      - name: Set KST time (for badge)
        id: set_time
        shell: bash
        run: |
          echo "kst=$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')" >> $GITHUB_OUTPUT

      - name: Run Naver Lowest Price crawler
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python -u naver_crawl_columbia_c6c7_title_min.py \
            --limit 999999 \
            --output_html reports/naver_lowest_price.html \
            --history_dir . \
            --cache_dir .naver_cache

      - name: Run Hero banner crawler
        run: |
          HTML_USE_ABSOLUTE_FILE_URL=0 OUT_DIR=reports python -u hero_main_top3_final_PRETTY_WHITE_FINAL_FIXED.py
          test -f reports/hero_main.html

      - name: Run External Signal (VOC)
        run: |
          python -u external_signal_combined.py
          test -f reports/external_signal.html

      - name: Stamp "Last updated" badge into reports HTML (move to left sidebar)
        shell: bash
        env:
          UPDATED_KST: ${{ steps.set_time.outputs.kst }}
        run: |
          set -euo pipefail
          echo "Stamping updated time: ${UPDATED_KST}"

          # 1) 배지 템플릿 생성(placeholder 포함)
          cat <<'EOF' > /tmp/_badge_block.html
          <!-- AUTO_UPDATED_BADGE_START -->
          <style>
            .auto-updated-badge-wrap{
              position:static; z-index:99999;
              font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, Noto Sans KR, Arial;
              margin:10px 0 22px 0;
            }
            .auto-updated-badge{
              display:flex; gap:10px; align-items:center;
              padding:10px 12px; border-radius:16px;
              background:rgba(255,255,255,.75);
              backdrop-filter:blur(12px);
              border:1px solid rgba(15,23,42,.10);
              box-shadow:0 10px 30px rgba(15,23,42,.08);
            }
            .auto-updated-dot{
              width:10px; height:10px; border-radius:999px;
              background:#22c55e;
              box-shadow:0 0 0 5px rgba(34,197,94,.15);
            }
            .auto-updated-txt{ display:flex; flex-direction:column; line-height:1.15; }
            .auto-updated-txt .t1{
              font-size:11px; font-weight:800; color:#0f172a;
              letter-spacing:-.2px; text-transform:uppercase;
            }
            .auto-updated-txt .t2{
              font-size:11px; color:rgba(15,23,42,.72);
              margin-top:2px;
            }
          </style>

          <div class="auto-updated-badge-wrap" aria-label="Last updated badge">
            <div class="auto-updated-badge">
              <span class="auto-updated-dot"></span>
              <div class="auto-updated-txt">
                <div class="t1">Last updated</div>
                <div class="t2">__UPDATED_KST__</div>
              </div>
            </div>
          </div>

          <script>
            (function(){
              function mount(){
                const badge = document.querySelector('.auto-updated-badge-wrap');
                if(!badge) return;

                const sidebar = document.querySelector('aside.sidebar');
                if(sidebar){
                  // 로고 블록(대부분 sidebar 첫 요소) 바로 아래에 삽입
                  const first = sidebar.firstElementChild;
                  if(first && first.nextSibling){
                    sidebar.insertBefore(badge, first.nextSibling);
                  }else{
                    sidebar.prepend(badge);
                  }
                  badge.style.position = 'static';
                  badge.style.top = '';
                  badge.style.right = '';
                  return;
                }

                // fallback: sidebar 없는 페이지는 우상단 고정
                badge.style.position = 'fixed';
                badge.style.top = '16px';
                badge.style.right = '16px';
              }

              if(document.readyState === 'loading'){
                document.addEventListener('DOMContentLoaded', mount);
              }else{
                mount();
              }
            })();
          </script>
          <!-- AUTO_UPDATED_BADGE_END -->
          EOF

          # 2) placeholder 시간 치환
          python - <<'PY'
          import os
          p = "/tmp/_badge_block.html"
          with open(p, "r", encoding="utf-8") as f:
            s = f.read()
          s = s.replace("__UPDATED_KST__", os.environ["UPDATED_KST"])
          with open(p, "w", encoding="utf-8") as f:
            f.write(s)
          PY

          # 3) 각 reports/*.html에 주입
          for f in reports/*.html; do
            [ -f "$f" ] || continue

            # 중복 방지: 기존 블록 제거
            perl -0777 -i -pe 's/<!-- AUTO_UPDATED_BADGE_START -->.*?<!-- AUTO_UPDATED_BADGE_END -->\s*//sg' "$f"

            # <body ...> 바로 다음에 삽입
            perl -0777 -i -pe '
              my $ins = do { local $/; open my $fh, "<", "/tmp/_badge_block.html"; <$fh> };
              s{(<body\b[^>]*>)}{$1\n$ins}i;
            ' "$f"

            echo "Stamped: $f"
          done

      - name: Commit & push results
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git stash push -u -m "actions-temp" || true
          git pull --rebase origin main
          git stash pop || true

          git add reports/ .naver_cache || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Daily auto update (reports)"
          git push origin main
