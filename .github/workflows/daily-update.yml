name: Daily Update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"
      voc_only:
        description: "Run VOC only? (true/false)"
        required: false
        default: "false"
  schedule:
    # KST 08:00 = UTC 23:00 (전날)
    - cron: "0 23 * * *"

concurrency:
  group: daily-update-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ 충돌 방지: 먼저 최신 main을 당겨놓고 작업 시작
      - name: Pull latest main (rebase)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ensure reports dir
        run: |
          mkdir -p reports

      # ✅ 배지/메타에 찍을 KST 시간(다음 스텝에서 사용)
      - name: Set KST time (for badge/meta)
        id: set_time
        shell: bash
        run: |
          echo "kst=$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')" >> $GITHUB_OUTPUT
          echo "kst_date=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      # ----------------------------
      # 1) Naver Lowest Price (FULL RUN에서만)
      # ----------------------------
      - name: Run Naver Lowest Price crawler
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.voc_only != 'true' }}
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          python -u naver_crawl_columbia_c6c7_title_min.py \
            --limit 999999 \
            --output_html reports/naver_lowest_price.html \
            --history_dir . \
            --cache_dir .naver_cache
          test -f reports/naver_lowest_price.html

      # ----------------------------
      # 2) Hero banner (FULL RUN에서만)
      # ----------------------------
      - name: Run Hero banner crawler
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.voc_only != 'true' }}
        run: |
          set -euo pipefail
          HTML_USE_ABSOLUTE_FILE_URL=0 OUT_DIR=reports python -u hero_main_top3_final_PRETTY_WHITE_FINAL_FIXED.py
          test -f reports/hero_main.html

      # ----------------------------
      # 3) External Signal (FULL RUN에서만)
      # ----------------------------
      - name: Run External Signal (VOC)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.voc_only != 'true' }}
        run: |
          set -euo pipefail
          python -u external_signal_combined.py
          test -f reports/external_signal.html

      # ----------------------------
      # 4) Crema VOC (항상 실행)
      #   - 입력 JSON: site/data/reviews.json (네 레포 경로 고정)
      #   - 덮어쓰기 강제: reports/voc_crema 초기화 + rsync --delete
      # ----------------------------
      - name: Run Crema VOC (build from JSON)
        env:
          OUTPUT_TZ: Asia/Seoul
          PROJECT_ROOT: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          INPUT_JSON="site/data/reviews.json"
          if [ ! -f "$INPUT_JSON" ]; then
            echo "[ERROR] Missing input JSON: $INPUT_JSON"
            ls -la site || true
            ls -la site/data || true
            exit 1
          fi
          echo "[INFO] Using input JSON: $INPUT_JSON"

          # ✅ 덮어쓰기 강제: 이전 산출물 제거
          rm -rf reports/voc_crema || true
          mkdir -p reports/voc_crema

          # ✅ crema_voc.py는 --out_dir 미지원 → 옵션 없이 실행
          python -u crema_voc.py --input "$INPUT_JSON"

          # ✅ site/ 산출물을 reports/voc_crema로 미러링 (삭제 포함)
          if [ -f "site/index.html" ]; then
            echo "[INFO] Syncing site/ -> reports/voc_crema/ (with --delete)"
            rsync -a --delete site/ reports/voc_crema/
          else
            echo "[ERROR] site/index.html not found after run"
            ls -la site || true
            exit 1
          fi

          test -f reports/voc_crema/index.html

      # ----------------------------
      # 5) Summary 생성 (FULL RUN에서만)
      #   - voc_only=true면 summary는 건드리지 않음(기존 유지)
      # ----------------------------
      - name: Build Summary (reports/index.html + meta.json)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.voc_only != 'true' }}
        env:
          UPDATED_KST: ${{ steps.set_time.outputs.kst }}
        run: |
          set -euo pipefail
          python -u build_summary.py
          test -f reports/index.html
          test -f reports/meta.json

      # ----------------------------
      # 6) "Last updated" 배지 주입 (FULL RUN에서만)
      # ----------------------------
      - name: Stamp "Last updated" badge into reports HTML
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.voc_only != 'true' }}
        shell: bash
        env:
          UPDATED_KST: ${{ steps.set_time.outputs.kst }}
        run: |
          set -euo pipefail
          echo "Stamping updated time: ${UPDATED_KST}"

          cat <<'EOF' > /tmp/_badge_block.html
          <!-- AUTO_UPDATED_BADGE_START -->
          <style>
            @keyframes _pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.12); opacity: .55; } }
            .auto-updated-badge-wrap{ position:static; z-index:99999; font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, Noto Sans KR, Arial; margin:10px 0 22px 0; }
            .auto-updated-badge{ display:flex; gap:10px; align-items:center; padding:10px 12px; border-radius:16px; background:rgba(255,255,255,.75); backdrop-filter:blur(12px); border:1px solid rgba(15,23,42,.10); box-shadow:0 10px 30px rgba(15,23,42,.08); }
            .auto-updated-dot{ width:10px; height:10px; border-radius:999px; background:#22c55e; box-shadow:0 0 0 5px rgba(34,197,94,.15); animation:_pulse 1.2s ease-in-out infinite; }
            .auto-updated-txt{ display:flex; flex-direction:column; line-height:1.15; }
            .auto-updated-txt .t1{ font-size:11px; font-weight:800; color:#0f172a; letter-spacing:-.2px; text-transform:uppercase; }
            .auto-updated-txt .t2{ font-size:11px; color:rgba(15,23,42,.72); margin-top:2px; }
          </style>

          <div class="auto-updated-badge-wrap" aria-label="Last updated badge">
            <div class="auto-updated-badge">
              <span class="auto-updated-dot"></span>
              <div class="auto-updated-txt">
                <div class="t1">Last updated</div>
                <div class="t2">__UPDATED_KST__</div>
              </div>
            </div>
          </div>

          <script>
            (function(){
              function mount(){
                const badge = document.querySelector('.auto-updated-badge-wrap');
                if(!badge) return;
                const sidebar = document.querySelector('aside.sidebar');
                if(sidebar){
                  const first = sidebar.firstElementChild;
                  if(first && first.nextSibling){ sidebar.insertBefore(badge, first.nextSibling); }
                  else{ sidebar.prepend(badge); }
                  badge.style.position = 'static';
                  badge.style.top = '';
                  badge.style.right = '';
                  return;
                }
                badge.style.position = 'fixed';
                badge.style.top = '16px';
                badge.style.right = '16px';
              }
              if(document.readyState === 'loading'){ document.addEventListener('DOMContentLoaded', mount); }
              else{ mount(); }
            })();
          </script>
          <!-- AUTO_UPDATED_BADGE_END -->
          EOF

          python - <<'PY'
          import os
          p = "/tmp/_badge_block.html"
          s = open(p, "r", encoding="utf-8").read().replace("__UPDATED_KST__", os.environ["UPDATED_KST"])
          open(p, "w", encoding="utf-8").write(s)
          PY

          for f in reports/*.html; do
            [ -f "$f" ] || continue
            perl -0777 -i -pe 's/<!-- AUTO_UPDATED_BADGE_START -->.*?<!-- AUTO_UPDATED_BADGE_END -->\s*//sg' "$f"
            perl -0777 -i -pe '
              my $ins = do { local $/; open my $fh, "<", "/tmp/_badge_block.html"; <$fh> };
              s{(<body\b[^>]*>)}{$1\n$ins}i;
            ' "$f"
            echo "Stamped: $f"
          done

      # ----------------------------
      # 7) Commit & push results
      #   - voc_only=true면 voc_crema만 바뀌어도 커밋됨
      # ----------------------------
      - name: Commit & push results
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports site .naver_cache || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Daily auto update (reports)" || true

          git pull --rebase origin main
          git push origin HEAD:main
