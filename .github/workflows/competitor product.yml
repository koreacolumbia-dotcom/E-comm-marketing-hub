name: Competitor Product Build

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"
  schedule:
    # 01:00 KST daily = 16:00 UTC previous day
    - cron: "0 16 * * *"

concurrency:
  group: competitor-product-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run_competitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        brand: [COLUMBIA, DISCOVERY]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      HEADLESS: "1"
      MAX_PRODUCTS_PER_BRAND: "0"
      CHECKPOINT_EVERY: "100"
      BRAND_FILTER: ${{ matrix.brand }}
      RUN_BUDGET: "170m"
      SCRIPT_PATH: "competitor_outdoor_dashboard_catalog_auto.py"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main (rebase)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install \
              pandas \
              requests \
              pillow \
              openpyxl \
              matplotlib \
              playwright \
              selenium \
              webdriver-manager
          fi

          python -m playwright install --with-deps chromium

      - name: Ensure reports dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/competitor_intel

      - name: Show workspace before run
        shell: bash
        run: |
          set -euo pipefail
          echo "PWD=$(pwd)"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE:-}"
          find reports -maxdepth 3 -type f | sort || true

      - name: Run competitor crawler for ${{ matrix.brand }} with checkpoint budget
        id: crawl
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          test -f "$SCRIPT_PATH" || { echo "[ERROR] $SCRIPT_PATH not found"; exit 1; }

          status=0
          timeout --signal=TERM "$RUN_BUDGET" python -u "$SCRIPT_PATH" || status=$?

          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "0" ]; then
            echo "[OK] crawler finished for $BRAND_FILTER"
          elif [ "$status" = "124" ] || [ "$status" = "143" ]; then
            echo "[WARN] crawler reached budget for $BRAND_FILTER; checkpoints should remain and will be committed"
          else
            echo "[ERROR] crawler failed for $BRAND_FILTER with status=$status"
            exit "$status"
          fi

      - name: Inspect competitor outputs in workspace
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          echo "=== reports/competitor_intel ==="
          ls -la reports/competitor_intel || true
          echo "=== checkpoint files ==="
          find reports/competitor_intel -maxdepth 1 -type f | sort || true

      - name: Commit & push report results
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports .naver_cache scripts sql || true
          [ -f .gitignore ] && git add .gitignore || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git fetch origin main
          git pull --rebase --autostash origin main

          git add -A reports .naver_cache scripts sql || true
          [ -f .gitignore ] && git add .gitignore || true

          if git diff --cached --quiet; then
            echo "No changes to commit after rebase"
            exit 0
          fi

          git commit -m "Competitor product checkpoint update (${BRAND_FILTER})" || true

          for i in 1 2 3; do
            echo "[INFO] push attempt $i/3"
            if git push origin HEAD:main; then
              echo "[OK] pushed"
              exit 0
            fi
            git fetch origin main
            git pull --rebase --autostash origin main
          done

          echo "[ERROR] failed to push after retries"
          exit 1

      - name: Upload competitor crawl outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: competitor_intel_${{ matrix.brand }}_${{ github.run_id }}
          path: |
            reports/competitor_intel/**
          if-no-files-found: warn
