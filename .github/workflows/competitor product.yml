name: competitor_outdoor_dashboard

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      matrix:
        brand: [COLUMBIA, DISCOVERY, THE_NORTH_FACE, BLACKYAK, ARCTERYX, NEW_BALANCE, MILLET, NEPA]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install pandas requests beautifulsoup4 selenium webdriver-manager openpyxl

      - name: Run crawler
        env:
          BRAND_FILTER: ${{ matrix.brand }}
          MAX_PRODUCTS_PER_BRAND: "0"
          RESUME_ENABLED: "1"
        run: |
          python competitor_outdoor_dashboard_catalog_auto.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: competitor_intel_${{ matrix.brand }}
          path: reports/competitor_intel/**
          if-no-files-found: warn
