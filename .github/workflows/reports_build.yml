name: Reports Build

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"

      voc_only:
        description: "Run Official (Crema) VOC only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      blog_only:
        description: "Run Blog VOC only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      hero_only:
        description: "Run Hero Main crawler only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      competitor_only:
        description: "Run Competitor Product dashboard only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      owned_only:
        description: "Run OWNED portal only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      funnel_only:
        description: "Run Funnel Analysis tab only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      member_only:
        description: "Run Member Funnel only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      search_volume_only:
        description: "Run Search Volume dashboard only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      owned_backfill:
        description: "Force OWNED/Funnel seed from 2025-01-01 to yesterday? (warning: can be heavy)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      owned_recent_days:
        description: "OWNED/Funnel incremental refresh window (days). Used after initial seed is complete"
        required: true
        default: "7"
        type: choice
        options:
          - "1"
          - "3"
          - "7"
          - "14"
          - "30"

      extsig_only:
        description: "Run External Signal (VOC) only?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      summary_only:
        description: "Run Summary Dashboard only? (reports/index.html)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      debug:
        description: "Enable debug logs? (prints more logs, keeps extra debug json)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  schedule:
    # 04:00 KST daily
    - cron: "0 16 * * *"

concurrency:
  group: reports-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main (rebase)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Resolve run modes
        id: modes
        shell: bash
        run: |
          set -euo pipefail

          EVENT="${{ github.event_name }}"

          VOC_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.voc_only == 'true' }}"
          BLOG_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.blog_only == 'true' }}"
          HERO_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.hero_only == 'true' }}"
          COMPETITOR_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.competitor_only == 'true' }}"
          OWNED_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.owned_only == 'true' }}"
          FUNNEL_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.funnel_only == 'true' }}"
          MEMBER_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.member_only == 'true' }}"
          SEARCH_VOLUME_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.search_volume_only == 'true' }}"
          OWNED_BACKFILL="${{ github.event_name == 'workflow_dispatch' && inputs.owned_backfill == 'true' }}"
          EXTSIG_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.extsig_only == 'true' }}"
          SUMMARY_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.summary_only == 'true' }}"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            cnt=0
            [ "$VOC_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$BLOG_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$HERO_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$COMPETITOR_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$OWNED_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$FUNNEL_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$MEMBER_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$SEARCH_VOLUME_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$OWNED_BACKFILL" = "true" ] && cnt=$((cnt+1))
            [ "$EXTSIG_ONLY" = "true" ] && cnt=$((cnt+1))
            [ "$SUMMARY_ONLY" = "true" ] && cnt=$((cnt+1))
            if [ "$cnt" -gt 1 ]; then
              echo "[ERROR] Only one of voc_only/blog_only/hero_only/competitor_only/owned_only/funnel_only/member_only/search_volume_only/owned_backfill/extsig_only/summary_only can be true."
              exit 1
            fi
          fi

          RUN_PRICE=true
          RUN_HERO=true
          RUN_EXTSIG=true
          RUN_CREMA=true
          RUN_BLOG=true
          RUN_SUMMARY=true
          RUN_COMPETITOR=false
          RUN_OWNED=true
          RUN_FUNNEL=false
          RUN_MEMBER=false
          RUN_SEARCH_VOLUME=true

          if [ "$OWNED_BACKFILL" = "true" ] || [ "$OWNED_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=true
            RUN_FUNNEL=false
            RUN_MEMBER=false
            RUN_SEARCH_VOLUME=false
          fi

          if [ "$FUNNEL_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=false
            RUN_FUNNEL=true
            RUN_MEMBER=false
            RUN_SEARCH_VOLUME=false
          fi

          if [ "$MEMBER_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=false
            RUN_FUNNEL=false
            RUN_MEMBER=true
            RUN_SEARCH_VOLUME=false
          fi

          if [ "$SEARCH_VOLUME_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=false
            RUN_FUNNEL=false
            RUN_MEMBER=false
            RUN_SEARCH_VOLUME=true
          fi

          if [ "$EXTSIG_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=true
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=false
            RUN_FUNNEL=false
            RUN_MEMBER=false
            RUN_SEARCH_VOLUME=false
          fi

          if [ "$SUMMARY_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=true
            RUN_OWNED=false
            RUN_FUNNEL=false
            RUN_MEMBER=false
            RUN_SEARCH_VOLUME=false
          fi

          if [ "$VOC_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=true
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=false
            RUN_FUNNEL=false
            RUN_MEMBER=false
            RUN_SEARCH_VOLUME=false
          fi

          if [ "$BLOG_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=true
            RUN_SUMMARY=false
            RUN_OWNED=false
            RUN_FUNNEL=false
            RUN_MEMBER=false
            RUN_SEARCH_VOLUME=false
          fi

          if [ "$HERO_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=true
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_OWNED=false
            RUN_FUNNEL=false
            RUN_MEMBER=false
            RUN_SEARCH_VOLUME=false
          fi

          if [ "$COMPETITOR_ONLY" = "true" ]; then
            RUN_PRICE=false
            RUN_HERO=false
            RUN_EXTSIG=false
            RUN_CREMA=false
            RUN_BLOG=false
            RUN_SUMMARY=false
            RUN_COMPETITOR=true
            RUN_OWNED=false
            RUN_FUNNEL=false
            RUN_MEMBER=false
            RUN_SEARCH_VOLUME=false
          fi

          echo "run_price=$RUN_PRICE" >> "$GITHUB_OUTPUT"
          echo "run_hero=$RUN_HERO" >> "$GITHUB_OUTPUT"
          echo "run_extsig=$RUN_EXTSIG" >> "$GITHUB_OUTPUT"
          echo "run_crema=$RUN_CREMA" >> "$GITHUB_OUTPUT"
          echo "run_blog=$RUN_BLOG" >> "$GITHUB_OUTPUT"
          echo "run_summary=$RUN_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "run_competitor=$RUN_COMPETITOR" >> "$GITHUB_OUTPUT"
          echo "run_owned=$RUN_OWNED" >> "$GITHUB_OUTPUT"
          echo "run_funnel=$RUN_FUNNEL" >> "$GITHUB_OUTPUT"
          echo "run_member=$RUN_MEMBER" >> "$GITHUB_OUTPUT"
          echo "run_search_volume=$RUN_SEARCH_VOLUME" >> "$GITHUB_OUTPUT"
          echo "owned_backfill=$OWNED_BACKFILL" >> "$GITHUB_OUTPUT"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "owned_recent_days=${{ inputs.owned_recent_days }}" >> "$GITHUB_OUTPUT"
            echo "debug=${{ inputs.debug }}" >> "$GITHUB_OUTPUT"
          else
            echo "owned_recent_days=7" >> "$GITHUB_OUTPUT"
            echo "debug=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        shell: bash
        env:
          NEEDS_PLAYWRIGHT: ${{ steps.modes.outputs.run_hero == 'true' || steps.modes.outputs.run_blog == 'true' || steps.modes.outputs.run_extsig == 'true' }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install \
              db-dtypes \
              pyarrow \
              google-cloud-bigquery \
              google-cloud-bigquery-storage \
              pandas \
              python-dateutil \
              scikit-learn \
              sentence-transformers \
              pillow \
              requests \
              playwright \
              openpyxl \
              matplotlib
          fi

          pip install openpyxl matplotlib pytrends google-cloud-bigquery google-cloud-bigquery-storage db-dtypes pyarrow selenium webdriver-manager

          if [ "${NEEDS_PLAYWRIGHT}" = "true" ]; then
            echo "[INFO] Browser-based crawler detected -> install Playwright Chromium"
            python -m playwright install --with-deps chromium
          else
            echo "[INFO] No browser-based crawler selected -> skip Playwright Chromium install"
          fi

      - name: Ensure reports dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p \
            reports \
            reports/search_volume/data \
            reports/member_funnel \
            reports/member_funnel/data \
            site/data \
            site/assets \
            site/assets/products \
            site/assets/reviews \
            site/assets/text_images

      - name: Set KST time (for badge/meta + yesterday)
        id: set_time
        shell: bash
        run: |
          set -euo pipefail
          echo "kst=$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')" >> "$GITHUB_OUTPUT"
          echo "kst_date=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "yesterday_ymd=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Inspect OWNED/Funnel seed status
        id: owned_seed
        shell: bash
        env:
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          ymd = os.environ["YMD"]
          required_start = "2025-01-01"
          owned_path = Path("reports/owned_portal/data/owned/available_dates.json")
          funnel_path = Path("reports/daily_digest/data/funnel/available_dates.json")

          def inspect(path: Path):
              if not path.exists():
                  return False, False, 0, "missing"
              try:
                  data = json.load(path.open("r", encoding="utf-8"))
                  if not isinstance(data, list):
                      return False, False, 0, "not_list"
                  s = {str(x) for x in data}
                  seeded = required_start in s and ymd in s
                  has_any = len(s) > 0
                  return seeded, has_any, len(s), "ok"
              except Exception as e:
                  return False, False, 0, f"error:{e}"

          owned_seeded, owned_any, owned_cnt, owned_note = inspect(owned_path)
          funnel_seeded, funnel_any, funnel_cnt, funnel_note = inspect(funnel_path)

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as f:
              f.write(f"owned_seeded={'true' if owned_seeded else 'false'}\n")
              f.write(f"owned_has_any={'true' if owned_any else 'false'}\n")
              f.write(f"owned_count={owned_cnt}\n")
              f.write(f"funnel_seeded={'true' if funnel_seeded else 'false'}\n")
              f.write(f"funnel_has_any={'true' if funnel_any else 'false'}\n")
              f.write(f"funnel_count={funnel_cnt}\n")

          print(f"[CHECK] owned_path={owned_path} seeded={owned_seeded} count={owned_cnt} note={owned_note}")
          print(f"[CHECK] funnel_path={funnel_path} seeded={funnel_seeded} count={funnel_cnt} note={funnel_note}")
          PY

      - name: Run Naver Lowest Price crawler
        if: ${{ steps.modes.outputs.run_price == 'true' }}
        continue-on-error: true
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          python -u naver_crawl_columbia_c6c7_title_min.py \
            --limit 999999 \
            --output_html reports/naver_lowest_price.html \
            --history_dir . \
            --cache_dir .naver_cache \
            || true
          ls -la reports/naver_lowest_price.html || true

      - name: Run Hero banner crawler
        if: ${{ steps.modes.outputs.run_hero == 'true' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          HTML_USE_ABSOLUTE_FILE_URL=0 OUT_DIR=reports python -u hero_main_top3_final_PRETTY_WHITE_FINAL_FIXED.py
          ls -la reports/hero_main.html || true

      - name: Run Competitor Product dashboard
        if: ${{ steps.modes.outputs.run_competitor == 'true' }}
        continue-on-error: false
        shell: bash
        env:
          HEADLESS: "1"
          MAX_PRODUCTS_PER_SITE: "600"
        run: |
          set -euo pipefail
          test -f competitor_outdoor_dashboard_catalog_auto.py || { echo "[ERROR] competitor_outdoor_dashboard_catalog_auto.py not found"; exit 1; }
          mkdir -p reports/competitor_intel
          python -u competitor_outdoor_dashboard_catalog_auto.py
          test -f reports/competitor_intel/dashboard.html || { echo "[ERROR] reports/competitor_intel/dashboard.html missing"; exit 1; }
          ls -la reports/competitor_intel || true

      - name: Run External Signal (VOC)
        if: ${{ steps.modes.outputs.run_extsig == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          DEBUG: ${{ steps.modes.outputs.debug == 'true' }}
          TARGET_DAYS: "7"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          FILE="$(find . -type f -name 'external_signal_combined.py' | head -n 1 || true)"

          if [ -z "$FILE" ]; then
            echo "[WARN] external_signal_combined.py not found. Listing candidates:"
            find . -type f -name 'external_signal_combined*.py' || true
            exit 0
          fi

          echo "[INFO] Running: $FILE"
          echo "[INFO] NAVER_CLIENT_ID exists -> ${NAVER_CLIENT_ID:+yes}"
          echo "[INFO] NAVER_CLIENT_SECRET exists -> ${NAVER_CLIENT_SECRET:+yes}"

          python -u "$FILE" || true
          echo "[INFO] Output files:"
          ls -la reports/external_signal.html || true

      - name: Run Official VOC (collect -> build -> archive)
        if: ${{ steps.modes.outputs.run_crema == 'true' }}
        env:
          CREMA_SECURE_DEVICE_TOKEN: ${{ secrets.CREMA_SECURE_DEVICE_TOKEN }}
          NAVER_COMMERCE_CLIENT_ID: ${{ secrets.NAVER_COMMERCE_CLIENT_ID }}
          NAVER_COMMERCE_CLIENT_SECRET: ${{ secrets.NAVER_COMMERCE_CLIENT_SECRET }}
          NAVER_COMMERCE_REVIEWS_ENABLED: ${{ vars.NAVER_COMMERCE_REVIEWS_ENABLED }}
          NAVER_COMMERCE_REVIEW_ENDPOINT: ${{ vars.NAVER_COMMERCE_REVIEW_ENDPOINT }}
          NAVER_COMMERCE_BRAND_CHANNEL_NO: ${{ vars.NAVER_COMMERCE_BRAND_CHANNEL_NO }}
          NAVER_COMMERCE_PAGE_SIZE: ${{ vars.NAVER_COMMERCE_PAGE_SIZE }}
          NAVER_COMMERCE_MAX_PAGES: ${{ vars.NAVER_COMMERCE_MAX_PAGES }}
          OUTPUT_TZ: Asia/Seoul
          PROJECT_ROOT: ${{ github.workspace }}
          TARGET_DAYS: "7"
          DEBUG: ${{ steps.modes.outputs.debug == 'true' }}
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
          FORCE_CREMA_1Y: ${{ github.event_name == 'workflow_dispatch' && inputs.voc_only == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          # unchanged
          if [ -z "${CREMA_SECURE_DEVICE_TOKEN:-}" ]; then
            echo "[ERROR] CREMA_SECURE_DEVICE_TOKEN is empty."
            exit 1
          fi
          mkdir -p site/data site/assets site/assets/products site/assets/reviews site/assets/text_images reports/crema_raw reports/crema_raw/daily reports/crema_raw/health reports/naver_commerce
          FLAG="reports/crema_raw/backfill_done.flag"
          CREMA_MASTER_JSONL="reports/crema_raw/master_reviews.jsonl"
          CREMA_AGG_JSON="reports/crema_raw/reviews.json"
          CREMA_SITE_JSON="site/data/reviews.json"
          START_1Y="$(TZ=Asia/Seoul date -d '365 days ago' '+%Y-%m-%d')"
          EXISTING_CREMA_DATA="false"
          if [ -s "${CREMA_MASTER_JSONL}" ] || [ -s "${CREMA_AGG_JSON}" ] || [ -s "${CREMA_SITE_JSON}" ]; then
            EXISTING_CREMA_DATA="true"
          fi
          echo "[INFO] Crema flag: ${FLAG}"
          echo "[INFO] Yesterday (YMD): ${YMD}"
          echo "[INFO] FORCE_CREMA_1Y=${FORCE_CREMA_1Y}"
          echo "[INFO] EXISTING_CREMA_DATA=${EXISTING_CREMA_DATA}"
          if [ "${EXISTING_CREMA_DATA}" = "true" ] && [ ! -f "${FLAG}" ]; then
            echo "[INFO] Existing Crema data detected -> bootstrap flag ${FLAG} and continue incrementally"
            date -u +"%Y-%m-%dT%H:%M:%SZ" > "${FLAG}"
          fi
          if [ "${FORCE_CREMA_1Y}" = "true" ] && [ "${EXISTING_CREMA_DATA}" != "true" ]; then
            echo "[INFO] Manual voc_only detected -> crawl recent 1 year: ${START_1Y} ~ ${YMD}"
            rm -f "${FLAG}" || true
            python -u crema_voc.py --mode backfill --start "${START_1Y}" --end "${YMD}" --chunk-days 31 --keep-site-output
          else
            if [ "${FORCE_CREMA_1Y}" = "true" ] && [ "${EXISTING_CREMA_DATA}" = "true" ]; then
              echo "[INFO] Existing Crema data already present -> skip forced 1 year backfill and run incremental only"
            fi
            if [ ! -f "${FLAG}" ]; then
              echo "[INFO] (1) FIRST RUN backfill: ${START_1Y} ~ ${YMD} (recent 1 year)"
              python -u crema_voc.py --mode backfill --start "${START_1Y}" --end "${YMD}" --chunk-days 31 --keep-site-output
            else
              echo "[INFO] (1) Incremental (yesterday only): ${YMD} ~ ${YMD}"
              python -u crema_voc.py --mode daily --start "${YMD}" --end "${YMD}" --chunk-days 1 --keep-site-output
            fi
          fi
          INPUT_JSON="reports/crema_raw/reviews.json"
          if [ ! -f "${INPUT_JSON}" ]; then INPUT_JSON="site/data/reviews.json"; fi
          if [ ! -f "${INPUT_JSON}" ]; then echo "[ERROR] No input JSON found after crema_voc.py"; exit 1; fi
          BUILD_VOC_SCRIPT="build_voc_dashboard.py"
          if [ ! -f "${BUILD_VOC_SCRIPT}" ]; then echo "[ERROR] Missing canonical VOC builder: ${BUILD_VOC_SCRIPT}"; exit 1; fi
          HTML_TEMPLATE=""
          for CAND in "templates/voc_index.html" "site/template.html"; do
            if [ -f "${CAND}" ]; then HTML_TEMPLATE="${CAND}"; break; fi
          done
          BUILD_ARGS=(--input "${INPUT_JSON}" --target-days "${TARGET_DAYS}")
          if [ -n "${HTML_TEMPLATE}" ]; then BUILD_ARGS+=(--html-template "${HTML_TEMPLATE}"); fi
          python -u "${BUILD_VOC_SCRIPT}" "${BUILD_ARGS[@]}"
          if [ ! -f "site/index.html" ] && [ -f "templates/voc_index.html" ]; then cp -f templates/voc_index.html site/index.html; fi
          if [ ! -f "site/data/reviews.json" ]; then cp -f "${INPUT_JSON}" site/data/reviews.json; fi
          rm -rf reports/voc_crema || true
          mkdir -p reports/voc_crema reports/voc_crema/assets reports/voc_crema/data
          rsync -a --delete site/ reports/voc_crema/ || true
          [ -d "site/assets" ] && rsync -a site/assets/ reports/voc_crema/assets/ || true
          [ -d "site/data" ] && rsync -a site/data/ reports/voc_crema/data/ || true

      - name: Run Naver Blog VOC (Columbia mentions)
        if: ${{ steps.modes.outputs.run_blog == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          rm -rf reports/voc_blog || true
          mkdir -p reports/voc_blog
          python -u build_blog_voc_report.py \
            --queries "콜롬비아" "컬럼비아" "Columbia" "콜롬비아 자켓" "콜롬비아 패딩" "콜롬비아 등산" \
            --days 60 \
            --per-query 100 \
            --headless \
            --out-dir reports/voc_blog \
            || true
          ls -la reports/voc_blog/index.html || true

      - name: Build OWNED campaign portal (seed once, then incremental)
        if: ${{ steps.modes.outputs.run_owned == 'true' }}
        continue-on-error: false
        shell: bash
        env:
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          BQ_PROJECT: columbia-ga4
          BQ_DATASET: analytics_358593394
          OWNED_BACKFILL: ${{ steps.modes.outputs.owned_backfill }}
          OWNED_RECENT_DAYS: ${{ steps.modes.outputs.owned_recent_days }}
          OWNED_SEEDED: ${{ steps.owned_seed.outputs.owned_seeded }}
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_SA_JSON_B64:-}" ]; then
            echo "[WARN] GOOGLE_SA_JSON_B64 empty -> skip owned portal"
            exit 0
          fi

          echo "$GOOGLE_SA_JSON_B64" | base64 -d > /tmp/ga_sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/ga_sa.json

          mkdir -p reports/owned_portal reports/owned_portal/data/owned site/owned site/data/owned

          if [ "${OWNED_BACKFILL}" = "true" ]; then
            echo "[INFO] OWNED force seed: 2025-01-01 ~ ${YMD} (overwrite)"
            python -u build_owned_campaign_portal.py \
              --project "${BQ_PROJECT}" \
              --dataset "${BQ_DATASET}" \
              --start "2025-01-01" \
              --end "${YMD}" \
              --site-dir reports/owned_portal \
              --overwrite
          elif [ "${OWNED_SEEDED}" != "true" ]; then
            echo "[INFO] OWNED first YoY seed missing -> one-time fill: 2025-01-01 ~ ${YMD} (overwrite)"
            python -u build_owned_campaign_portal.py \
              --project "${BQ_PROJECT}" \
              --dataset "${BQ_DATASET}" \
              --start "2025-01-01" \
              --end "${YMD}" \
              --site-dir reports/owned_portal \
              --overwrite
          else
            echo "[INFO] OWNED incremental only: recent ${OWNED_RECENT_DAYS} days (ending ${YMD}) (overwrite)"
            python -u build_owned_campaign_portal.py \
              --project "${BQ_PROJECT}" \
              --dataset "${BQ_DATASET}" \
              --recent-days "${OWNED_RECENT_DAYS}" \
              --site-dir reports/owned_portal \
              --overwrite
          fi

          test -d reports/owned_portal/data/owned || { echo "[ERROR] reports/owned_portal/data/owned missing after build"; exit 1; }
          test -f reports/owned_portal/data/owned/available_dates.json || { echo "[ERROR] available_dates.json missing after build"; exit 1; }

          python - <<'PY'
          import json
          from pathlib import Path

          def strict_load(path: Path):
              text = path.read_text(encoding="utf-8")
              return json.loads(
                  text,
                  parse_constant=lambda x: (_ for _ in ()).throw(ValueError(f"invalid constant: {x}"))
              )

          p = Path("reports/owned_portal/data/owned/available_dates.json")
          data = strict_load(p)
          if not isinstance(data, list) or not data:
              raise SystemExit("[ERROR] available_dates.json is empty or invalid")

          latest = data[-1]
          sample = Path("reports/owned_portal/data/owned") / f"owned_{latest}.json"
          if not sample.exists():
              raise SystemExit(f"[ERROR] sample daily bundle missing: {sample}")

          daily = strict_load(sample)
          for key in ("date", "campaigns", "products", "product_users", "message_log"):
              if key not in daily:
                  raise SystemExit(f"[ERROR] {sample.name} missing key: {key}")

          print(f"[OK] available_dates={len(data)} latest={latest} campaigns={len(daily.get('campaigns', []))}")
          PY

          HTML_SRC=""
          HTML_DST="reports/owned_portal/index.html"
          for cand in "reports/owned_portal/index_patched_owned_portal.html" "reports/owned_portal/index.html"
          do
            if [ -f "$cand" ]; then
              HTML_SRC="$cand"
              break
            fi
          done

          if [ -n "$HTML_SRC" ]; then
            HTML_SRC_CLEAN="$(printf '%s' "$HTML_SRC" | tr -d '\r')"
            HTML_DST_CLEAN="$(printf '%s' "$HTML_DST" | tr -d '\r')"
            HTML_SRC_REAL="$(realpath "$HTML_SRC_CLEAN")"
            HTML_DST_REAL="$(realpath -m "$HTML_DST_CLEAN")"

            echo "[INFO] Applying OWNED HTML: $HTML_SRC_CLEAN"
            if [ "$HTML_SRC_REAL" = "$HTML_DST_REAL" ]; then
              echo "[INFO] OWNED HTML already in place"
            else
              cp -f "$HTML_SRC_CLEAN" "$HTML_DST_CLEAN"
            fi
          else
            echo "[ERROR] Required OWNED HTML source missing"
            echo "[DEBUG] Current directory:"
            pwd
            echo "[DEBUG] Root files:"
            ls -al
            echo "[DEBUG] owned_portal files:"
            ls -al reports/owned_portal || true
            exit 1
          fi

          test -f reports/owned_portal/index.html || { echo "[ERROR] reports/owned_portal/index.html missing after build"; exit 1; }

          echo "[INFO] Owned outputs:"
          ls -la reports/owned_portal || true
          ls -la reports/owned_portal/data/owned | head -n 120 || true

      - name: Write OWNED meta.json (fix init 404)
        if: ${{ steps.modes.outputs.run_owned == 'true' }}
        continue-on-error: false
        shell: bash
        env:
          KST: ${{ steps.set_time.outputs.kst }}
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
        run: |
          set -euo pipefail
          mkdir -p reports/owned_portal reports/owned_portal/data
          CNT="0"
          P="reports/owned_portal/data/owned/available_dates.json"
          if [ -f "$P" ]; then
            CNT="$(python -c "import json; p='$P'; print(len(json.load(open(p,'r',encoding='utf-8'))))" 2>/dev/null || echo 0)"
          fi
          printf '{"built_kst":"%s","yesterday":"%s","available_dates_count":%s}\n' "$KST" "$YMD" "$CNT" > reports/owned_portal/data/meta.json
          cat reports/owned_portal/data/meta.json || true

      - name: Publish OWNED portal to site/
        if: ${{ steps.modes.outputs.run_owned == 'true' }}
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          echo "[INFO] Publish OWNED portal"
          mkdir -p site/data/owned site/owned

          if [ -d "reports/owned_portal/data/owned" ]; then
            echo "[OK] found owned data dir"
            rsync -a --delete reports/owned_portal/data/owned/ site/data/owned/
          else
            echo "[ERROR] reports/owned_portal/data/owned missing"
            exit 1
          fi

          if [ -f "reports/owned_portal/data/meta.json" ]; then
            cp -f reports/owned_portal/data/meta.json site/data/owned/meta.json
          fi

          HTML_PUBLISH_SRC=""
          for cand in \
            "reports/owned_portal/index.html" \
            "reports/owned_portal/index_patched_owned_portal.html"
          do
            if [ -f "$cand" ]; then
              HTML_PUBLISH_SRC="$cand"
              break
            fi
          done

          if [ -n "$HTML_PUBLISH_SRC" ]; then
            echo "[OK] found owned html: $HTML_PUBLISH_SRC"
            cp -f "$HTML_PUBLISH_SRC" site/owned/index.html
          else
            echo "[ERROR] OWNED HTML missing"
            ls -al reports/owned_portal || true
            exit 1
          fi

          test -f site/owned/index.html || { echo "[ERROR] site/owned/index.html missing after publish"; exit 1; }

          echo "[INFO] Published OWNED outputs:"
          ls -la site/owned || true
          ls -la site/data/owned | head -n 50 || true

      - name: Build Funnel Analysis assets (seed once, then incremental)
        if: ${{ steps.modes.outputs.run_owned == 'true' || steps.modes.outputs.run_funnel == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          BQ_PROJECT: columbia-ga4
          BQ_DATASET: analytics_358593394
          OWNED_BACKFILL: ${{ steps.modes.outputs.owned_backfill }}
          OWNED_RECENT_DAYS: ${{ steps.modes.outputs.owned_recent_days }}
          FUNNEL_SEEDED: ${{ steps.owned_seed.outputs.funnel_seeded }}
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
        run: |
          set -euo pipefail

          if [ ! -f "build_owned_funnel_tab.py" ]; then
            echo "[WARN] build_owned_funnel_tab.py not found. Skipping funnel build."
            exit 0
          fi

          if [ -z "${GOOGLE_SA_JSON_B64:-}" ]; then
            echo "[WARN] GOOGLE_SA_JSON_B64 empty -> skip funnel build"
            exit 0
          fi

          echo "$GOOGLE_SA_JSON_B64" | base64 -d > /tmp/ga_funnel_sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/ga_funnel_sa.json

          mkdir -p reports/daily_digest

          if [ "${OWNED_BACKFILL}" = "true" ]; then
            echo "[INFO] Funnel force seed: 2025-01-01 ~ ${YMD}"
            python -u build_owned_funnel_tab.py \
              --mode all \
              --project "${BQ_PROJECT}" \
              --dataset "${BQ_DATASET}" \
              --start "2025-01-01" \
              --end "${YMD}" \
              --site-dir reports/daily_digest \
              --out reports/daily_digest/owned_funnel_tab.html \
              --data-base data/funnel
          elif [ "${FUNNEL_SEEDED}" != "true" ]; then
            echo "[INFO] Funnel first YoY seed missing -> one-time fill: 2025-01-01 ~ ${YMD}"
            python -u build_owned_funnel_tab.py \
              --mode all \
              --project "${BQ_PROJECT}" \
              --dataset "${BQ_DATASET}" \
              --start "2025-01-01" \
              --end "${YMD}" \
              --site-dir reports/daily_digest \
              --out reports/daily_digest/owned_funnel_tab.html \
              --data-base data/funnel
          else
            echo "[INFO] Funnel incremental only: recent ${OWNED_RECENT_DAYS} days"
            python -u build_owned_funnel_tab.py \
              --mode all \
              --project "${BQ_PROJECT}" \
              --dataset "${BQ_DATASET}" \
              --recent-days "${OWNED_RECENT_DAYS}" \
              --site-dir reports/daily_digest \
              --out reports/daily_digest/owned_funnel_tab.html \
              --data-base data/funnel
          fi

          echo "[CHECK] reports/daily_digest:"
          ls -lah reports/daily_digest | head -n 60 || true
          echo "[CHECK] reports/daily_digest/data/funnel:"
          ls -lah reports/daily_digest/data/funnel | head -n 60 || true

      - name: Build Member Funnel
        if: ${{ steps.modes.outputs.run_member == 'true' }}
        continue-on-error: false
        shell: bash
        env:
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          MEMBER_FUNNEL_PROJECT_ID: ${{ secrets.MEMBER_FUNNEL_PROJECT_ID }}
          MEMBER_FUNNEL_BASE_TABLE: ${{ secrets.MEMBER_FUNNEL_BASE_TABLE }}
          MEMBER_FUNNEL_SOURCE_TABLE: ${{ secrets.MEMBER_FUNNEL_SOURCE_TABLE }}
          MEMBER_FUNNEL_PRODUCT_TABLE: ${{ secrets.MEMBER_FUNNEL_PRODUCT_TABLE }}
          MEMBER_FUNNEL_TARGET_TABLE: ${{ secrets.MEMBER_FUNNEL_TARGET_TABLE }}
          MEMBER_FUNNEL_PATCH_SQL: sql/member_funnel_master_channel_patch_final.sql
          MEMBER_FUNNEL_BQ_LOCATION: asia-northeast3
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_SA_JSON_B64:-}" ]; then
            echo "[ERROR] GOOGLE_SA_JSON_B64 missing"
            exit 1
          fi

          if [ -z "${MEMBER_FUNNEL_PROJECT_ID:-}" ]; then
            echo "[ERROR] MEMBER_FUNNEL_PROJECT_ID missing"
            exit 1
          fi

          if [ -z "${MEMBER_FUNNEL_BASE_TABLE:-}" ]; then
            echo "[ERROR] MEMBER_FUNNEL_BASE_TABLE missing"
            exit 1
          fi

          MEMBER_FUNNEL_SCRIPT=""
          for cand in             "member_funnel_final_viewjson_patched.py"             "member_funnel_final_full_patch_light_html_fetchfixed.py"             "member_funnel_final_full_patch_light_html.py"             "member_funnel_final_full_patch.py"             "member_funnel_final_v2_patched.py"             "member_funnel_final_v2.py"
          do
            if [ -f "$cand" ]; then
              MEMBER_FUNNEL_SCRIPT="$cand"
              break
            fi
          done

          if [ -z "$MEMBER_FUNNEL_SCRIPT" ]; then
            echo "[ERROR] member funnel builder not found"
            exit 1
          fi

          echo "[INFO] Using member funnel builder: $MEMBER_FUNNEL_SCRIPT"

          echo "$GOOGLE_SA_JSON_B64" | base64 -d > /tmp/member_funnel_sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/member_funnel_sa.json

          rm -rf reports/member_funnel site/member_funnel site/data/member_funnel || true
          mkdir -p reports/member_funnel reports/member_funnel/data

          if [ -f "${MEMBER_FUNNEL_PATCH_SQL}" ]; then
            echo "[INFO] Running channel patch SQL before member funnel build"
            export TARGET_TABLE="${MEMBER_FUNNEL_BASE_TABLE}"
            TEMP_SOURCE_CREATED="false"

            if [ -n "${MEMBER_FUNNEL_SOURCE_TABLE:-}" ]; then
              export SOURCE_TABLE="${MEMBER_FUNNEL_SOURCE_TABLE}"
              echo "[INFO] Using provided source table: $SOURCE_TABLE"
            else
              export SOURCE_TABLE="${MEMBER_FUNNEL_BASE_TABLE}__patch_src"
              TEMP_SOURCE_CREATED="true"
              echo "[INFO] No MEMBER_FUNNEL_SOURCE_TABLE provided -> creating temp source copy: $SOURCE_TABLE"

              PY_COPY_B64=""
              printf '%s' "$PY_COPY_B64" | base64 -d > /tmp/member_patch_copy_source.py
              python /tmp/member_patch_copy_source.py
            fi

            PY_PATCH_B64=""
            printf '%s' "$PY_PATCH_B64" | base64 -d > /tmp/member_patch.py
            python /tmp/member_patch.py

            if [ "$TEMP_SOURCE_CREATED" = "true" ]; then
              PY_CLEANUP_B64=""
              printf '%s' "$PY_CLEANUP_B64" | base64 -d > /tmp/member_patch_cleanup.py
              python /tmp/member_patch_cleanup.py
            fi
          else
            echo "[WARN] ${MEMBER_FUNNEL_PATCH_SQL} not found -> skip channel patch"
          fi

          python -u "$MEMBER_FUNNEL_SCRIPT"

          test -f reports/member_funnel/index.html || { echo "[ERROR] reports/member_funnel/index.html missing"; exit 1; }

          echo "[INFO] Member Funnel outputs:"
          ls -la reports/member_funnel || true
          ls -la reports/member_funnel/data | head -n 50 || true

      - name: Publish Member Funnel to site/
        if: ${{ steps.modes.outputs.run_member == 'true' }}
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site/member_funnel site/data/member_funnel || true
          mkdir -p site/member_funnel site/data/member_funnel

          cp -f reports/member_funnel/index.html site/member_funnel/index.html
          [ -f "reports/member_funnel/daily.html" ] && cp -f reports/member_funnel/daily.html site/member_funnel/daily.html || true
          [ -f "reports/member_funnel/7d.html" ] && cp -f reports/member_funnel/7d.html site/member_funnel/7d.html || true
          [ -f "reports/member_funnel/1year.html" ] && cp -f reports/member_funnel/1year.html site/member_funnel/1year.html || true

          if [ -d "reports/member_funnel/data" ]; then
            rsync -a --delete --include='*_view.json' --include='*.xlsx' --exclude='*' reports/member_funnel/data/ site/data/member_funnel/
          fi
          rm -f site/data/member_funnel/*_bundle.json || true

          test -f site/member_funnel/index.html || { echo "[ERROR] site/member_funnel/index.html missing after publish"; exit 1; }

          echo "[INFO] Member Funnel published:"
          ls -la site/member_funnel || true
          ls -la site/data/member_funnel | head -n 50 || true

      - name: Build Search Volume dashboard
        if: ${{ steps.modes.outputs.run_search_volume == 'true' }}
        continue-on-error: false
        shell: bash
        env:
          NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_ACCESS_LICENSE }}
          NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LANGUAGE_RESOURCE: ${{ secrets.GOOGLE_ADS_LANGUAGE_RESOURCE }}
          GOOGLE_ADS_GEO_TARGET_RESOURCE: ${{ secrets.GOOGLE_ADS_GEO_TARGET_RESOURCE }}
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
        run: |
          set -euo pipefail
          if [ -z "${NAVER_AD_API_KEY:-}" ] || [ -z "${NAVER_AD_SECRET_KEY:-}" ] || [ -z "${NAVER_AD_CUSTOMER_ID:-}" ]; then
            echo "[ERROR] NAVER_AD_API_KEY or NAVER_AD_SECRET_KEY or NAVER_AD_CUSTOMER_ID empty"
            exit 1
          fi
          SCRIPT="columbia_search_volume_hub.py"
          TEMPLATE="columbia_search_volume_hub_template.html"
          [ -f "$SCRIPT" ] || { echo "[ERROR] $SCRIPT not found."; exit 1; }
          [ -f "$TEMPLATE" ] || { echo "[ERROR] $TEMPLATE not found."; exit 1; }
          START_DATE="$(TZ=Asia/Seoul date -d "${YMD} -3 months" '+%Y-%m-%d')"
          OUT_JSON="reports/search_volume/data/search_volume_data.json"
          OUT_HTML="reports/search_volume/index.html"
          META_JSON="reports/search_volume/data/meta.json"
          mkdir -p reports/search_volume/data
          python -u "$SCRIPT" --keywords "컬럼비아,컬럼비아 스포츠웨어,컬럼비아 후리스,컬럼비아 바람막이,컬럼비아 등산화" --start-date "$START_DATE" --end-date "$YMD" --geo KR --template "$TEMPLATE" --output-json "$OUT_JSON" --output-html "$OUT_HTML" --meta-json "$META_JSON"

      - name: Validate Search Volume build
        if: ${{ steps.modes.outputs.run_search_volume == 'true' }}
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          [ -f "reports/search_volume/index.html" ] || { echo "[ERROR] Search Volume HTML missing"; exit 1; }
          if grep -q "__DASHBOARD_DATA__" "reports/search_volume/index.html"; then echo "[ERROR] Placeholder __DASHBOARD_DATA__ still exists in built HTML"; exit 1; fi
          [ -f "reports/search_volume/data/search_volume_data.json" ] || { echo "[ERROR] search_volume_data.json missing"; exit 1; }

      - name: Publish Search Volume dashboard to site/
        if: ${{ steps.modes.outputs.run_search_volume == 'true' }}
        continue-on-error: false
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/search_volume site/data/search_volume
          cp -f reports/search_volume/index.html site/search_volume/index.html
          [ -f "reports/search_volume/data/search_volume_data.json" ] && cp -f reports/search_volume/data/search_volume_data.json site/data/search_volume/search_volume_data.json
          [ -f "reports/search_volume/data/meta.json" ] && cp -f reports/search_volume/data/meta.json site/data/search_volume/meta.json

      - name: Build Summary (reports/index.html + meta.json)
        if: ${{ steps.modes.outputs.run_summary == 'true' }}
        continue-on-error: true
        env:
          UPDATED_KST: ${{ steps.set_time.outputs.kst }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "build_summary.py" ]; then echo "[WARN] build_summary.py not found in repo root. Skipping."; exit 0; fi
          python -u build_summary.py || true
          mkdir -p reports
          echo "{\"build\":\"${UPDATED_KST}\"}" > reports/meta.json

      - name: Commit & push report results (SAFE - exclude large member funnel bundles)
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          echo "[INFO] Removing legacy large member funnel artifacts before commit"

          # Legacy bundle caches are no longer needed in git-published site
          rm -f reports/member_funnel/data/1d_bundle.json || true
          rm -f reports/member_funnel/data/7d_bundle.json || true
          rm -f reports/member_funnel/data/1m_bundle.json || true
          rm -f reports/member_funnel/data/1y_bundle.json || true
          rm -f site/data/member_funnel/1d_bundle.json || true
          rm -f site/data/member_funnel/7d_bundle.json || true
          rm -f site/data/member_funnel/1m_bundle.json || true
          rm -f site/data/member_funnel/1y_bundle.json || true

          # Defensive cleanup for oversized legacy html / bundle artifacts only
          find reports/member_funnel -maxdepth 1 -name "*.html" -size +95M -delete || true
          find site/member_funnel -maxdepth 1 -name "*.html" -size +95M -delete || true
          find reports/member_funnel/data -maxdepth 1 -name "*_bundle.json" -size +95M -delete || true
          find site/data/member_funnel -maxdepth 1 -name "*_bundle.json" -size +95M -delete || true

          # Remove legacy large tracked artifacts from git index if they still exist
          git rm --cached -f reports/member_funnel/data/1d_bundle.json 2>/dev/null || true
          git rm --cached -f reports/member_funnel/data/7d_bundle.json 2>/dev/null || true
          git rm --cached -f reports/member_funnel/data/1m_bundle.json 2>/dev/null || true
          git rm --cached -f reports/member_funnel/data/1y_bundle.json 2>/dev/null || true
          git rm --cached -f site/data/member_funnel/1d_bundle.json 2>/dev/null || true
          git rm --cached -f site/data/member_funnel/7d_bundle.json 2>/dev/null || true
          git rm --cached -f site/data/member_funnel/1m_bundle.json 2>/dev/null || true
          git rm --cached -f site/data/member_funnel/1y_bundle.json 2>/dev/null || true
          git rm --cached -f reports/member_funnel/daily.html 2>/dev/null || true
          git rm --cached -f reports/member_funnel/7d.html 2>/dev/null || true
          git rm --cached -f reports/member_funnel/index.html 2>/dev/null || true
          git rm --cached -f reports/member_funnel/1year.html 2>/dev/null || true
          git rm --cached -f site/member_funnel/daily.html 2>/dev/null || true
          git rm --cached -f site/member_funnel/7d.html 2>/dev/null || true
          git rm --cached -f site/member_funnel/index.html 2>/dev/null || true
          git rm --cached -f site/member_funnel/1year.html 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports site .naver_cache scripts sql || true
          [ -f .gitignore ] && git add .gitignore || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git fetch origin main
          git pull --rebase --autostash origin main

          git add -A reports site .naver_cache scripts sql || true
          [ -f .gitignore ] && git add .gitignore || true

          if git diff --cached --quiet; then
            echo "No changes to commit after rebase"
            exit 0
          fi

          git commit -m "Reports auto update" || true

          for i in 1 2 3; do
            echo "[INFO] push attempt $i/3"
            if git push origin HEAD:main; then
              echo "[OK] pushed"
              exit 0
            fi
            git fetch origin main
            git pull --rebase --autostash origin main
          done

          echo "[ERROR] failed to push after retries"
          exit 1
