name: Daily Digest

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason (optional)"
        required: false
        default: "manual"
      daily_hub_only:
        description: "Build Daily Digest HUB only? (update HUB, no email)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      daily_email_only:
        description: "Send Daily Digest email only? (no HUB update)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      debug:
        description: "Enable debug logs?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      backfill:
        description: "Run one-time backfill for Daily/Weekly bundles?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      backfill_start:
        description: "Backfill start date (YYYY-MM-DD)"
        required: false
        default: "2025-01-01"
      backfill_end:
        description: "Backfill end date (YYYY-MM-DD)"
        required: false
        default: "2026-03-24"

  schedule:
    # 06:00 KST daily -> Daily Digest + email
    - cron: "0 21 * * *"

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main (rebase)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Resolve run modes
        id: modes
        shell: bash
        run: |
          set -euo pipefail

          DAILY_HUB_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.daily_hub_only == 'true' }}"
          DAILY_EMAIL_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.daily_email_only == 'true' }}"

          if [ "$DAILY_HUB_ONLY" = "true" ] && [ "$DAILY_EMAIL_ONLY" = "true" ]; then
            echo "[ERROR] daily_hub_only and daily_email_only cannot both be true."
            exit 1
          fi

          echo "run_daily=true" >> "$GITHUB_OUTPUT"

          if [ "$DAILY_HUB_ONLY" = "true" ]; then
            echo "send_daily_email=false" >> "$GITHUB_OUTPUT"
            echo "skip_hub_write=false" >> "$GITHUB_OUTPUT"
            echo "mode_label=hub_only" >> "$GITHUB_OUTPUT"
          elif [ "$DAILY_EMAIL_ONLY" = "true" ]; then
            echo "send_daily_email=true" >> "$GITHUB_OUTPUT"
            echo "skip_hub_write=true" >> "$GITHUB_OUTPUT"
            echo "mode_label=email_only" >> "$GITHUB_OUTPUT"
          else
            echo "send_daily_email=true" >> "$GITHUB_OUTPUT"
            echo "skip_hub_write=false" >> "$GITHUB_OUTPUT"
            echo "mode_label=normal" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "debug=${{ inputs.debug }}" >> "$GITHUB_OUTPUT"
            echo "backfill=${{ inputs.backfill }}" >> "$GITHUB_OUTPUT"
            echo "backfill_start=${{ inputs.backfill_start }}" >> "$GITHUB_OUTPUT"
            echo "backfill_end=${{ inputs.backfill_end }}" >> "$GITHUB_OUTPUT"
          else
            echo "debug=false" >> "$GITHUB_OUTPUT"
            echo "backfill=false" >> "$GITHUB_OUTPUT"
            echo "backfill_start=" >> "$GITHUB_OUTPUT"
            echo "backfill_end=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install \
              db-dtypes \
              pyarrow \
              google-cloud-bigquery \
              pandas \
              python-dateutil \
              scikit-learn \
              sentence-transformers \
              pillow \
              requests \
              playwright \
              openpyxl \
              matplotlib
          fi

          # requirements.txt 와 별개로 Daily Digest 추가 패키지 보강 설치
          pip install openpyxl matplotlib pytrends

          python -m playwright install --with-deps chromium

      - name: Ensure reports dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p \
            reports \
            reports/search_volume/data \
            site/data \
            site/assets \
            site/assets/products \
            site/assets/reviews \
            site/assets/text_images \
            reports/daily_digest/daily \
            reports/daily_digest/data/daily \
            reports/daily_digest/weekly \
            reports/daily_digest/data/weekly

      - name: Set KST time (for badge/meta + yesterday)
        id: set_time
        shell: bash
        run: |
          set -euo pipefail
          echo "kst=$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')" >> "$GITHUB_OUTPUT"
          echo "kst_date=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "yesterday_ymd=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: One-time backfill Daily / Weekly bundles
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill == 'true' }}
        shell: bash
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          DAILY_DIGEST_SKIP_IF_EXISTS: "true"
          DAILY_DIGEST_USE_DATA_CACHE: "false"
          DAILY_DIGEST_WRITE_DATA_CACHE: "true"
          DAILY_DIGEST_SKIP_HUB_WRITE: "true"
          DAILY_DIGEST_TARGET_ROAS_XLS_PATH: target_roas.xlsx
          DAILY_DIGEST_MEDIA_SPEND_XLS_PATH: paid_media_spend.xlsx
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_ACCESS_TOKEN: ${{ secrets.GOOGLE_ADS_ACCESS_TOKEN }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
          NAVER_AD_ACCESS_LICENSE: ${{ secrets.NAVER_AD_ACCESS_LICENSE }}
          NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}
          BACKFILL_START: ${{ inputs.backfill_start }}
          BACKFILL_END: ${{ inputs.backfill_end }}
        run: |
          set -euo pipefail

          if [ -z "${GA4_PROPERTY_ID:-}" ]; then
            echo "[ERROR] GA4_PROPERTY_ID is empty."
            exit 1
          fi
          if [ -z "${GOOGLE_SA_JSON_B64:-}" ]; then
            echo "[ERROR] GOOGLE_SA_JSON_B64 is empty."
            exit 1
          fi
          if [ -z "${BACKFILL_START:-}" ] || [ -z "${BACKFILL_END:-}" ]; then
            echo "[ERROR] BACKFILL_START/BACKFILL_END is required."
            exit 1
          fi

          if ! date -d "$BACKFILL_START" '+%Y-%m-%d' >/dev/null 2>&1; then
            echo "[ERROR] Invalid BACKFILL_START: $BACKFILL_START"
            exit 1
          fi
          if ! date -d "$BACKFILL_END" '+%Y-%m-%d' >/dev/null 2>&1; then
            echo "[ERROR] Invalid BACKFILL_END: $BACKFILL_END"
            exit 1
          fi
          if [ "$(date -d "$BACKFILL_START" +%s)" -gt "$(date -d "$BACKFILL_END" +%s)" ]; then
            echo "[ERROR] BACKFILL_START must be <= BACKFILL_END"
            exit 1
          fi

          echo "$GOOGLE_SA_JSON_B64" | base64 -d > /tmp/ga_sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/ga_sa.json

          echo "[INFO] Backfill DAILY bundles: $BACKFILL_START ~ $BACKFILL_END"
          CUR="$BACKFILL_START"
          while [ "$(date -d "$CUR" +%s)" -le "$(date -d "$BACKFILL_END" +%s)" ]; do
            export YMD="$CUR"
            export GA4_START_DATE="$CUR"
            export GA4_END_DATE="$CUR"
            echo "[INFO] Build daily for $CUR"
            python -u daily_digest_live_final.py --out-dir reports/daily_digest || true
            CUR="$(date -I -d "$CUR + 1 day")"
          done

          echo "[INFO] Backfill WEEKLY bundles (Mon~Sun, bundle end = Sunday)"
          START_DOW="$(date -d "$BACKFILL_START" +%u)"  # 1=Mon ... 7=Sun
          FIRST_SUN="$(date -I -d "$BACKFILL_START + $((7 - START_DOW)) day")"
          if [ "$START_DOW" -eq 7 ]; then
            FIRST_SUN="$BACKFILL_START"
          fi

          CUR_END="$FIRST_SUN"
          while [ "$(date -d "$CUR_END" +%s)" -le "$(date -d "$BACKFILL_END" +%s)" ]; do
            WEEK_START="$(date -I -d "$CUR_END - 6 day")"
            export GA4_START_DATE="$WEEK_START"
            export GA4_END_DATE="$CUR_END"
            echo "[INFO] Build weekly for $WEEK_START ~ $CUR_END"
            python -u daily_digest_live_final.py --out-dir reports/daily_digest || true
            CUR_END="$(date -I -d "$CUR_END + 7 day")"
          done

          echo "[INFO] Backfill complete"
          ls -la reports/daily_digest/data/daily | tail -n 30 || true
          ls -la reports/daily_digest/data/weekly | tail -n 30 || true

      - name: Build Daily Digest (yesterday only)
        if: ${{ steps.modes.outputs.run_daily == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}

          DAILY_DIGEST_SKIP_IF_EXISTS: "false"
          DAILY_DIGEST_USE_DATA_CACHE: "false"
          DAILY_DIGEST_WRITE_DATA_CACHE: "true"
          DAILY_DIGEST_SKIP_HUB_WRITE: ${{ steps.modes.outputs.skip_hub_write }}

          DAILY_DIGEST_TARGET_ROAS_XLS_PATH: target_roas.xlsx
          DAILY_DIGEST_MEDIA_SPEND_XLS_PATH: paid_media_spend.xlsx

          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}

          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_ACCESS_TOKEN: ${{ secrets.GOOGLE_ADS_ACCESS_TOKEN }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}

          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
          NAVER_AD_ACCESS_LICENSE: ${{ secrets.NAVER_AD_ACCESS_LICENSE }}
          NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}

        run: |
          set -euo pipefail

          if [ -z "${GA4_PROPERTY_ID:-}" ]; then
            echo "[WARN] GA4_PROPERTY_ID is empty. skip."
            exit 0
          fi

          if [ -z "${GOOGLE_SA_JSON_B64:-}" ]; then
            echo "[WARN] GOOGLE_SA_JSON_B64 is empty. skip."
            exit 0
          fi

          echo "$GOOGLE_SA_JSON_B64" | base64 -d > /tmp/ga_sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/ga_sa.json

          mkdir -p reports/daily_digest/daily reports/daily_digest/data/daily

          echo "[INFO] Purge old outputs for ${YMD}"
          rm -f "reports/daily_digest/daily/${YMD}.html" \
                "reports/daily_digest/data/daily/${YMD}.json" || true

          echo "[INFO] Build mode: ${{ steps.modes.outputs.mode_label }}"
          echo "[INFO] Build only: ${YMD}"
          export GA4_START_DATE="${YMD}"
          export GA4_END_DATE="${YMD}"

          # 배치 버전 실행
          python -u daily_digest_live_final.py --out-dir reports/daily_digest

          echo "[INFO] Outputs:"
          ls -la reports/daily_digest/daily | tail -n 40 || true
          ls -la reports/daily_digest/data/daily | tail -n 40 || true

      - name: Render yesterday Daily Digest PNG
        if: ${{ always() && steps.modes.outputs.run_daily == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
        run: |
          set -euo pipefail

          HTML="reports/daily_digest/daily/${YMD}.html"
          PNG="reports/daily_digest/daily/${YMD}.png"

          if [ ! -f "$HTML" ]; then
            echo "[WARN] Daily HTML not found for PNG render: $HTML"
            ls -la reports/daily_digest/daily || true
            exit 0
          fi

          python -u scripts/render_daily_png.py "$HTML" "$PNG" || true
          ls -la "$PNG" || true

      - name: Commit & push Daily Digest results
        if: ${{ always() && steps.modes.outputs.skip_hub_write != 'true' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports/daily_digest scripts || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git fetch origin main
          git pull --rebase --autostash origin main

          git add -A reports/daily_digest scripts || true
          if git diff --cached --quiet; then
            echo "No changes to commit after rebase"
            exit 0
          fi

          git commit -m "Daily Digest auto update" || true

          for i in 1 2 3; do
            echo "[INFO] push attempt $i/3"
            if git push origin HEAD:main; then
              echo "[OK] pushed"
              exit 0
            fi

            echo "[WARN] push rejected. Rebase with latest origin/main and retry..."
            git fetch origin main
            git pull --rebase --autostash origin main
          done

          echo "[ERROR] failed to push after retries"
          exit 1

      - name: Send daily email (yesterday daily report PNG)
        if: ${{ always() && steps.modes.outputs.run_daily == 'true' && steps.modes.outputs.send_daily_email == 'true' }}
        continue-on-error: true
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DAILY_RECIPIENTS: ${{ vars.DAILY_RECIPIENTS }}
          HUB_URL: ${{ vars.HUB_URL }}
        shell: bash
        run: |
          set -euo pipefail

          export KST_STAMP="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          export REPORT_DATE="$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d')"
          export DAILY_DIGEST_PNG_PATH="reports/daily_digest/daily/${REPORT_DATE}.png"
          export DAILY_DIGEST_HTML_PATH="reports/daily_digest/daily/${REPORT_DATE}.html"
          export MODE_DAILY="yesterday"

          if [ -z "${SMTP_HOST:-}" ] || [ -z "${SMTP_USER:-}" ] || [ -z "${SMTP_PASS:-}" ] || [ -z "${DAILY_RECIPIENTS:-}" ]; then
            echo "[WARN] SMTP or DAILY_RECIPIENTS config missing -> skip daily email"
            exit 0
          fi

          if [ ! -f "${DAILY_DIGEST_PNG_PATH}" ] && [ ! -f "${DAILY_DIGEST_HTML_PATH}" ]; then
            echo "[WARN] Neither PNG nor HTML report exists -> skip daily email"
            ls -la reports/daily_digest/daily || true
            exit 0
          fi

          if [ -f "scripts/send_daily_email.py" ]; then
            python -u scripts/send_daily_email.py || true
          elif [ -f "send_daily_email.py" ]; then
            python -u send_daily_email.py || true
          else
            echo "[WARN] send_daily_email.py not found -> skip daily email"
            exit 0
          fi
