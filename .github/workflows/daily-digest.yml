name: Daily Digest

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "daily_and_email"
        type: choice
        options:
          - daily_only
          - daily_and_email
      debug:
        description: "Enable debug logs?"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

  schedule:
    # 06:00 KST daily
    - cron: "0 21 * * *"

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main (rebase)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Resolve run modes
        id: modes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
            DEBUG="${{ inputs.debug }}"
          else
            MODE="daily_and_email"
            DEBUG="false"
          fi

          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "debug=${DEBUG}" >> "$GITHUB_OUTPUT"

          if [ "$MODE" = "daily_only" ]; then
            echo "send_email=false" >> "$GITHUB_OUTPUT"
            echo "mode_label=daily_only" >> "$GITHUB_OUTPUT"
          else
            echo "send_email=true" >> "$GITHUB_OUTPUT"
            echo "mode_label=daily_and_email" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install \
              db-dtypes \
              pyarrow \
              google-cloud-bigquery \
              google-analytics-data \
              pandas \
              python-dateutil \
              requests \
              openpyxl
          fi

      - name: Ensure reports dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p \
            reports \
            reports/daily_digest/daily \
            reports/daily_digest/weekly \
            reports/daily_digest/data/daily \
            reports/daily_digest/data/weekly

      - name: Set KST time (for badge/meta + yesterday)
        id: set_time
        shell: bash
        run: |
          set -euo pipefail
          echo "kst=$(TZ=Asia/Seoul date '+%Y.%m.%d (%a) %H:%M KST')" >> "$GITHUB_OUTPUT"
          echo "kst_date=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "yesterday_ymd=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Build Daily Digest
        shell: bash
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
          DAILY_DIGEST_SKIP_IF_EXISTS: "false"
          DAILY_DIGEST_USE_DATA_CACHE: "true"
          DAILY_DIGEST_WRITE_DATA_CACHE: "true"
          DAILY_DIGEST_SKIP_HUB_WRITE: "true"
          DAILY_DIGEST_MEDIA_SPEND_XLS_PATH: paid_media_spend.xlsx
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_ACCESS_TOKEN: ${{ secrets.GOOGLE_ADS_ACCESS_TOKEN }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
          NAVER_AD_ACCESS_LICENSE: ${{ secrets.NAVER_AD_ACCESS_LICENSE }}
          NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${GA4_PROPERTY_ID:-}" ]; then
            echo "[ERROR] GA4_PROPERTY_ID is empty."
            exit 1
          fi
          if [ -z "${GOOGLE_SA_JSON_B64:-}" ]; then
            echo "[ERROR] GOOGLE_SA_JSON_B64 is empty."
            exit 1
          fi

          echo "$GOOGLE_SA_JSON_B64" | base64 -d > /tmp/ga_sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/ga_sa.json

          mkdir -p reports/daily_digest/daily reports/daily_digest/weekly reports/daily_digest/data/daily reports/daily_digest/data/weekly

          echo "[INFO] Purge old outputs for ${YMD}"
          rm -f "reports/daily_digest/daily/${YMD}.html" \
                "reports/daily_digest/data/daily/${YMD}.json" \
                "reports/daily_digest/weekly/END_${YMD}.html" \
                "reports/daily_digest/data/weekly/END_${YMD}.json" || true

          # 허브도 항상 새로 쓰게 유도
          rm -f "reports/daily_digest/index.html" || true

          echo "[INFO] Build mode: ${{ steps.modes.outputs.mode_label }}"
          echo "[INFO] Build only: ${YMD}"
          export GA4_START_DATE="${YMD}"
          export GA4_END_DATE="${YMD}"

          python -u daily_digest_live_final.py --out-dir reports/daily_digest --days 1

          echo "[INFO] Outputs:"
          ls -la reports/daily_digest/daily | tail -n 40 || true
          ls -la reports/daily_digest/weekly | tail -n 40 || true
          ls -la reports/daily_digest/data/daily | tail -n 40 || true
          ls -la reports/daily_digest/data/weekly | tail -n 40 || true
          ls -la reports/daily_digest | tail -n 40 || true

          echo "[INFO] Validate required outputs"
          test -f "reports/daily_digest/daily/${YMD}.html"
          test -f "reports/daily_digest/data/daily/${YMD}.json"
          test -f "reports/daily_digest/weekly/END_${YMD}.html"
          test -f "reports/daily_digest/data/weekly/END_${YMD}.json"
          test -f "reports/daily_digest/index.html"

      - name: Send Daily Digest Email
        if: ${{ steps.modes.outputs.send_email == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          YMD: ${{ steps.set_time.outputs.yesterday_ymd }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          EMAIL_BCC: ${{ secrets.EMAIL_BCC }}
        run: |
          set -euo pipefail

          if [ ! -f "scripts/send_daily_email.py" ]; then
            echo "[WARN] scripts/send_daily_email.py not found. skip email."
            exit 0
          fi

          if [ -z "${SMTP_HOST:-}" ] || [ -z "${SMTP_PORT:-}" ] || [ -z "${SMTP_USER:-}" ] || [ -z "${SMTP_PASSWORD:-}" ] || [ -z "${EMAIL_FROM:-}" ] || [ -z "${EMAIL_TO:-}" ]; then
            echo "[WARN] SMTP / email secrets missing. skip email."
            exit 0
          fi

          echo "[INFO] Send Daily Digest email for ${YMD}"
          python -u scripts/send_daily_email.py

      - name: Commit & push Daily Digest results
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A reports/daily_digest || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git fetch origin main
          git pull --rebase --autostash origin main

          git add -A reports/daily_digest || true
          if git diff --cached --quiet; then
            echo "No changes to commit after rebase"
            exit 0
          fi

          git commit -m "Daily Digest auto update" || true

          for i in 1 2 3; do
            echo "[INFO] push attempt $i/3"
            if git push origin HEAD:main; then
              echo "[OK] pushed"
              exit 0
            fi

            echo "[WARN] push rejected. Rebase with latest origin/main and retry..."
            git fetch origin main
            git pull --rebase --autostash origin main
          done

          echo "[ERROR] failed to push after retries"
          exit 1
