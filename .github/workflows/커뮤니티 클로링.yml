name: External Signal (VOC)

on:
  workflow_dispatch:

concurrency:
  group: external-signal
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-extsig:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (light)
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas python-dateutil

      - name: Ensure reports dir
        run: |
          mkdir -p reports

      - name: Run External Signal
        env:
          TARGET_DAYS: "7"
          DEBUG: "false"
        run: |
          set -e

          FILE="$(find . -type f -name 'external_signal_combined.py' | head -n 1 || true)"

          if [ -z "$FILE" ]; then
            echo "[ERROR] external_signal_combined.py not found"
            exit 1
          fi

          echo "[INFO] Running: $FILE"
          python -u "$FILE"

          echo "[INFO] Output check"
          ls -la reports/external_signal.html || true

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "External Signal update"
          git push origin HEAD:main
