name: External Signal (VOC)

on:
  workflow_dispatch:

concurrency:
  group: external-signal
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-extsig:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (light)
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas python-dateutil

      - name: Ensure reports dir
        run: |
          mkdir -p reports

      - name: Run External Signal
        env:
          TARGET_DAYS: "7"
          DEBUG: "false"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          set -e

          FILE="$(find . -type f -name 'external_signal_combined.py' | head -n 1 || true)"

          if [ -z "$FILE" ]; then
            echo "[ERROR] external_signal_combined.py not found"
            exit 1
          fi

          echo "[INFO] Running: $FILE"
          if [ -z "$NAVER_CLIENT_ID" ] || [ -z "$NAVER_CLIENT_SECRET" ]; then
            echo "[WARN] NAVER secrets are empty in workflow env"
          else
            echo "[INFO] NAVER secrets injected"
          fi
          python -u "$FILE"

          echo "[INFO] Output check"
          ls -la reports/external_signal.html || true

      - name: Commit & push results
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "External Signal update"

          # 🔥 핵심: push 직전에 최신 main 다시 동기화
          git fetch origin main

          # 충돌 대비 재시도 로직
          for i in 1 2 3; do
            echo "Attempt $i: rebase + push"

            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Push success"
                exit 0
              fi
            fi

            echo "Retrying..."
            git rebase --abort || true
            git fetch origin main
            sleep 2
          done

          echo "❌ Push failed after retries"
          exit 1
