<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owned Funnel - Final Stable</title>
  <style>
    :root{
      --bg:#edf1f6;
      --panel:#ffffff;
      --ink:#0d1b3d;
      --muted:#6c7a96;
      --line:#d8dfeb;
      --track:#eef2f7;
      --track2:#f7f9fc;
      --blue1:#103a8b;
      --blue2:#2e60ff;
      --teal1:#10b8b1;
      --teal2:#58dfc8;
      --pink1:#c882ff;
      --pink2:#ff4aa5;
      --shadow:0 18px 40px rgba(20,35,90,.08);
      --radius-xl:22px;
      --radius-lg:18px;
      --radius-md:14px;
      --row-h:108px;
      --drop-w:122px;
      --stage-max:100%;
      --stage-min:84px;
      --anim:900ms;
      --delay-step:120ms;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:linear-gradient(180deg,#eef2f7 0%, #e8edf4 100%);
      color:var(--ink);
      font-family: Inter, Pretendard, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page{
      max-width:1180px;
      margin:18px auto;
      padding:12px;
    }

    .card{
      background:var(--panel);
      border:1px solid rgba(161,176,205,.22);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:18px 18px 22px;
      overflow:hidden;
      position:relative;
    }

    .header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:16px;
    }

    .eyebrow{
      font-size:11px;
      font-weight:800;
      letter-spacing:.18em;
      color:#9aa8c3;
      margin-bottom:4px;
      text-transform:uppercase;
    }
    .title{
      font-size:22px;
      line-height:1.1;
      font-weight:900;
      margin:0;
      letter-spacing:-.03em;
    }
    .sub{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      line-height:1.45;
    }
    .scope{
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      min-width:fit-content;
      color:#5e6f90;
      background:linear-gradient(180deg,#ffffff 0%, #f7f9fc 100%);
      box-shadow:0 6px 14px rgba(24,39,75,.05);
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    .scope b{color:#244fcd}

    .funnel{
      display:grid;
      gap:12px;
      margin-top:10px;
    }

    .row{
      display:grid;
      grid-template-columns: minmax(0,1fr) var(--drop-w);
      align-items:center;
      gap:12px;
      position:relative;
    }

    .lane{
      position:relative;
      min-width:0;
    }

    .connector{
      position:relative;
      z-index:1;
      text-align:center;
      font-size:12px;
      line-height:1.3;
      color:#576888;
      font-weight:800;
      margin:0 0 8px;
      letter-spacing:-.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .track{
      height:var(--row-h);
      border-radius:20px;
      border:1px solid var(--line);
      background:linear-gradient(180deg,#f4f7fb 0%, #eef2f7 100%);
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
    }

    .track::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(120% 120% at 50% 0%, rgba(255,255,255,.65) 0%, rgba(255,255,255,0) 50%),
        linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0));
      pointer-events:none;
    }

    .stage{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scaleX(.72);
      transform-origin:center center;
      height:48px;
      width:var(--stage-max);
      min-width:var(--stage-min);
      max-width:calc(100% - 24px);
      border-radius:16px;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px 14px;
      overflow:hidden;
      isolation:isolate;
      box-shadow:
        0 16px 32px rgba(24,67,168,.18),
        inset 0 1px 0 rgba(255,255,255,.25);
      opacity:0;
      filter:saturate(1.05);
    }

    .stage.stage-blue{
      background:linear-gradient(90deg,var(--blue1),var(--blue2));
    }
    .stage.stage-teal{
      background:linear-gradient(90deg,var(--teal1),var(--teal2));
    }
    .stage.stage-amber{
      background:linear-gradient(90deg,#ffb33a,#ff8a00);
    }
    .stage.stage-violet{
      background:linear-gradient(90deg,#7a5cff,#4596ff);
    }
    .stage.stage-indigo{
      background:linear-gradient(90deg,#3a5af9,#1c7aff);
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0) 52%, rgba(0,0,0,.06) 100%);
      pointer-events:none;
      z-index:0;
    }

    .stage::after{
      content:"";
      position:absolute;
      left:-18%;
      top:-40%;
      width:28%;
      height:180%;
      transform:rotate(18deg);
      background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.34), rgba(255,255,255,0));
      filter:blur(6px);
      opacity:0;
      z-index:1;
      pointer-events:none;
    }

    .label{
      position:relative;
      z-index:2;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      min-width:0;
      max-width:100%;
      overflow:hidden;
    }

    .stage-name,
    .stage-value,
    .stage-meta,
    .drop-kicker,
    .drop-rate,
    .drop-count{
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .stage-name{
      font-weight:900;
      letter-spacing:-.035em;
      line-height:1;
      white-space:nowrap;
    }

    .stage-value{
      font-weight:950;
      letter-spacing:-.045em;
      line-height:.98;
      white-space:nowrap;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1, "lnum" 1;
    }

    .stage-meta{
      font-weight:800;
      line-height:1.05;
      opacity:.96;
      white-space:nowrap;
    }

    .drop{
      height:var(--row-h);
      border-radius:20px;
      border:1px solid var(--line);
      background:linear-gradient(180deg,#f6f8fc 0%, #edf2f7 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
      position:relative;
      overflow:hidden;
    }

    .drop-fill{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(.88);
      transform-origin:center center;
      width:calc(100% - 18px);
      height:calc(100% - 18px);
      border-radius:18px;
      background:linear-gradient(135deg,var(--pink1),var(--pink2));
      box-shadow:
        0 12px 24px rgba(220,72,158,.22),
        inset 0 1px 0 rgba(255,255,255,.28);
      opacity:0;
      overflow:hidden;
    }

    .drop-fill::after{
      content:"";
      position:absolute;
      left:-25%;
      top:-25%;
      width:50%;
      height:150%;
      transform:rotate(18deg);
      background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.28), rgba(255,255,255,0));
      opacity:.55;
      filter:blur(4px);
    }

    .drop-label{
      position:relative;
      z-index:2;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      min-width:0;
      max-width:100%;
      width:100%;
      color:#fff;
      text-align:center;
      padding:0 8px;
      opacity:0;
      transform:translateY(10px);
    }

    .drop-kicker{
      font-size:10px;
      line-height:1.05;
      letter-spacing:.16em;
      font-weight:900;
      white-space:normal;
      word-break:keep-all;
      overflow-wrap:anywhere;
    }
    .drop-rate{
      line-height:1;
      font-weight:950;
      white-space:nowrap;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1, "lnum" 1;
    }
    .drop-count{
      line-height:1.05;
      font-weight:800;
      white-space:nowrap;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1, "lnum" 1;
    }

    .baseline{
      border-style:dashed;
      color:#95a3be;
      font-weight:800;
      font-size:13px;
      letter-spacing:-.02em;
      background:linear-gradient(180deg,#fcfdff 0%, #f5f8fc 100%);
    }

    .row.is-baseline .drop{
      background:linear-gradient(180deg,#fcfdff 0%, #f5f8fc 100%);
    }

    .compare{
      margin-top:18px;
      display:none;
      gap:18px;
    }

    .compare.on{
      display:grid;
      grid-template-columns:1fr 1fr;
    }

    .mini{
      border:1px solid rgba(161,176,205,.22);
      border-radius:22px;
      padding:14px;
      background:linear-gradient(180deg,#fff 0%, #fbfcfe 100%);
      box-shadow:var(--shadow);
      min-width:0;
    }

    .mini h3{
      margin:0 0 8px;
      font-size:16px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:8px 10px;
      margin-top:10px;
      color:#6c7a96;
      font-size:12px;
      font-weight:700;
    }
    .legend span{
      display:inline-flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
    }
    .dot{
      width:10px;height:10px;border-radius:999px;display:inline-block
    }

    .footer-note{
      margin-top:12px;
      font-size:12px;
      color:#7786a3;
      line-height:1.5;
    }

    @keyframes stageIn{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) scaleX(.68) translateY(16px);
        filter:blur(2px);
      }
      52%{
        opacity:1;
        transform:translate(-50%,-50%) scaleX(1.03) translateY(0);
        filter:blur(0);
      }
      100%{
        opacity:1;
        transform:translate(-50%,-50%) scaleX(1) translateY(0);
        filter:blur(0);
      }
    }
    @keyframes sheen{
      0%{left:-25%;opacity:0}
      22%{opacity:.55}
      100%{left:115%;opacity:0}
    }
    @keyframes dropIn{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(.84);
      }
      70%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1.02);
      }
      100%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
      }
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }

    .row.animate .stage{
      animation:stageIn var(--anim) cubic-bezier(.18,.86,.22,1) forwards;
    }
    .row.animate .stage::after{
      animation:sheen 1200ms ease forwards;
      animation-delay:calc(var(--row-delay) + 260ms);
    }
    .row.animate .drop-fill{
      animation:dropIn 820ms cubic-bezier(.18,.86,.22,1) forwards;
      animation-delay:calc(var(--row-delay) + 120ms);
    }
    .row.animate .drop-label{
      animation:fadeUp 600ms ease forwards;
      animation-delay:calc(var(--row-delay) + 250ms);
    }

    @media (max-width: 900px){
      :root{
        --row-h:100px;
        --drop-w:106px;
      }
      .page{padding:8px}
      .card{padding:16px}
    }

    @media (max-width: 680px){
      :root{
        --row-h:94px;
        --drop-w:96px;
        --stage-min:68px;
      }
      .header{align-items:flex-start}
      .title{font-size:20px}
      .sub{font-size:12px}
      .connector{font-size:11px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="header">
        <div>
          <div class="eyebrow">Funnel</div>
          <h1 class="title">Conversion Flow</h1>
          <div class="sub" id="subtitle">All | Total period</div>
          <div class="sub">Behavior funnel is using native stage fields.</div>
        </div>
        <div class="scope" id="scopeBadge">Scope | <b>All</b></div>
      </div>

      <div class="funnel" id="funnel"></div>

      <div class="compare" id="compareGrid"></div>

      <div class="legend">
        <span><i class="dot" style="background:linear-gradient(90deg,#103a8b,#2e60ff)"></i>Main funnel bar</span>
        <span><i class="dot" style="background:linear-gradient(135deg,#c882ff,#ff4aa5)"></i>Drop-off bar</span>
        <span>글자 크기는 박스 기준 자동 축소</span>
      </div>

      <div class="footer-note">
        숫자 규모 차이가 큰 단계도 막대 길이와 글자 크기가 자동 보정되도록 설계했다.
        Compare 모드에서는 A/B 양쪽 데이터를 합친 공통 최대값 기준으로 막대 폭을 잡아서, 서로 다른 규모도 한 화면에서 바로 비교할 수 있다.
      </div>
    </div>
  </div>

  <script>
    const DEMO_DATA = {
      scopeLabel: 'All',
      subtitle: 'All | Total period',
      scaleMode: 'sqrt',
      rows: [
        { key:'sessions', name:'Sessions', value:60227, keepRate:null, dropRate:null, dropCount:null, color:'stage-blue', baseline:true },
        { key:'pdp', name:'PDP Views', value:24210, keepRate:40.2, dropRate:59.8, dropCount:36017, color:'stage-teal' },
        { key:'atc', name:'Add to Cart', value:1536, keepRate:6.3, dropRate:93.7, dropCount:22674, color:'stage-violet' },
        { key:'checkout', name:'Checkout', value:939, keepRate:61.1, dropRate:38.9, dropCount:597, color:'stage-amber' },
        { key:'purchase', name:'Purchase Sessions', value:420, keepRate:44.7, dropRate:55.3, dropCount:519, color:'stage-indigo' }
      ],
      compare: null
    };

    function numberFormat(n){
      if (n === null || n === undefined || n === '') return '-';
      return Number(n).toLocaleString('en-US');
    }
    function pctFormat(n){
      if (n === null || n === undefined || Number.isNaN(Number(n))) return '-';
      return `${Number(n).toFixed(1)}%`;
    }
    function clamp(n, min, max){
      return Math.min(Math.max(n, min), max);
    }
    function widthRatio(value, maxValue, mode='sqrt'){
      if (!maxValue || value <= 0) return 0;
      const ratio = value / maxValue;
      return mode === 'linear' ? ratio : Math.sqrt(ratio);
    }
    function stageWidthPx(value, maxValue, trackWidth, mode='sqrt'){
      const minWidth = Math.min(Math.max(trackWidth * 0.20, 68), 120);
      const maxWidth = Math.max(trackWidth - 24, minWidth);
      const r = widthRatio(value, maxValue, mode);
      return Math.round(minWidth + (maxWidth - minWidth) * r);
    }
    function dropWidthPx(rate, slotWidth){
      if (rate === null || rate === undefined) return 0;
      const minWidth = Math.min(Math.max(slotWidth * 0.38, 36), 54);
      const maxWidth = slotWidth - 18;
      const r = clamp(Number(rate) / 100, 0, 1);
      return Math.round(minWidth + (maxWidth - minWidth) * r);
    }
    function connectorText(prevName, curName, keepRate, dropRate){
      if (!prevName || keepRate === null || dropRate === null) return '';
      return `${prevName} → ${curName} · ${pctFormat(keepRate)} 유지 · ${pctFormat(dropRate)} 이탈`;
    }

    function buildRow(row, idx, prevRow){
      const rowEl = document.createElement('div');
      rowEl.className = 'row' + (row.baseline ? ' is-baseline' : '');
      rowEl.style.setProperty('--row-delay', `${idx * 120}ms`);

      const lane = document.createElement('div');
      lane.className = 'lane';

      if (idx > 0) {
        const connector = document.createElement('div');
        connector.className = 'connector';
        connector.textContent = connectorText(prevRow?.name, row.name, row.keepRate, row.dropRate);
        lane.appendChild(connector);
      } else {
        const spacer = document.createElement('div');
        spacer.style.height = '4px';
        lane.appendChild(spacer);
      }

      const track = document.createElement('div');
      track.className = 'track';

      const stage = document.createElement('div');
      stage.className = `stage ${row.color || 'stage-blue'}`;
      stage.dataset.value = row.value ?? 0;

      const label = document.createElement('div');
      label.className = 'label';

      const name = document.createElement('div');
      name.className = 'stage-name fit-name';
      name.textContent = row.name;

      const value = document.createElement('div');
      value.className = 'stage-value fit-value';
      value.textContent = numberFormat(row.value);

      const meta = document.createElement('div');
      meta.className = 'stage-meta fit-meta';
      meta.textContent = row.baseline ? '기준 단계' : `이탈 ${pctFormat(row.dropRate)}`;

      label.appendChild(name);
      label.appendChild(value);
      label.appendChild(meta);
      stage.appendChild(label);
      track.appendChild(stage);
      lane.appendChild(track);

      const drop = document.createElement('div');
      drop.className = 'drop' + (row.baseline ? ' baseline' : '');

      if (row.baseline) {
        drop.innerHTML = `<div class="drop-label" style="opacity:1;transform:none;color:#95a3be"><div class="drop-kicker" style="font-size:12px;letter-spacing:.02em;white-space:nowrap">Baseline</div></div>`;
      } else {
        const fill = document.createElement('div');
        fill.className = 'drop-fill';
        fill.dataset.rate = row.dropRate ?? 0;

        const dlabel = document.createElement('div');
        dlabel.className = 'drop-label';

        const kicker = document.createElement('div');
        kicker.className = 'drop-kicker fit-drop-kicker';
        kicker.innerHTML = 'DROP-<br>OFF';

        const rate = document.createElement('div');
        rate.className = 'drop-rate fit-drop-rate';
        rate.textContent = pctFormat(row.dropRate);

        const count = document.createElement('div');
        count.className = 'drop-count fit-drop-count';
        count.textContent = numberFormat(row.dropCount);

        dlabel.appendChild(kicker);
        dlabel.appendChild(rate);
        dlabel.appendChild(count);

        drop.appendChild(fill);
        drop.appendChild(dlabel);
      }

      rowEl.appendChild(lane);
      rowEl.appendChild(drop);
      return rowEl;
    }

    function fitTextToBox(el, opts={}){
      if (!el) return;
      const { max = 48, min = 8, widthRatio = 0.92, heightRatio = 0.92, multiLine = false } = opts;
      const parent = el.parentElement;
      if (!parent) return;

      let size = max;
      el.style.fontSize = size + 'px';
      if (!multiLine) el.style.whiteSpace = 'nowrap';

      const parentW = parent.clientWidth * widthRatio;
      const parentH = parent.clientHeight * heightRatio;

      while (size > min) {
        const tooWide = el.scrollWidth > parentW;
        const tooTall = el.scrollHeight > parentH;
        if (!tooWide && !tooTall) break;
        size -= 1;
        el.style.fontSize = size + 'px';
      }
    }

    function fitStageText(stage){
      if (!stage) return;
      const label = stage.querySelector('.label');
      if (!label) return;

      const name = label.querySelector('.fit-name');
      const value = label.querySelector('.fit-value');
      const meta = label.querySelector('.fit-meta');

      const stageW = stage.clientWidth;
      const stageH = stage.clientHeight;
      const stageSmall = stageW < 150;
      const stageTiny = stageW < 110;

      label.style.height = '100%';
      label.style.padding = '2px 4px';

      fitTextToBox(name, {
        max: stageTiny ? 18 : stageSmall ? 22 : 28,
        min: 9,
        widthRatio: 0.88,
        heightRatio: 0.28
      });

      fitTextToBox(value, {
        max: stageTiny ? 22 : stageSmall ? 28 : 40,
        min: 11,
        widthRatio: 0.88,
        heightRatio: 0.38
      });

      fitTextToBox(meta, {
        max: stageTiny ? 11 : 13,
        min: 8,
        widthRatio: 0.88,
        heightRatio: 0.16
      });

      let safety = 14;
      while (label.scrollHeight > stageH - 8 && safety > 0) {
        [name, value, meta].forEach(node => {
          const current = parseFloat(getComputedStyle(node).fontSize);
          node.style.fontSize = Math.max(8, current - 1) + 'px';
        });
        safety -= 1;
      }
    }

    function fitDropText(drop){
      if (!drop) return;
      const label = drop.querySelector('.drop-label');
      if (!label) return;

      const k = label.querySelector('.fit-drop-kicker');
      const r = label.querySelector('.fit-drop-rate');
      const c = label.querySelector('.fit-drop-count');

      fitTextToBox(k, { max: 11, min: 8, widthRatio: 0.84, heightRatio: 0.24, multiLine: true });
      fitTextToBox(r, { max: 28, min: 12, widthRatio: 0.82, heightRatio: 0.26 });
      fitTextToBox(c, { max: 15, min: 9, widthRatio: 0.82, heightRatio: 0.16 });

      let safety = 12;
      while (label.scrollHeight > drop.clientHeight - 14 && safety > 0) {
        [k, r, c].forEach(node => {
          const current = parseFloat(getComputedStyle(node).fontSize);
          node.style.fontSize = Math.max(8, current - 1) + 'px';
        });
        safety -= 1;
      }
    }

    function applyLayout(container, rows, mode='sqrt', forcedMaxValue=null){
      const rowEls = [...container.querySelectorAll('.row')];
      const maxValue = forcedMaxValue || Math.max(...rows.map(r => Number(r.value || 0)), 1);

      rowEls.forEach((rowEl, idx) => {
        const track = rowEl.querySelector('.track');
        const stage = rowEl.querySelector('.stage');
        const drop = rowEl.querySelector('.drop');
        const fill = rowEl.querySelector('.drop-fill');
        const rowData = rows[idx];

        if (track && stage) {
          const stageW = stageWidthPx(Number(rowData.value || 0), maxValue, track.clientWidth, mode);
          stage.style.width = stageW + 'px';
          fitStageText(stage);
        }

        if (fill && drop) {
          const fillW = dropWidthPx(Number(rowData.dropRate || 0), drop.clientWidth);
          fill.style.width = fillW + 'px';
          fitDropText(drop);
        }
      });
    }

    function renderFunnel(root, data){
      root.innerHTML = '';
      const rows = data.rows || [];
      rows.forEach((row, idx) => root.appendChild(buildRow(row, idx, rows[idx-1])));
      requestAnimationFrame(() => {
        applyLayout(root, rows, data.scaleMode || 'sqrt');
        [...root.querySelectorAll('.row')].forEach((row, idx) => {
          row.style.setProperty('--row-delay', `${idx * 120}ms`);
          row.classList.add('animate');
        });
      });
    }

    function renderCompare(compareRoot, compareData, baseOptions){
      if (!compareData) {
        compareRoot.classList.remove('on');
        compareRoot.innerHTML = '';
        return;
      }
      compareRoot.classList.add('on');
      compareRoot.innerHTML = '';

      const blocks = [
        { title: compareData.leftTitle || 'A', rows: compareData.leftRows || [] },
        { title: compareData.rightTitle || 'B', rows: compareData.rightRows || [] }
      ];

      const compareMax = Math.max(
        ...((compareData.leftRows || []).concat(compareData.rightRows || []).map(r => Number(r.value || 0))),
        1
      );

      blocks.forEach((block, miniIdx) => {
        const mini = document.createElement('div');
        mini.className = 'mini';
        mini.innerHTML = `<h3>${block.title}</h3><div class="funnel"></div>`;
        compareRoot.appendChild(mini);

        const funnel = mini.querySelector('.funnel');
        block.rows.forEach((row, idx) => funnel.appendChild(buildRow(row, idx, block.rows[idx-1])));

        requestAnimationFrame(() => {
          applyLayout(funnel, block.rows, baseOptions.scaleMode || 'sqrt', compareMax);
          [...funnel.querySelectorAll('.row')].forEach((row, idx) => {
            row.style.setProperty('--row-delay', `${idx * 100}ms`);
            row.classList.add('animate');
          });
        });
      });
    }

    function mountFunnel(data){
      document.getElementById('subtitle').textContent = data.subtitle || 'All | Total period';
      document.getElementById('scopeBadge').innerHTML = `Scope | <b>${data.scopeLabel || 'All'}</b>`;

      const funnelRoot = document.getElementById('funnel');
      renderFunnel(funnelRoot, data);

      const compareRoot = document.getElementById('compareGrid');
      renderCompare(compareRoot, data.compare, data);

      const resizeAll = () => {
        applyLayout(funnelRoot, data.rows || [], data.scaleMode || 'sqrt');
        [...funnelRoot.querySelectorAll('.drop')].forEach(fitDropText);

        if (data.compare) {
          renderCompare(compareRoot, data.compare, data);
        }
      };

      const ro = new ResizeObserver(resizeAll);
      ro.observe(document.body);
      window.addEventListener('resize', resizeAll);
    }

    // 외부 주입 예시:
    // window.FUNNEL_DATA = { scopeLabel:'All', subtitle:'All | Total period', rows:[...], compare:{...} }
    mountFunnel(window.FUNNEL_DATA || DEMO_DATA);
  </script>
</body>
</html>
