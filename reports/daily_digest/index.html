<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Digest Hub</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Flatpickr (Calendar) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');

    :root{
      --brand:#002d72;
      --bg0:#f6f8fb;
      --bg1:#eef3f9;
      --card: rgba(255,255,255,0.78);
      --stroke: rgba(15,23,42,0.08);
    }

    body{
      background: linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family:'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      color:#0f172a;
      min-height:100vh;
    }
    .glass{
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid var(--stroke);
      box-shadow: 0 18px 60px rgba(15,23,42,0.10);
    }
    .chip{
      border:1px solid rgba(148,163,184,.35);
      background: rgba(255,255,255,.7);
      transition: .15s ease;
    }
    .chip:hover{ transform: translateY(-1px); box-shadow: 0 10px 28px rgba(2, 6, 23, .08); }
    .chip.active{
      border-color: rgba(0,45,114,.45);
      box-shadow: 0 12px 30px rgba(0,45,114,.12);
    }
    .brand-btn{
      background: var(--brand);
      color:#fff;
    }
    .flatpickr-calendar{
      border-radius:16px !important;
      box-shadow: 0 18px 60px rgba(15,23,42,0.18) !important;
      border:1px solid rgba(15,23,42,0.10) !important;
      overflow:hidden;
      font-family:'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
    }
  </style>
</head>

<body class="px-4 sm:px-8 py-8">
  <div class="max-w-[1200px] mx-auto">
    <!-- Header -->
    <div class="mb-7 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3">
      <div>
        <div class="text-4xl font-black tracking-tight">Daily Digest Hub</div>
        <div class="text-slate-500 font-semibold mt-1">캘린더로 날짜/기간 선택 · 기본은 어제 리포트</div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs font-extrabold tracking-widest text-slate-500 uppercase">Mode</span>
        <div class="flex gap-2">
          <button id="tabDaily" class="px-4 py-2 rounded-2xl font-extrabold chip active">Daily</button>
          <button id="tabWeekly" class="px-4 py-2 rounded-2xl font-extrabold chip">Weekly (7D)</button>
        </div>
      </div>
    </div>

    <!-- Main -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <!-- Left: Controls -->
      <div class="lg:col-span-4 glass rounded-3xl p-6">
        <div class="flex items-center justify-between">
          <div class="text-lg font-black" id="panelTitle">Daily Reports</div>
          <span class="text-xs font-extrabold px-3 py-2 rounded-full bg-white/70 border border-slate-200 text-slate-600" id="panelHint">
            날짜 선택
          </span>
        </div>

        <!-- Calendar input -->
        <div class="mt-5">
          <label class="text-xs font-extrabold tracking-widest text-slate-500 uppercase">
            Date / Range
          </label>

          <div class="mt-2 flex gap-2">
            <input id="datePicker" class="w-full rounded-2xl px-4 py-3 font-bold bg-white/80 border border-slate-200 outline-none focus:ring-2 focus:ring-blue-200"
                   placeholder="날짜 선택 또는 기간 선택" />
            <button id="btnYesterday" class="px-4 py-3 rounded-2xl font-extrabold chip whitespace-nowrap">
              어제
            </button>
          </div>

          <div class="mt-3 text-xs text-slate-500 leading-relaxed">
            - <b>Daily</b>: 선택한 날짜 리포트를 우측에서 바로 확인<br/>
            - <b>Range</b>: 기간 내 리포트 목록만 아래에 표시
          </div>
        </div>

        <!-- List -->
        <div class="mt-6">
          <div class="flex items-center justify-between">
            <div class="text-sm font-black text-slate-800">Results</div>
            <div class="text-xs font-bold text-slate-500" id="resultCount">0</div>
          </div>

          <div class="mt-3 grid grid-cols-2 gap-2 max-h-[380px] overflow-auto pr-1" id="resultList"></div>
        </div>

        <!-- Quick actions -->
        <div class="mt-6 grid grid-cols-2 gap-2">
          <button id="btnPrev" class="px-4 py-3 rounded-2xl font-extrabold chip">◀ 하루 전</button>
          <button id="btnNext" class="px-4 py-3 rounded-2xl font-extrabold chip">하루 뒤 ▶</button>
        </div>
      </div>

      <!-- Right: Viewer -->
      <div class="lg:col-span-8 glass rounded-3xl p-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          <div>
            <div class="text-lg font-black">Report Viewer</div>
            <div class="text-xs text-slate-500 mt-1" id="viewerMeta">—</div>
          </div>
          <div class="flex gap-2">
            <a id="openNewTab" target="_blank" class="px-4 py-3 rounded-2xl font-extrabold chip">새 탭</a>
            <button id="copyLink" class="px-4 py-3 rounded-2xl font-extrabold chip">링크 복사</button>
            <button id="refreshFrame" class="px-4 py-3 rounded-2xl font-extrabold brand-btn">새로고침</button>
          </div>
        </div>

        <div class="mt-5 rounded-2xl overflow-hidden border border-slate-200 bg-white/70">
          <iframe id="viewer" src="" class="w-full h-[720px] bg-white"></iframe>
        </div>
      </div>
    </div>
  </div>

<script>
/**
 * ✅ 네 실제 구조에 맞춤
 * - 이 파일 위치: reports/daily_digest/index.html
 * - daily 리포트:  reports/daily_digest/daily/YYYY-MM-DD.html  => 상대경로 daily/...
 * - weekly 리포트: reports/daily_digest/weekly/END_YYYY-MM-DD.html => 상대경로 weekly/...
 */
const PATHS = {
  daily:  (d) => `daily/${d}.html`,
  weekly: (d) => `weekly/END_${d}.html`
};

let mode = "daily"; // "daily" | "weekly"
let selectedDate = null; // YYYY-MM-DD

// ---------- date helpers ----------
function pad2(n){ return String(n).padStart(2,'0'); }
function toYMD(date){
  const y = date.getFullYear();
  const m = pad2(date.getMonth()+1);
  const d = pad2(date.getDate());
  return `${y}-${m}-${d}`;
}
function fromYMD(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function yesterdayYMD(){
  const now = new Date();
  const y = new Date(now.getFullYear(), now.getMonth(), now.getDate()-1);
  return toYMD(y);
}
function addDays(ymd, delta){
  const dt = fromYMD(ymd);
  dt.setDate(dt.getDate()+delta);
  return toYMD(dt);
}

// ---------- UI refs ----------
const tabDaily = document.getElementById("tabDaily");
const tabWeekly = document.getElementById("tabWeekly");
const panelTitle = document.getElementById("panelTitle");
const panelHint = document.getElementById("panelHint");
const viewer = document.getElementById("viewer");
const viewerMeta = document.getElementById("viewerMeta");
const openNewTab = document.getElementById("openNewTab");
const copyLink = document.getElementById("copyLink");
const refreshFrame = document.getElementById("refreshFrame");
const datePickerEl = document.getElementById("datePicker");
const resultList = document.getElementById("resultList");
const resultCount = document.getElementById("resultCount");
const btnYesterday = document.getElementById("btnYesterday");
const btnPrev = document.getElementById("btnPrev");
const btnNext = document.getElementById("btnNext");

// ---------- render list (fast; no HEAD checks) ----------
function renderListForRange(startYMD, endYMD){
  resultList.innerHTML = "";
  const days = [];
  let cur = startYMD;
  while(true){
    days.push(cur);
    if(cur === endYMD) break;
    cur = addDays(cur, 1);
    if(days.length > 500) break;
  }

  // newest first
  days.reverse();
  resultCount.textContent = String(days.length);

  for(const d of days){
    const btn = document.createElement("button");
    btn.className = "chip rounded-2xl px-3 py-3 text-left font-extrabold";
    btn.innerHTML = `<div class="text-sm">${mode==="weekly" ? "END " : ""}${d}</div>`;
    btn.onclick = () => loadReport(d);
    resultList.appendChild(btn);
  }

  highlightSelected();
}

function highlightSelected(){
  const chips = [...resultList.querySelectorAll("button")];
  chips.forEach(c => c.classList.remove("active"));
  chips.forEach(c => {
    const txt = c.textContent.replace("END","").trim();
    if(selectedDate && txt === selectedDate){
      c.classList.add("active");
    }
  });
}

// ---------- load report ----------
function loadReport(ymd){
  selectedDate = ymd;
  const url = mode === "daily" ? PATHS.daily(ymd) : PATHS.weekly(ymd);
  viewer.src = url;
  openNewTab.href = url;
  viewerMeta.textContent = `${mode === "daily" ? "Daily" : "Weekly(END)"} · ${ymd} · ${url}`;
  datePicker.setDate(fromYMD(ymd), true);
  highlightSelected();
}

// ---------- mode switch ----------
function setMode(next){
  mode = next;
  tabDaily.classList.toggle("active", mode==="daily");
  tabWeekly.classList.toggle("active", mode==="weekly");

  if(mode==="daily"){
    panelTitle.textContent = "Daily Reports";
    panelHint.textContent = "날짜 선택";
  }else{
    panelTitle.textContent = "Weekly (7D Cumulative)";
    panelHint.textContent = "END 날짜 선택";
  }

  const base = selectedDate || yesterdayYMD();
  const end = base;
  const start = addDays(end, -13);
  renderListForRange(start, end);
  loadReport(base);
}

// ---------- calendar ----------
const datePicker = flatpickr(datePickerEl, {
  mode: "range",
  dateFormat: "Y-m-d",
  maxDate: "today",
  locale: { firstDayOfWeek: 1 },
  onClose: function(selectedDates){
    if(!selectedDates || selectedDates.length === 0) return;

    if(selectedDates.length === 1){
      const d = toYMD(selectedDates[0]);
      const start = addDays(d, -13);
      renderListForRange(start, d);
      loadReport(d);
      return;
    }

    const start = toYMD(selectedDates[0]);
    const end = toYMD(selectedDates[1]);
    renderListForRange(start, end);
    loadReport(end); // range는 최신 날짜를 기본으로
  }
});

// ---------- quick buttons ----------
btnYesterday.onclick = () => {
  const d = yesterdayYMD();
  const start = addDays(d, -13);
  renderListForRange(start, d);
  loadReport(d);
};

btnPrev.onclick = () => {
  if(!selectedDate) return;
  const d = addDays(selectedDate, -1);
  const start = addDays(d, -13);
  renderListForRange(start, d);
  loadReport(d);
};
btnNext.onclick = () => {
  if(!selectedDate) return;
  const d = addDays(selectedDate, +1);
  const today = toYMD(new Date());
  if(fromYMD(d).getTime() > fromYMD(today).getTime()) return;

  const start = addDays(d, -13);
  renderListForRange(start, d);
  loadReport(d);
};

refreshFrame.onclick = () => {
  viewer.src = viewer.src;
};

copyLink.onclick = async () => {
  try{
    await navigator.clipboard.writeText(openNewTab.href || "");
    copyLink.textContent = "복사 완료";
    setTimeout(()=> copyLink.textContent="링크 복사", 900);
  }catch(e){
    alert("복사 실패: 브라우저 권한을 확인해주세요.");
  }
};

// ---------- init (✅ 디폴트: 어제 자동 로드) ----------
(function init(){
  const d = yesterdayYMD();
  selectedDate = d;
  const start = addDays(d, -13);
  renderListForRange(start, d);
  loadReport(d);
  tabDaily.classList.add("active");
})();
tabDaily.onclick = () => setMode("daily");
tabWeekly.onclick = () => setMode("weekly");
</script>
</body>
</html>
