<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Digest Hub</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
    :root { --brand:#002d72; --bg0:#f6f8fb; --bg1:#eef3f9; }

    /* ✅ Hub 스크롤은 1개만 (전체 스크롤만) */
    html, body{
      height: 100%;
      overflow: auto;
    }

    body{
      background: linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: 'Plus Jakarta Sans', sans-serif;
      color:#0f172a;
      min-height:100vh;
    }
    .glass{
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 26px;
      box-shadow: 0 24px 60px rgba(0,45,114,0.07);
    }
    .chip{
      border: 1px solid rgba(148,163,184,0.35);
      background: rgba(255,255,255,0.78);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      font-size: 12px;
      color: #0f172a;
      transition: all .15s ease;
      user-select:none;
      white-space: nowrap;
    }
    .chip:hover{ transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,45,114,0.08); }
    .chip.active{
      background: rgba(0,45,114,0.08);
      border-color: rgba(0,45,114,0.28);
      color: var(--brand);
    }
    .btn{
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: 900;
      font-size: 12px;
      border: 1px solid rgba(148,163,184,0.28);
      background: rgba(255,255,255,0.88);
      transition: all .15s ease;
      user-select:none;
      white-space: nowrap;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,45,114,0.08); }
    .btn-primary{
      background: #002d72;
      border-color: #002d72;
      color: white;
    }
    .muted{ color:#64748b; }
    .small-label{
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    input[type="date"]{
      border: 1px solid rgba(148,163,184,0.28);
      background: rgba(255,255,255,0.90);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 900;
      font-size: 12px;
      color: #0f172a;
      outline: none;
      width: 100%;
    }
    input[type="date"]:focus{
      border-color: rgba(0,45,114,0.40);
      box-shadow: 0 0 0 4px rgba(0,45,114,0.08);
    }

    /* ✅ iframe은 내부 높이로 늘릴거라 "고정 높이" 제거 */
    .viewer-frame{
      width: 100%;
      height: 720px;      /* 초기값(로딩 전). 로드 후 JS가 자동으로 늘림 */
      border: 0;
      border-radius: 18px;
      background: white;
      overflow: hidden;   /* iframe 자체 스크롤바 방지(가능한 경우) */
    }

    .topbar{
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left{
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .mini{
      font-size: 11px;
      font-weight: 900;
      color: #334155;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(148,163,184,0.22);
      border-radius: 999px;
      padding: 8px 12px;
    }
  </style>
</head>

<body class="p-6 md:p-10">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6">
      <div>
        <div class="text-4xl font-black tracking-tight">Daily Digest Hub</div>
        <div class="muted font-semibold mt-1">날짜/기간 선택은 Viewer 상단에서 · 기본은 어제 리포트(KST)</div>
      </div>

      <!-- 우상단: Mode + actions -->
      <div class="flex items-center gap-3 flex-wrap justify-end">
        <div class="flex items-center gap-2">
          <div class="small-label mr-2">Mode</div>
          <button id="modeDaily" class="chip active" type="button">Daily</button>
          <button id="modeWeekly" class="chip" type="button">Weekly (7D)</button>
        </div>

        <div class="flex items-center gap-2">
          <button id="btnOpenNew" class="btn" type="button">새 탭</button>
          <button id="btnCopy" class="btn" type="button">링크 복사</button>
          <button id="btnReload" class="btn btn-primary" type="button">새로고침</button>
        </div>
      </div>
    </div>

    <!-- Viewer -->
    <div class="glass p-5">
      <div class="topbar mb-4">
        <div class="topbar-left">
          <span class="mini" id="statusText">-</span>

          <div class="flex items-center gap-2">
            <div class="small-label hidden md:block">Date</div>
            <div class="w-[160px]">
              <input id="singleDate" type="date" />
            </div>
            <button id="btnPrev" class="btn" type="button">◀</button>
            <button id="btnNext" class="btn" type="button">▶</button>
            <button id="btnYesterday" class="btn" type="button">어제</button>
            <button id="btnToday" class="btn" type="button">오늘(있으면)</button>
          </div>

          <div class="flex items-center gap-2">
            <div class="small-label hidden md:block">Range</div>
            <div class="w-[160px]">
              <input id="rangeStart" type="date" />
            </div>
            <div class="w-[160px]">
              <input id="rangeEnd" type="date" />
            </div>
            <button id="btnApply" class="btn btn-primary" type="button">적용</button>
            <button id="btnClearRange" class="btn" type="button">Range 해제</button>
          </div>
        </div>
      </div>

      <div class="text-xs muted font-semibold mb-3" id="viewerPath">-</div>

      <iframe id="viewer" class="viewer-frame" loading="eager" scrolling="no"></iframe>

      <div class="mt-3 text-[11px] muted font-semibold text-right">
        Auto · KST 기준 · 내부 스크롤 제거 + 리포트 헤더 자동 숨김(가능한 경우)
      </div>
    </div>
  </div>

<script>
(function(){
  // ---------- KST helpers ----------
  function kstNowDate(){
    const now = new Date();
    const utc = now.getTime() + now.getTimezoneOffset()*60000;
    return new Date(utc + 9*60*60000);
  }
  function fmtYMD(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }
  function parseYMD(s){
    const [y,m,d] = (s||'').split('-').map(Number);
    return new Date(y, (m||1)-1, d||1);
  }
  function addDays(d, n){
    const x = new Date(d);
    x.setDate(x.getDate()+n);
    return x;
  }
  function inRange(ds, startStr, endStr){
    if(!startStr || !endStr) return true;
    const d = parseYMD(ds).getTime();
    const a = parseYMD(startStr).getTime();
    const b = parseYMD(endStr).getTime();
    return d >= a && d <= b;
  }

  // ---------- DOM ----------
  const modeDaily = document.getElementById('modeDaily');
  const modeWeekly = document.getElementById('modeWeekly');

  const singleDate = document.getElementById('singleDate');
  const rangeStart = document.getElementById('rangeStart');
  const rangeEnd = document.getElementById('rangeEnd');

  const btnApply = document.getElementById('btnApply');
  const btnClearRange = document.getElementById('btnClearRange');
  const btnYesterday = document.getElementById('btnYesterday');
  const btnToday = document.getElementById('btnToday');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');

  const viewer = document.getElementById('viewer');
  const viewerPath = document.getElementById('viewerPath');
  const statusText = document.getElementById('statusText');

  const btnOpenNew = document.getElementById('btnOpenNew');
  const btnCopy = document.getElementById('btnCopy');
  const btnReload = document.getElementById('btnReload');

  // ---------- State ----------
  let MODE = 'daily'; // 'daily' | 'weekly'
  let currentSelectedPath = '';
  let activeRangeStart = '';
  let activeRangeEnd = '';

  function buildPath(dateStr){
    if(MODE === 'daily') return `daily/${dateStr}.html`;
    return `weekly/END_${dateStr}.html`;
  }

  async function exists(url){
    try{
      const res = await fetch(url + `?t=${Date.now()}`, { method:'HEAD', cache:'no-store' });
      return res.ok;
    }catch(e){
      return false;
    }
  }

  function setStatus(msg){
    statusText.textContent = msg;
  }

  // ✅ weekly는 7일 단위로 이동
  function stepDays(){
    return (MODE === 'weekly') ? 7 : 1;
  }

  // ✅ 리포트(iframe) 안의 "중복 헤더" 숨김 CSS 주입
  // - cross-origin / file:// 환경에서는 차단될 수 있으므로 폴백 포함
  function hideReportHeaderInsideIframe(){
    try{
      const doc = viewer.contentDocument || viewer.contentWindow.document;
      if(!doc) return;

      const styleId = 'ddhub-hide-report-header';
      if(!doc.getElementById(styleId)){
        const st = doc.createElement('style');
        st.id = styleId;

        /**
         * 보수적 셀렉터 세트
         * (가능하면 리포트쪽에서 data-dd="report-header" 같은 표식을 넣고,
         *  여기서는 그거만 숨기는 게 가장 안전)
         */
        st.textContent = `
          header, .topbar, .page-header, .header, .hero, .hero-header,
          [data-role="subnav"], .subnav, .tabs, .tabbar { display:none !important; }

          body { padding-top: 0 !important; }
          main { padding-top: 0 !important; margin-top: 0 !important; }

          /* iframe 내부 스크롤 제거(가능한 경우) */
          html, body { overflow: hidden !important; }
        `;
        doc.head.appendChild(st);
      }

      // ✅ 첫번째 큰 제목만 골라 숨기기 (섹션 타이틀은 유지)
      const firstHeading = doc.querySelector('h1, h2');
      if(firstHeading){
        const t = (firstHeading.textContent || '').trim().toLowerCase();
        const blocklist = ['top kpis', 'kpi', 'overview', 'summary'];
        const isSectionTitle = blocklist.some(x => t === x || t.includes(x));
        if(!isSectionTitle){
          firstHeading.style.display = 'none';
        }
      }

      // 성공 시: 스크롤 제거 유지
      viewer.setAttribute('scrolling','no');

    }catch(e){
      // ✅ 폴백: cross-origin이면 내부 제어 포기 → iframe 스크롤 허용
      viewer.setAttribute('scrolling','auto');
      viewer.style.height = '720px';
    }
  }

  // ✅ 핵심: iframe 내부 스크롤 없애고, iframe 높이를 내부 문서 높이로 맞춤
  function resizeIframeToContent(){
    try{
      const doc = viewer.contentDocument || viewer.contentWindow.document;
      if(!doc) return;

      doc.documentElement.style.overflow = 'hidden';
      doc.body.style.overflow = 'hidden';
      doc.body.style.margin = '0';

      const h = Math.max(
        doc.body.scrollHeight,
        doc.documentElement.scrollHeight,
        doc.body.offsetHeight,
        doc.documentElement.offsetHeight
      );

      viewer.style.height = (h + 12) + 'px';
    }catch(e){
      // ✅ 폴백: cross-origin이면 고정 높이 유지 + 스크롤 허용
      viewer.setAttribute('scrolling','auto');
      viewer.style.height = '720px';
    }
  }

  function setViewer(dateStr){
    const path = buildPath(dateStr);
    currentSelectedPath = path;
    viewer.src = path;
    viewerPath.textContent = `${MODE.toUpperCase()} · ${dateStr} · ${path}`;
    setStatus(
      `Loaded: ${dateStr}` +
      (MODE === 'weekly' ? ' · step=7d' : ' · step=1d') +
      (activeRangeStart && activeRangeEnd ? ` · Range ${activeRangeStart} ~ ${activeRangeEnd}` : '')
    );
  }

  viewer.addEventListener('load', () => {
    // ✅ 1) 겹치는 리포트 헤더 숨김
    hideReportHeaderInsideIframe();

    // ✅ 2) 높이 자동 맞춤
    resizeIframeToContent();
    // 폰트/이미지 늦게 로드되는 케이스 대비
    setTimeout(() => { hideReportHeaderInsideIframe(); resizeIframeToContent(); }, 250);
    setTimeout(() => { hideReportHeaderInsideIframe(); resizeIframeToContent(); }, 900);
  });

  async function findAvailable(fromDateStr, direction){
    let d = parseYMD(fromDateStr);
    const start = activeRangeStart ? parseYMD(activeRangeStart) : null;
    const end = activeRangeEnd ? parseYMD(activeRangeEnd) : null;

    // direction은 +1/-1 또는 +7/-7 처럼 들어올 수 있음
    const step = direction || 1;

    for(let stepCount=0; stepCount<120; stepCount++){
      const ds = fmtYMD(d);
      if(!start || !end || inRange(ds, activeRangeStart, activeRangeEnd)){
        const ok = await exists(buildPath(ds));
        if(ok) return ds;
      }
      d = addDays(d, step);
      if(start && d < start && step < 0) break;
      if(end && d > end && step > 0) break;
    }
    return null;
  }

  async function applySelection(){
    activeRangeStart = rangeStart.value || '';
    activeRangeEnd = rangeEnd.value || '';

    if(activeRangeStart && activeRangeEnd){
      const a = parseYMD(activeRangeStart);
      const b = parseYMD(activeRangeEnd);
      if(a > b){
        setStatus('Range 오류: start가 end보다 큼');
        return;
      }
    }

    let target = singleDate.value;
    if(activeRangeStart && activeRangeEnd && !inRange(target, activeRangeStart, activeRangeEnd)){
      target = activeRangeEnd;
      singleDate.value = target;
    }

    const ok = await exists(buildPath(target));
    if(ok){
      setViewer(target);
      return;
    }

    // ✅ 없으면 가까운 날짜 탐색 (weekly면 7일 step 기준으로 먼저 찾고, 그래도 없으면 1일로 보조)
    const step = stepDays();
    const next =
      await findAvailable(target, -step) ||
      await findAvailable(target, +step) ||
      await findAvailable(target, -1) ||
      await findAvailable(target, +1);

    if(next){
      singleDate.value = next;
      setViewer(next);
    }else{
      setStatus('해당 범위에 리포트 파일이 없습니다');
      setViewer(target);
    }
  }

  function setMode(next){
    MODE = next;
    modeDaily.classList.toggle('active', MODE==='daily');
    modeWeekly.classList.toggle('active', MODE==='weekly');
    applySelection();
  }

  // ---------- Events ----------
  modeDaily.addEventListener('click', () => setMode('daily'));
  modeWeekly.addEventListener('click', () => setMode('weekly'));

  btnApply.addEventListener('click', applySelection);

  btnClearRange.addEventListener('click', () => {
    rangeStart.value = '';
    rangeEnd.value = '';
    activeRangeStart = '';
    activeRangeEnd = '';
    applySelection();
  });

  btnYesterday.addEventListener('click', () => {
    singleDate.value = fmtYMD(addDays(kstNowDate(), -1));
    applySelection();
  });
  btnToday.addEventListener('click', async () => {
    // 오늘 리포트가 없을 확률이 높으니, 없으면 어제로 자동 폴백
    const today = fmtYMD(kstNowDate());
    singleDate.value = today;
    const ok = await exists(buildPath(today));
    if(ok){
      applySelection();
      return;
    }
    const y = fmtYMD(addDays(kstNowDate(), -1));
    singleDate.value = y;
    applySelection();
  });

  btnPrev.addEventListener('click', async () => {
    const cur = singleDate.value;
    const cand = fmtYMD(addDays(parseYMD(cur), -stepDays()));
    if(activeRangeStart && activeRangeEnd && !inRange(cand, activeRangeStart, activeRangeEnd)) return;
    const found = await findAvailable(cand, -stepDays());
    if(found){
      singleDate.value = found;
      setViewer(found);
    }else{
      setStatus('이전 리포트 없음');
    }
  });

  btnNext.addEventListener('click', async () => {
    const cur = singleDate.value;
    const cand = fmtYMD(addDays(parseYMD(cur), +stepDays()));
    if(activeRangeStart && activeRangeEnd && !inRange(cand, activeRangeStart, activeRangeEnd)) return;
    const found = await findAvailable(cand, +stepDays());
    if(found){
      singleDate.value = found;
      setViewer(found);
    }else{
      setStatus('다음 리포트 없음');
    }
  });

  btnOpenNew.addEventListener('click', () => {
    if(!currentSelectedPath) return;
    window.open(currentSelectedPath, '_blank');
  });

  btnCopy.addEventListener('click', async () => {
    if(!currentSelectedPath) return;
    const abs = new URL(currentSelectedPath, window.location.href).href;
    try{
      await navigator.clipboard.writeText(abs);
      btnCopy.textContent = '복사됨 ✓';
      setTimeout(() => btnCopy.textContent = '링크 복사', 900);
    }catch(e){
      prompt('Copy this link:', abs);
    }
  });

  btnReload.addEventListener('click', () => {
    if(!currentSelectedPath) return;
    const base = currentSelectedPath.split('?')[0];
    viewer.src = base + `?t=${Date.now()}`;
    setStatus('Reloaded');
  });

  window.addEventListener('resize', () => {
    // 뷰포트 바뀌면 다시 계산
    hideReportHeaderInsideIframe();
    resizeIframeToContent();
    setTimeout(() => { hideReportHeaderInsideIframe(); resizeIframeToContent(); }, 120);
  });

  // ---------- Init ----------
  (function init(){
    const y = addDays(kstNowDate(), -1);
    singleDate.value = fmtYMD(y);

    const start = addDays(y, -20);
    rangeStart.value = fmtYMD(start);
    rangeEnd.value = fmtYMD(y);
    activeRangeStart = rangeStart.value;
    activeRangeEnd = rangeEnd.value;

    const h = (location.hash || '').replace('#','').trim().toLowerCase();
    if(h === 'weekly') MODE = 'weekly';
    setMode(MODE);
  })();

})();
</script>
</body>
</html>
