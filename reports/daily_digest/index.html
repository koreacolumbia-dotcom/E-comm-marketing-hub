<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Digest Hub</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
    :root { --brand:#002d72; --bg0:#f6f8fb; --bg1:#eef3f9; }

    body{
      background: linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: 'Plus Jakarta Sans', sans-serif;
      color:#0f172a;
      min-height:100vh;
    }
    .glass{
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 26px;
      box-shadow: 0 24px 60px rgba(0,45,114,0.07);
    }
    .chip{
      border: 1px solid rgba(148,163,184,0.35);
      background: rgba(255,255,255,0.70);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      font-size: 12px;
      color: #0f172a;
      transition: all .15s ease;
      user-select:none;
    }
    .chip:hover{ transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,45,114,0.08); }
    .chip.active{
      background: rgba(0,45,114,0.08);
      border-color: rgba(0,45,114,0.28);
      color: var(--brand);
    }
    .btn{
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: 900;
      font-size: 12px;
      border: 1px solid rgba(148,163,184,0.28);
      background: rgba(255,255,255,0.85);
      transition: all .15s ease;
      user-select:none;
      white-space: nowrap;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,45,114,0.08); }
    .btn-primary{
      background: #002d72;
      border-color: #002d72;
      color: white;
    }
    .muted{ color:#64748b; }
    .small-label{
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .kpi-badge{
      display:inline-flex;align-items:center;gap:8px;
      font-size:11px;font-weight:900;color:#0f172a;
      padding:8px 12px;border-radius:999px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(148,163,184,0.24);
    }
    .list-item{
      border: 1px solid rgba(148,163,184,0.22);
      background: rgba(255,255,255,0.78);
      border-radius: 16px;
      padding: 10px 12px;
      font-weight: 900;
      font-size: 12px;
      transition: all .15s ease;
      cursor:pointer;
      user-select:none;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
    }
    .list-item:hover{ transform: translateY(-1px); box-shadow: 0 12px 28px rgba(0,45,114,0.08); }
    .list-item.active{
      border-color: rgba(0,45,114,0.35);
      background: rgba(0,45,114,0.06);
    }

    /* compact calendar input */
    input[type="date"]{
      border: 1px solid rgba(148,163,184,0.28);
      background: rgba(255,255,255,0.88);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 900;
      font-size: 12px;
      color: #0f172a;
      outline: none;
      width: 100%;
    }
    input[type="date"]:focus{
      border-color: rgba(0,45,114,0.40);
      box-shadow: 0 0 0 4px rgba(0,45,114,0.08);
    }
    .viewer-frame{
      width: 100%;
      height: calc(100vh - 230px);
      border: 0;
      border-radius: 18px;
      background: white;
    }

    @media (max-width: 1023px){
      .viewer-frame{ height: 70vh; }
    }
  </style>
</head>

<body class="p-6 md:p-10">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6">
      <div>
        <div class="text-4xl font-black tracking-tight">Daily Digest Hub</div>
        <div class="muted font-semibold mt-1">달력으로 날짜/기간 선택 · 기본은 어제 리포트(KST)</div>
      </div>

      <div class="flex items-center gap-2">
        <div class="small-label mr-2">Mode</div>
        <button id="modeDaily" class="chip active" type="button">Daily</button>
        <button id="modeWeekly" class="chip" type="button">Weekly (7D)</button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <!-- Left: Selector -->
      <div class="lg:col-span-4 glass p-5">
        <div class="flex items-center justify-between mb-4">
          <div>
            <div class="text-lg font-black">Selector</div>
            <div class="text-xs muted font-semibold mt-1">Daily: 날짜 선택 / Weekly: END 날짜 선택</div>
          </div>
          <div id="resultCount" class="kpi-badge">Results <span class="font-black" id="countNum">0</span></div>
        </div>

        <!-- Single date -->
        <div class="mb-4">
          <div class="small-label mb-2">Date</div>
          <div class="grid grid-cols-12 gap-2">
            <div class="col-span-8">
              <input id="singleDate" type="date" />
            </div>
            <div class="col-span-4 flex gap-2">
              <button id="btnPrev" class="btn w-full" type="button">◀</button>
              <button id="btnNext" class="btn w-full" type="button">▶</button>
            </div>
          </div>
          <div class="flex gap-2 mt-2">
            <button id="btnYesterday" class="btn w-full" type="button">어제</button>
            <button id="btnToday" class="btn w-full" type="button">오늘</button>
          </div>
        </div>

        <!-- Range -->
        <div class="mb-4">
          <div class="small-label mb-2">Range</div>
          <div class="grid grid-cols-2 gap-2">
            <input id="rangeStart" type="date" />
            <input id="rangeEnd" type="date" />
          </div>
          <div class="text-xs muted font-semibold mt-2">
            Range 지정 시: 기간 내 존재하는 리포트만 아래에 표시
          </div>
        </div>

        <div class="flex gap-2 mb-4">
          <button id="btnApply" class="btn btn-primary w-full" type="button">적용</button>
          <button id="btnClearRange" class="btn w-full" type="button">Range 해제</button>
        </div>

        <!-- Result list -->
        <div class="small-label mb-2">Results</div>
        <div id="results" class="space-y-2 max-h-[52vh] overflow-auto pr-1"></div>

        <div class="mt-4 text-xs muted font-semibold">
          * 파일 경로: <b>daily/YYYY-MM-DD.html</b>, <b>weekly/END_YYYY-MM-DD.html</b>
        </div>
      </div>

      <!-- Right: Viewer -->
      <div class="lg:col-span-8 glass p-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
          <div>
            <div class="text-lg font-black">Report Viewer</div>
            <div class="text-xs muted font-semibold mt-1" id="viewerPath">-</div>
          </div>
          <div class="flex items-center gap-2">
            <button id="btnOpenNew" class="btn" type="button">새 탭</button>
            <button id="btnCopy" class="btn" type="button">링크 복사</button>
            <button id="btnReload" class="btn btn-primary" type="button">새로고침</button>
          </div>
        </div>

        <iframe id="viewer" class="viewer-frame" loading="eager"></iframe>

        <div class="mt-3 text-[11px] muted font-semibold text-right">
          Auto · KST 기준 · Viewer는 해당 파일을 iframe으로 표시
        </div>
      </div>
    </div>
  </div>

<script>
(function(){
  // ---------- KST helpers ----------
  function kstNowDate(){
    const now = new Date();
    const utc = now.getTime() + now.getTimezoneOffset()*60000;
    return new Date(utc + 9*60*60000);
  }
  function fmtYMD(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }
  function parseYMD(s){
    const [y,m,d] = (s||'').split('-').map(Number);
    return new Date(y, (m||1)-1, d||1);
  }
  function addDays(d, n){
    const x = new Date(d);
    x.setDate(x.getDate()+n);
    return x;
  }

  // ---------- DOM ----------
  const modeDaily = document.getElementById('modeDaily');
  const modeWeekly = document.getElementById('modeWeekly');
  const singleDate = document.getElementById('singleDate');
  const rangeStart = document.getElementById('rangeStart');
  const rangeEnd = document.getElementById('rangeEnd');
  const btnApply = document.getElementById('btnApply');
  const btnClearRange = document.getElementById('btnClearRange');
  const btnYesterday = document.getElementById('btnYesterday');
  const btnToday = document.getElementById('btnToday');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');

  const results = document.getElementById('results');
  const countNum = document.getElementById('countNum');

  const viewer = document.getElementById('viewer');
  const viewerPath = document.getElementById('viewerPath');
  const btnOpenNew = document.getElementById('btnOpenNew');
  const btnCopy = document.getElementById('btnCopy');
  const btnReload = document.getElementById('btnReload');

  // ---------- State ----------
  let MODE = 'daily'; // 'daily' | 'weekly'
  let currentSelectedPath = '';

  // base path (this index.html is in reports/daily_digest/)
  // so 'daily/...' is relative to this file.
  function buildPath(dateStr){
    if(MODE === 'daily') return `daily/${dateStr}.html`;
    return `weekly/END_${dateStr}.html`;
  }

  // ---------- Existence check (HEAD) ----------
  async function exists(url){
    try{
      const res = await fetch(url + `?t=${Date.now()}`, { method:'HEAD', cache:'no-store' });
      return res.ok;
    }catch(e){
      return false;
    }
  }

  // concurrency-limited mapper
  async function pMapLimit(items, limit, fn){
    const out = new Array(items.length);
    let i = 0;
    async function worker(){
      while(i < items.length){
        const idx = i++;
        out[idx] = await fn(items[idx], idx);
      }
    }
    const workers = Array.from({length: Math.min(limit, items.length)}, () => worker());
    await Promise.all(workers);
    return out;
  }

  // ---------- Render list ----------
  function clearActive(){
    Array.from(results.querySelectorAll('.list-item')).forEach(x => x.classList.remove('active'));
  }

  function setViewer(path){
    currentSelectedPath = path;
    viewer.src = path;
    viewerPath.textContent = `${MODE.toUpperCase()} · ${path}`;
  }

  function addListItem(label, path){
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `<span>${label}</span><span class="muted font-extrabold">open</span>`;
    div.addEventListener('click', () => {
      clearActive();
      div.classList.add('active');
      setViewer(path);
    });
    results.appendChild(div);
    return div;
  }

  async function renderForRange(startStr, endStr){
    results.innerHTML = '';
    countNum.textContent = '0';

    const start = parseYMD(startStr);
    const end = parseYMD(endStr);
    if(isNaN(start) || isNaN(end) || start > end){
      return;
    }

    const days = [];
    for(let d = new Date(start); d <= end; d = addDays(d, 1)){
      days.push(fmtYMD(d));
    }

    // check existence
    const checks = await pMapLimit(days, 10, async (ds) => {
      const p = buildPath(ds);
      const ok = await exists(p);
      return ok ? { ds, p } : null;
    });

    const available = checks.filter(Boolean).reverse(); // newest first
    countNum.textContent = String(available.length);

    let firstItem = null;
    available.forEach(({ds, p}) => {
      const label = (MODE === 'daily') ? ds : `END ${ds}`;
      const item = addListItem(label, p);
      if(!firstItem) firstItem = item;
    });

    // default select: if range includes the singleDate, pick that; else pick newest
    let prefer = buildPath(singleDate.value);
    let preferItem = null;
    Array.from(results.children).forEach((node) => {
      const isPrefer = node.textContent.includes((MODE==='daily') ? singleDate.value : ('END ' + singleDate.value));
      if(isPrefer) preferItem = node;
    });

    const pick = preferItem || firstItem;
    if(pick){
      clearActive();
      pick.classList.add('active');
      // determine path from label again
      const labelText = pick.querySelector('span').textContent.trim();
      const ds = labelText.replace('END ','').trim();
      setViewer(buildPath(ds));
    }else{
      // if nothing, at least point viewer to selected date (may 404)
      setViewer(buildPath(singleDate.value));
    }
  }

  async function renderDefaultWindow(){
    // default: last 21 days range (enough, not too many HEADs)
    const end = parseYMD(singleDate.value);
    const start = addDays(end, -20);
    rangeStart.value = fmtYMD(start);
    rangeEnd.value = fmtYMD(end);
    await renderForRange(rangeStart.value, rangeEnd.value);
  }

  // ---------- Mode toggle ----------
  function setMode(next){
    MODE = next;
    modeDaily.classList.toggle('active', MODE==='daily');
    modeWeekly.classList.toggle('active', MODE==='weekly');
    // rerender based on current range
    if(rangeStart.value && rangeEnd.value){
      renderForRange(rangeStart.value, rangeEnd.value);
    }else{
      renderDefaultWindow();
    }
  }

  modeDaily.addEventListener('click', () => setMode('daily'));
  modeWeekly.addEventListener('click', () => setMode('weekly'));

  // ---------- Date controls ----------
  btnYesterday.addEventListener('click', async () => {
    const d = addDays(kstNowDate(), -1);
    singleDate.value = fmtYMD(d);
    await renderDefaultWindow();
  });
  btnToday.addEventListener('click', async () => {
    const d = kstNowDate();
    singleDate.value = fmtYMD(d);
    await renderDefaultWindow();
  });
  btnPrev.addEventListener('click', async () => {
    singleDate.value = fmtYMD(addDays(parseYMD(singleDate.value), -1));
    await renderDefaultWindow();
  });
  btnNext.addEventListener('click', async () => {
    singleDate.value = fmtYMD(addDays(parseYMD(singleDate.value), 1));
    await renderDefaultWindow();
  });

  btnApply.addEventListener('click', async () => {
    if(rangeStart.value && rangeEnd.value){
      await renderForRange(rangeStart.value, rangeEnd.value);
    }else{
      await renderDefaultWindow();
    }
  });

  btnClearRange.addEventListener('click', async () => {
    rangeStart.value = '';
    rangeEnd.value = '';
    await renderDefaultWindow();
  });

  // ---------- Viewer actions ----------
  btnOpenNew.addEventListener('click', () => {
    if(!currentSelectedPath) return;
    window.open(currentSelectedPath, '_blank');
  });

  btnCopy.addEventListener('click', async () => {
    if(!currentSelectedPath) return;
    const abs = new URL(currentSelectedPath, window.location.href).href;
    try{
      await navigator.clipboard.writeText(abs);
      btnCopy.textContent = '복사됨 ✓';
      setTimeout(() => btnCopy.textContent = '링크 복사', 900);
    }catch(e){
      // fallback
      prompt('Copy this link:', abs);
    }
  });

  btnReload.addEventListener('click', () => {
    if(!currentSelectedPath) return;
    const base = currentSelectedPath.split('?')[0];
    viewer.src = base + `?t=${Date.now()}`;
  });

  // ---------- Init ----------
  (function init(){
    // default = yesterday in KST
    const y = addDays(kstNowDate(), -1);
    singleDate.value = fmtYMD(y);

    // if URL hash says mode
    const h = (location.hash || '').replace('#','').trim().toLowerCase();
    if(h === 'weekly') MODE = 'weekly';
    setMode(MODE);
    renderDefaultWindow();
  })();

})();
</script>
</body>
</html>
