<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Digest Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
    :root { --brand:#002d72; --bg0:#f6f8fb; --bg1:#eef3f9; }
    html, body { height: 100%; overflow: auto; }
    body{
      background: linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: 'Plus Jakarta Sans', sans-serif;
      color:#0f172a;
      min-height:100vh;
    }
    .glass{
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 26px;
      box-shadow: 0 24px 60px rgba(0,45,114,0.07);
    }
    .chip{
      border: 1px solid rgba(148,163,184,0.35);
      background: rgba(255,255,255,0.78);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      font-size: 12px;
      color: #0f172a;
      transition: all .15s ease;
      user-select:none;
      white-space: nowrap;
    }
    .chip:hover{ transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,45,114,0.08); }
    .chip.active{
      background: rgba(0,45,114,0.08);
      border-color: rgba(0,45,114,0.28);
      color: var(--brand);
    }
    .btn{
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: 900;
      font-size: 12px;
      border: 1px solid rgba(148,163,184,0.28);
      background: rgba(255,255,255,0.88);
      transition: all .15s ease;
      user-select:none;
      white-space: nowrap;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,45,114,0.08); }
    .btn-primary{ background: #002d72; border-color: #002d72; color: white; }
    .muted{ color:#64748b; }
    .small-label{
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    input[type="date"]{
      border: 1px solid rgba(148,163,184,0.28);
      background: rgba(255,255,255,0.90);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 900;
      font-size: 12px;
      color: #0f172a;
      outline: none;
      width: 100%;
    }
    .mini{
      font-size: 11px;
      font-weight: 900;
      color: #334155;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(148,163,184,0.22);
      border-radius: 999px;
      padding: 8px 12px;
      max-width: 920px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .viewer-frame{
      width: 100%;
      height: 820px;
      border: 0;
      border-radius: 18px;
      background: rgba(255,255,255,0.55);
      overflow: auto;
    }
    .kpi-box{
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 18px;
      background: rgba(255,255,255,0.62);
    }
    .kpi-title{ font-size:11px; font-weight:900; letter-spacing:.18em; text-transform:uppercase; color:#64748b; }
    .kpi-value{ font-size:18px; font-weight:900; color:#0f172a; }
    .kpi-delta{ font-size:11px; font-weight:900; }
    .pos{ color:#2563eb; font-weight:900; }
    .neg{ color:#c2410c; font-weight:900; }
  </style>
</head>

<body class="p-6 md:p-10">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6">
      <div>
        <div class="text-4xl font-black tracking-tight">Daily Digest Hub</div>
        <div class="muted font-semibold mt-1">기본: 어제(KST) · 비교 ON이면 A/B 리포트가 각각 보임 · 구간비교는 캐시(JSON) 합산</div>
      </div>

      <div class="flex items-center gap-3 flex-wrap justify-end">
        <div class="flex items-center gap-2">
          <div class="small-label mr-2">Mode</div>
          <button id="modeDaily" class="chip active" type="button">Daily</button>
          <button id="modeWeekly" class="chip" type="button">Weekly (7D)</button>
        </div>
        <button id="btnReload" class="btn btn-primary" type="button">새로고침</button>
      </div>
    </div>

    <div class="glass p-5">
      <div class="flex flex-col gap-3 mb-4">
        <div class="flex flex-wrap items-center gap-2">
          <span class="mini" id="statusText">-</span>
          <span class="mini" id="pathText">-</span>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <div class="small-label">Date</div>
          <div class="w-[160px]"><input id="singleDate" type="date" /></div>
          <button id="btnPrev" class="btn" type="button">◀</button>
          <button id="btnNext" class="btn" type="button">▶</button>
          <button id="btnYesterday" class="btn" type="button">어제</button>
          <button id="btnToday" class="btn" type="button">오늘(있으면)</button>

          <div class="ml-2 small-label">Compare</div>
          <button id="btnCompareToggle" class="chip" type="button">비교 OFF</button>
          <button id="btnPrevPreset" class="btn" type="button">전기준</button>
          <button id="btnYoyPreset" class="btn" type="button">YoY</button>
          <div class="w-[160px]"><input id="compareDate" type="date" /></div>
          <button id="btnCompare" class="btn btn-primary" type="button">비교하기</button>

          <div class="ml-2 small-label">Range</div>
          <div class="w-[160px]"><input id="rangeStart" type="date" /></div>
          <div class="w-[160px]"><input id="rangeEnd" type="date" /></div>
          <button id="btnRangeCompare" class="btn btn-primary" type="button">구간비교</button>
          <button id="btnClearRange" class="btn" type="button">Range 해제</button>
        </div>
      </div>

      <!-- Viewers -->
      <div id="viewerGrid" class="grid grid-cols-1 gap-4">
        <div>
          <div class="text-xs muted font-semibold mb-2" id="viewerATitle">A: -</div>
          <iframe id="viewerA" class="viewer-frame" loading="eager" scrolling="auto"></iframe>
        </div>
        <div id="viewerBWrap" class="hidden">
          <div class="text-xs muted font-semibold mb-2" id="viewerBTitle">B: -</div>
          <iframe id="viewerB" class="viewer-frame" loading="eager" scrolling="auto"></iframe>
        </div>
      </div>

      <!-- Range Compare Result -->
      <div class="mt-6 rounded-3xl border border-slate-200 bg-white/60 p-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2">
          <div>
            <div class="font-black text-lg">구간 비교 결과 (캐시 JSON 합산)</div>
            <div class="text-xs muted font-semibold" id="rangeDesc">-</div>
          </div>
          <div class="text-xs muted font-semibold">* 캐시 없으면 0 files로 나옴</div>
        </div>

        <div class="mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">
          <div class="kpi-box p-3"><div class="kpi-title">Sessions</div><div class="kpi-value" id="r_sess">-</div><div class="kpi-delta" id="r_sess_d">-</div></div>
          <div class="kpi-box p-3"><div class="kpi-title">Orders</div><div class="kpi-value" id="r_ord">-</div><div class="kpi-delta" id="r_ord_d">-</div></div>
          <div class="kpi-box p-3"><div class="kpi-title">Revenue</div><div class="kpi-value" id="r_rev">-</div><div class="kpi-delta" id="r_rev_d">-</div></div>
          <div class="kpi-box p-3"><div class="kpi-title">CVR</div><div class="kpi-value" id="r_cvr">-</div><div class="kpi-delta" id="r_cvr_d">-</div></div>
          <div class="kpi-box p-3"><div class="kpi-title">Sign-ups</div><div class="kpi-value" id="r_su">-</div><div class="kpi-delta" id="r_su_d">-</div></div>
        </div>
      </div>

    </div>
  </div>

<script>
(function(){
  // ============================
  // BASE path 자동 감지 (404 방지)
  // ============================
  const BASE = (function(){
    const p = location.pathname || '';
    // 1) /reports/daily_digest/index.html 에서 열면 BASE=""
    if(p.includes('/reports/daily_digest/')) return '';
    // 2) 루트 index.html 에서 열면 BASE="reports/daily_digest/"
    return 'reports/daily_digest/';
  })();

  // ============================
  // Utils
  // ============================
  function kstNowDate(){
    const now = new Date();
    const utc = now.getTime() + now.getTimezoneOffset()*60000;
    return new Date(utc + 9*60*60000);
  }
  function fmtYMD(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }
  function parseYMD(s){
    const [y,m,d] = (s||'').split('-').map(Number);
    return new Date(y, (m||1)-1, d||1);
  }
  function addDays(d, n){
    const x = new Date(d);
    x.setDate(x.getDate()+n);
    return x;
  }
  function pctChange(cur, prev){
    cur = Number(cur||0); prev = Number(prev||0);
    if(prev === 0) return (cur === 0) ? 0 : 1;
    return (cur - prev) / prev;
  }
  function fmtInt(x){ try{return Math.round(Number(x||0)).toLocaleString();}catch(e){return '-'} }
  function fmtKRW(x){ try{return '₩' + Math.round(Number(x||0)).toLocaleString();}catch(e){return '₩-'} }
  function cls(v){ return (v>=0) ? 'pos' : 'neg'; }

  // ============================
  // DOM
  // ============================
  const modeDaily = document.getElementById('modeDaily');
  const modeWeekly = document.getElementById('modeWeekly');
  const btnReload = document.getElementById('btnReload');

  const singleDate = document.getElementById('singleDate');
  const compareDate = document.getElementById('compareDate');
  const rangeStart = document.getElementById('rangeStart');
  const rangeEnd = document.getElementById('rangeEnd');

  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const btnYesterday = document.getElementById('btnYesterday');
  const btnToday = document.getElementById('btnToday');

  const btnCompareToggle = document.getElementById('btnCompareToggle');
  const btnPrevPreset = document.getElementById('btnPrevPreset');
  const btnYoyPreset = document.getElementById('btnYoyPreset');
  const btnCompare = document.getElementById('btnCompare');

  const btnRangeCompare = document.getElementById('btnRangeCompare');
  const btnClearRange = document.getElementById('btnClearRange');

  const viewerGrid = document.getElementById('viewerGrid');
  const viewerA = document.getElementById('viewerA');
  const viewerB = document.getElementById('viewerB');
  const viewerBWrap = document.getElementById('viewerBWrap');

  const viewerATitle = document.getElementById('viewerATitle');
  const viewerBTitle = document.getElementById('viewerBTitle');

  const statusText = document.getElementById('statusText');
  const pathText = document.getElementById('pathText');

  const rangeDesc = document.getElementById('rangeDesc');

  // Range result nodes
  const r_sess = document.getElementById('r_sess');
  const r_ord  = document.getElementById('r_ord');
  const r_rev  = document.getElementById('r_rev');
  const r_cvr  = document.getElementById('r_cvr');
  const r_su   = document.getElementById('r_su');

  const r_sess_d = document.getElementById('r_sess_d');
  const r_ord_d  = document.getElementById('r_ord_d');
  const r_rev_d  = document.getElementById('r_rev_d');
  const r_cvr_d  = document.getElementById('r_cvr_d');
  const r_su_d   = document.getElementById('r_su_d');

  function setStatus(msg){ statusText.textContent = msg; }

  // ============================
  // State
  // ============================
  let MODE = 'daily';
  let COMPARE = false;

  function stepDays(){ return (MODE === 'weekly') ? 7 : 1; }

  // ============================
  // Paths
  // ============================
  function buildReportPath(dateStr){
    const base = (MODE === 'daily')
      ? `${BASE}daily/${dateStr}.html`
      : `${BASE}weekly/END_${dateStr}.html`;
    return base + `?embed=1`;
  }
  function buildCachePath(dateStr){
    return (MODE === 'daily')
      ? `${BASE}data/daily/${dateStr}.json`
      : `${BASE}data/weekly/END_${dateStr}.json`;
  }

  // ============================
  // EXISTS cache (HEAD)
  // ============================
  const LS_KEY = 'ddhub_exists_cache_v5';
  const TTL_MS = 6 * 60 * 60 * 1000;
  const memCache = new Map();

  function loadLS(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'{}')||{} }catch(e){ return {}; } }
  function saveLS(obj){ try{ localStorage.setItem(LS_KEY, JSON.stringify(obj)); }catch(e){} }
  function cacheGet(u){
    if(memCache.has(u)) return memCache.get(u);
    const db = loadLS();
    const hit = db[u];
    if(hit && (Date.now()-hit.ts)<TTL_MS){ memCache.set(u, hit.ok); return hit.ok; }
    return null;
  }
  function cacheSet(u, ok){
    memCache.set(u, ok);
    const db = loadLS();
    db[u] = { ok: !!ok, ts: Date.now() };
    const keys = Object.keys(db);
    if(keys.length>900){
      keys.sort((a,b)=> (db[a].ts||0)-(db[b].ts||0));
      for(let i=0;i<keys.length-700;i++) delete db[keys[i]];
    }
    saveLS(db);
  }

  async function exists(url){
    const base = url.split('?')[0];
    const cached = cacheGet(base);
    if(cached !== null) return cached;
    try{
      const res = await fetch(base + `?t=${Date.now()}`, { method:'HEAD', cache:'no-store' });
      cacheSet(base, res.ok);
      return res.ok;
    }catch(e){
      cacheSet(base, false);
      return false;
    }
  }

  // ============================
  // iframe 안 “Daily Digest/탭/상단헤더” 제거 (CSS 주입 방식 = 가장 확실)
  // ============================
  function injectHideCSS(frame){
    try{
      const doc = frame.contentDocument || frame.contentWindow.document;
      if(!doc) return;

      const css = `
/* --- hide report header area --- */
body > div.px-3.sm\\:px-6.py-6.max-w-\\[1200px\\].mx-auto > div.mb-4 { display:none !important; }
/* fallback: "Daily Digest" title row */
div.text-2xl.sm\\:text-3xl.font-black.tracking-tight { display:none !important; }
div.text-sm.text-slate-500, div.text-xs.text-slate-400 { display:none !important; }

/* hide hub tabs inside report (Hub/Daily/Weekly) */
button, a { }
*:has(> button):has(:contains("Hub")) { } /* (지원 안 될 수 있어, 아래 JS 제거로 보완) */
`;

      let style = doc.getElementById('hub_hide_css');
      if(!style){
        style = doc.createElement('style');
        style.id = 'hub_hide_css';
        style.type = 'text/css';
        style.appendChild(doc.createTextNode(css));
        doc.head.appendChild(style);
      }

      // CSS로 못 잡는 경우를 위해 “텍스트 기반”으로 추가 제거
      // 1) Daily Digest 글자 가진 큰 제목 div 제거
      const nodes = Array.from(doc.querySelectorAll('div'));
      for(const n of nodes){
        const t = (n.textContent||'').trim();
        if(t === 'Daily Digest' && (n.className||'').includes('text-2xl')){
          n.remove();
        }
      }
      // 2) Hub/Daily/Weekly 탭 묶음 제거
      const btns = Array.from(doc.querySelectorAll('button, a'));
      const hits = btns.filter(b=>{
        const t=(b.textContent||'').trim();
        return t==='Hub' || t==='Daily' || t==='Weekly';
      });
      for(const h of hits){
        let p=h.parentElement;
        for(let i=0;i<4 && p;i++){
          const pt=(p.textContent||'').replace(/\s+/g,' ').trim();
          if(pt.includes('Hub') && pt.includes('Daily') && pt.includes('Weekly')){
            p.remove(); break;
          }
          p=p.parentElement;
        }
      }
    }catch(e){
      // same-origin 아니면 접근 불가
    }
  }

  function resizeIframe(frame){
    try{
      const doc = frame.contentDocument || frame.contentWindow.document;
      if(!doc) return;
      const h = Math.max(
        doc.body.scrollHeight,
        doc.documentElement.scrollHeight,
        doc.body.offsetHeight,
        doc.documentElement.offsetHeight
      );
      frame.style.height = (h + 16) + 'px';
    }catch(e){
      frame.style.height = '820px';
    }
  }

  viewerA.addEventListener('load', ()=>{ injectHideCSS(viewerA); resizeIframe(viewerA); setTimeout(()=>{injectHideCSS(viewerA); resizeIframe(viewerA);}, 400); });
  viewerB.addEventListener('load', ()=>{ injectHideCSS(viewerB); resizeIframe(viewerB); setTimeout(()=>{injectHideCSS(viewerB); resizeIframe(viewerB);}, 400); });

  // ============================
  // Load report
  // ============================
  async function loadA(dateStr){
    const p = buildReportPath(dateStr);
    viewerA.src = p;
    viewerATitle.textContent = `A: ${MODE.toUpperCase()} · ${dateStr}`;
    pathText.textContent = `A=${p.split('?')[0]}` + (COMPARE ? ` | B=${(buildReportPath(compareDate.value||'')||'').split('?')[0]}` : '');
    setStatus(`Loaded A: ${dateStr}`);
  }

  async function loadB(dateStr){
    const p = buildReportPath(dateStr);
    viewerB.src = p;
    viewerBTitle.textContent = `B: ${MODE.toUpperCase()} · ${dateStr}`;
    setStatus(`Loaded B: ${dateStr}`);
  }

  async function applyDate(){
    const d = (singleDate.value||'').trim();
    if(!d) return;

    // A exists check + fallback
    let target = d;
    let ok = await exists(buildReportPath(target));
    if(!ok){
      const step = stepDays();
      // 가까운 날짜 찾기
      for(const delta of [-step, +step, -1, +1]){
        const cand = fmtYMD(addDays(parseYMD(target), delta));
        if(await exists(buildReportPath(cand))){ target=cand; ok=true; break; }
      }
      singleDate.value = target;
    }

    await loadA(target);

    if(COMPARE){
      const b = (compareDate.value||target).trim();
      let b2 = b;
      let okB = await exists(buildReportPath(b2));
      if(!okB){
        // B도 fallback: 없으면 A와 동일
        b2 = target;
        compareDate.value = b2;
      }
      await loadB(b2);

      viewerBWrap.classList.remove('hidden');
      viewerGrid.className = 'grid grid-cols-1 lg:grid-cols-2 gap-4';
    }else{
      viewerBWrap.classList.add('hidden');
      viewerGrid.className = 'grid grid-cols-1 gap-4';
    }
  }

  function setMode(next){
    MODE = next;
    modeDaily.classList.toggle('active', MODE==='daily');
    modeWeekly.classList.toggle('active', MODE==='weekly');
    applyDate();
  }

  function setCompare(on){
    COMPARE = !!on;
    btnCompareToggle.classList.toggle('active', COMPARE);
    btnCompareToggle.textContent = COMPARE ? '비교 ON' : '비교 OFF';
    applyDate();
  }

  // ============================
  // Compare presets
  // ============================
  btnPrevPreset.addEventListener('click', ()=>{
    const a = singleDate.value;
    if(!a) return;
    compareDate.value = fmtYMD(addDays(parseYMD(a), -stepDays()));
    setCompare(true);
  });

  // YoY preset: 캐시의 yoy.end 우선
  async function presetYoY(){
    const a = singleDate.value;
    if(!a) return;
    try{
      const res = await fetch(buildCachePath(a) + `?t=${Date.now()}`, { cache:'no-store' });
      if(!res.ok) throw new Error('no cache');
      const j = await res.json();
      const y = j && j.yoy && j.yoy.end ? String(j.yoy.end) : '';
      if(!y) throw new Error('no yoy.end');
      compareDate.value = y;
      setCompare(true);
      setStatus(`YoY preset: ${y}`);
    }catch(e){
      compareDate.value = fmtYMD(addDays(parseYMD(a), -364));
      setCompare(true);
      setStatus(`YoY preset fallback: ${compareDate.value}`);
    }
  }
  btnYoyPreset.addEventListener('click', presetYoY);

  btnCompareToggle.addEventListener('click', ()=> setCompare(!COMPARE));
  btnCompare.addEventListener('click', ()=> setCompare(true));

  // ============================
  // Range compare (캐시 합산)
  // ============================
  async function fetchJSON(url){
    const res = await fetch(url + `?t=${Date.now()}`, { cache:'no-store' });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }
  function dateList(startStr, endStr){
    const a = parseYMD(startStr);
    const b = parseYMD(endStr);
    const out = [];
    let d = new Date(a);
    let guard = 0;
    const step = stepDays();
    while(d <= b && guard < 800){
      out.push(fmtYMD(d));
      d = addDays(d, step);
      guard++;
    }
    return out;
  }
  async function loadMany(list){
    const out = [];
    for(const ds of list){
      try{
        out.push(await fetchJSON(buildCachePath(ds)));
      }catch(e){}
    }
    return out;
  }
  function sumKpis(list){
    let sessions=0, orders=0, revenue=0, signups=0;
    for(const it of list){
      const k = (it && it.kpis) ? it.kpis : {};
      sessions += Number(k.sessions||0);
      orders   += Number(k.orders||0);
      revenue  += Number(k.revenue||0);
      signups  += Number(k.signups||0);
    }
    const cvr = sessions ? (orders/sessions) : 0;
    return {sessions, orders, revenue, signups, cvr};
  }
  function paintRange(aAgg, bAgg){
    r_sess.textContent = `${fmtInt(aAgg.sessions)} vs ${fmtInt(bAgg.sessions)}`;
    r_ord.textContent  = `${fmtInt(aAgg.orders)} vs ${fmtInt(bAgg.orders)}`;
    r_rev.textContent  = `${fmtKRW(aAgg.revenue)} vs ${fmtKRW(bAgg.revenue)}`;
    r_cvr.textContent  = `${(aAgg.cvr*100).toFixed(2)}% vs ${(bAgg.cvr*100).toFixed(2)}%`;
    r_su.textContent   = `${fmtInt(aAgg.signups)} vs ${fmtInt(bAgg.signups)}`;

    const ds = pctChange(aAgg.sessions, bAgg.sessions);
    const doo = pctChange(aAgg.orders, bAgg.orders);
    const dr = pctChange(aAgg.revenue, bAgg.revenue);
    const dc = (aAgg.cvr - bAgg.cvr);
    const dsu = pctChange(aAgg.signups, bAgg.signups);

    r_sess_d.className = `kpi-delta ${cls(ds)}`;  r_sess_d.textContent = `A vs B: ${(ds*100).toFixed(1)}%`;
    r_ord_d.className  = `kpi-delta ${cls(doo)}`; r_ord_d.textContent  = `A vs B: ${(doo*100).toFixed(1)}%`;
    r_rev_d.className  = `kpi-delta ${cls(dr)}`;  r_rev_d.textContent  = `A vs B: ${(dr*100).toFixed(1)}%`;
    r_cvr_d.className  = `kpi-delta ${cls(dc)}`;  r_cvr_d.textContent  = `A vs B: ${(dc*100).toFixed(2)}%p`;
    r_su_d.className   = `kpi-delta ${cls(dsu)}`; r_su_d.textContent   = `A vs B: ${(dsu*100).toFixed(1)}%`;
  }

  function makePrevRange(as, ae){
    const s = parseYMD(as), e = parseYMD(ae);
    const days = Math.round((e - s) / (1000*60*60*24)) + 1;
    const bEnd = addDays(s, -1);
    const bStart = addDays(bEnd, -(days-1));
    return { bStart: fmtYMD(bStart), bEnd: fmtYMD(bEnd) };
  }

  btnRangeCompare.addEventListener('click', async ()=>{
    const as = (rangeStart.value||'').trim();
    const ae = (rangeEnd.value||'').trim();
    if(!as || !ae){ setStatus('Range start/end 선택해줘'); return; }

    const {bStart, bEnd} = makePrevRange(as, ae);
    rangeDesc.textContent = `${MODE.toUpperCase()} A: ${as}~${ae}  vs  B: ${bStart}~${bEnd}`;

    const aList = dateList(as, ae);
    const bList = dateList(bStart, bEnd);

    setStatus(`구간비교 캐시 합산중... A ${aList.length} / B ${bList.length}`);
    const [aJsons, bJsons] = await Promise.all([loadMany(aList), loadMany(bList)]);
    paintRange(sumKpis(aJsons), sumKpis(bJsons));
    setStatus(`구간비교 완료 (A ${aJsons.length} files / B ${bJsons.length} files)`);
  });

  btnClearRange.addEventListener('click', ()=>{
    rangeStart.value = '';
    rangeEnd.value = '';
    rangeDesc.textContent = '-';
    setStatus('Range 해제');
  });

  // ============================
  // Nav / actions
  // ============================
  btnReload.addEventListener('click', ()=> location.reload());

  btnYesterday.addEventListener('click', ()=>{ singleDate.value = fmtYMD(addDays(kstNowDate(), -1)); applyDate(); });
  btnToday.addEventListener('click', async ()=>{
    const t = fmtYMD(kstNowDate());
    singleDate.value = (await exists(buildReportPath(t))) ? t : fmtYMD(addDays(kstNowDate(), -1));
    applyDate();
  });

  btnPrev.addEventListener('click', ()=>{
    const cur = singleDate.value; if(!cur) return;
    singleDate.value = fmtYMD(addDays(parseYMD(cur), -stepDays()));
    applyDate();
  });
  btnNext.addEventListener('click', ()=>{
    const cur = singleDate.value; if(!cur) return;
    singleDate.value = fmtYMD(addDays(parseYMD(cur), +stepDays()));
    applyDate();
  });

  modeDaily.addEventListener('click', ()=> setMode('daily'));
  modeWeekly.addEventListener('click', ()=> setMode('weekly'));

  // ============================
  // init (기본 전일 + range 최근 21일)
  // ============================
  (function init(){
    const y = addDays(kstNowDate(), -1);
    const yStr = fmtYMD(y);
    singleDate.value = yStr;
    compareDate.value = fmtYMD(addDays(y, -1));

    rangeEnd.value = yStr;
    rangeStart.value = fmtYMD(addDays(y, -20));

    setMode('daily');
    setCompare(false);

    // 첫 로드
    applyDate();
  })();
})();
</script>
</body>
</html>
